<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Empresa</title>
    <!-- Fonte Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        .card {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 40px;
        }
        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #004A8D;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .subtitulo {
            color: #5f6b7a;
            margin-bottom: 30px;
            font-size: 16px;
            border-left: 4px solid #F7941E;
            padding-left: 16px;
        }
        .campos-obrigatorios-info {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 20px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }
        .required-star {
            color: #dc2626;
            font-size: 14px;
        }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* Grid de campos */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .campo label {
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .campo input, 
        .campo select {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            width: 100%;
        }
        
        .campo input:focus, 
        .campo select:focus {
            border-color: #004A8D;
            background: white;
            box-shadow: 0 0 0 3px rgba(0,74,141,0.1);
        }
        
        .campo input.error, 
        .campo select.error {
            border-color: #dc2626;
            background: #fef2f2;
        }
        
        .campo input.success, 
        .campo select.success {
            border-color: #16a34a;
            background: #f0fdf4;
        }
        
        .campo input:disabled,
        .campo select:disabled {
            background: #e9ecef;
            border-color: #ced4da;
            color: #495057;
            cursor: not-allowed;
            opacity: 0.8;
        }
        
        .helper-text {
            font-size: 12px;
            min-height: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
            padding-left: 4px;
        }
        
        .helper-text.error-msg {
            color: #dc2626;
        }
        
        .helper-text.success-msg {
            color: #16a34a;
        }
        
        .secao-titulo {
            font-size: 18px;
            font-weight: 600;
            color: #004A8D;
            margin: 10px 0 5px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .secao-titulo i {
            color: #F7941E;
            margin-right: 8px;
        }
        
        .btn-enviar {
            background: #004A8D;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px auto 10px;
            min-width: 280px;
            transition: all 0.6s ease;
            display: block;
            border: 1px solid #003a6b;
        }
        
        .btn-enviar:hover:not(:disabled) {
            background: #F7941E;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247,148,29,0.3);
            border-color: #e07f0e;
        }
        
        .btn-enviar:disabled {
            background: #a0aec0;
            border-color: #8698aa;
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .mensagem-envio {
            background: #eaf6e7;
            border: 1px solid #9ec5a0;
            border-radius: 40px;
            padding: 16px 24px;
            font-size: 15px;
            color: #1f4f2b;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .mensagem-envio.erro {
            background: #fee9e7;
            border-color: #f1a09c;
            color: #a11f1f;
        }
        
        .oculto {
            display: none;
        }
        
        /* Loading spinner */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Dica de formato */
        .formato-dica {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
        }
        
        /* Indicador de campo bloqueado */
        .campo-bloqueado {
            position: relative;
        }
        
        .campo-bloqueado::after {
            content: '🔒';
            position: absolute;
            right: 12px;
            top: 40px;
            font-size: 14px;
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>CADASTRO DA EMPRESA</h1>
    <div class="subtitulo">Preencha todos os dados abaixo para realizar o cadastro</div>

    <div class="campos-obrigatorios-info">
        <span class="required-star">*</span> Campos obrigatórios
    </div>

    <!-- Mensagens -->
    <div id="msgSucesso" class="mensagem-envio oculto">
        <i class="fas fa-check-circle"></i> Cadastro realizado com sucesso!
    </div>
    <div id="msgErro" class="mensagem-envio erro oculto">
        <i class="fas fa-exclamation-circle"></i> Erro ao cadastrar. Verifique os campos.
    </div>

    <form id="empresaForm" novalidate>
        <!-- SEÇÃO: SOBRE A EMPRESA -->
        <div class="secao-titulo">
            <i class="fas fa-building"></i> SOBRE A EMPRESA
        </div>
        
        <div class="grid-2">
            <div class="campo">
                <label>NOME FANTASIA <span class="required-star">*</span></label>
                <input type="text" id="nomeFantasia" placeholder="Ex: Supermercado Bom Preço">
                <div class="helper-text" id="nomeFantasiaHelper"></div>
            </div>
            
            <div class="campo">
                <label>RAZÃO SOCIAL <span class="required-star">*</span></label>
                <input type="text" id="razaoSocial" placeholder="Ex: Bom Preço Comércio LTDA">
                <div class="helper-text" id="razaoSocialHelper"></div>
            </div>
        </div>
        
        <div class="grid-3">
            <div class="campo">
                <label>RAMO DE ATIVIDADE <span class="required-star">*</span></label>
                <select id="ramoAtividade">
                    <option value="" disabled selected>Selecione o ramo</option>
                    <option value="Industria">Indústria</option>
                    <option value="Comercio">Comércio</option>
                    <option value="Servicos">Serviços</option>
                    <option value="Tecnologia">Tecnologia</option>
                    <option value="Construcao">Construção Civil</option>
                    <option value="Saude">Saúde</option>
                    <option value="Educacao">Educação</option>
                    <option value="Agronegocio">Agronegócio</option>
                    <option value="Transporte">Transporte e Logística</option>
                    <option value="Outros">Outros</option>
                </select>
                <div class="helper-text" id="ramoAtividadeHelper"></div>
            </div>
            
            <div class="campo">
                <label>INSCRIÇÃO MUNICIPAL</label>
                <input type="text" id="inscricaoMunicipal" placeholder="Apenas números">
                <div class="helper-text" id="inscricaoMunicipalHelper"></div>
            </div>
            
            <div class="campo">
                <label>INSCRIÇÃO ESTADUAL</label>
                <input type="text" id="inscricaoEstadual" placeholder="Apenas números">
                <div class="helper-text" id="inscricaoEstadualHelper"></div>
            </div>
        </div>
        
        <div class="grid-2">
            <div class="campo full width">
                <label>CNPJ <span class="required-star">*</span></label>
                <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18">
                <div class="helper-text" id="cnpjHelper"></div>
            </div>
        </div>
        
        <!-- SEÇÃO: ENDEREÇO -->
        <div class="secao-titulo">
            <i class="fas fa-map-marker-alt"></i> ENDEREÇO
        </div>
        
        <div class="grid-2">
            <div class="campo">
                <label>ENDEREÇO <span class="required-star">*</span></label>
                <input type="text" id="endereco" placeholder="Rua, Avenida, etc">
                <div class="helper-text" id="enderecoHelper"></div>
            </div>
            
            <div class="grid-2" style="gap: 10px;">
                <div class="campo">
                    <label>NÚMERO <span class="required-star">*</span></label>
                    <input type="text" id="numero" placeholder="123">
                    <div class="helper-text" id="numeroHelper"></div>
                </div>
                
                <div class="campo">
                    <label>COMPLEMENTO</label>
                    <input type="text" id="complemento" placeholder="Apto, sala, etc">
                    <div class="helper-text" id="complementoHelper"></div>
                </div>
            </div>
        </div>
        
        <div class="grid-3">
            <div class="campo">
                <label>CEP <span class="required-star">*</span></label>
                <input type="text" id="cep" placeholder="00000-000" maxlength="9">
                <div class="helper-text" id="cepHelper"></div>
            </div>
            
            <div class="campo">
                <label>ESTADO <span class="required-star">*</span></label>
                <select id="estado">
                    <option value="" disabled selected>Carregando estados...</option>
                </select>
                <div class="helper-text" id="estadoHelper"></div>
            </div>
            
            <div class="campo">
                <label>CIDADE <span class="required-star">*</span></label>
                <select id="cidade" disabled>
                    <option value="" disabled selected>Selecione o estado primeiro</option>
                </select>
                <div class="helper-text" id="cidadeHelper"></div>
            </div>
        </div>
        
        <div class="grid-2">
            <div class="campo">
                <label>BAIRRO <span class="required-star">*</span></label>
                <input type="text" id="bairro" placeholder="Centro">
                <div class="helper-text" id="bairroHelper"></div>
            </div>
        </div>
        
        <!-- SEÇÃO: CONTATO -->
        <div class="secao-titulo">
            <i class="fas fa-phone-alt"></i> SOBRE O CONTATO
        </div>
        
        <div class="grid-3">
            <div class="campo">
                <label>TELEFONE <span class="required-star">*</span></label>
                <input type="text" id="telefone" placeholder="(71) 3333-4444" maxlength="15">
                <div class="helper-text" id="telefoneHelper"></div>
                <div class="formato-dica">Apenas números</div>
            </div>
            
            <div class="campo">
                <label>TELEFONE ALTERNATIVO</label>
                <input type="text" id="telefoneAlt" placeholder="(71) 3333-5555" maxlength="15">
                <div class="helper-text" id="telefoneAltHelper"></div>
            </div>
            
            <div class="campo">
                <label>CELULAR <span class="required-star">*</span></label>
                <input type="text" id="celular" placeholder="(71) 98888-7777" maxlength="15">
                <div class="helper-text" id="celularHelper"></div>
            </div>
        </div>
        
        <div class="grid-2">
            <div class="campo">
                <label>NOME DA PESSOA DE CONTATO <span class="required-star">*</span></label>
                <input type="text" id="contato" placeholder="Nome completo">
                <div class="helper-text" id="contatoHelper"></div>
            </div>
            
            <div class="campo">
                <label>E-MAIL <span class="required-star">*</span></label>
                <input type="email" id="email" placeholder="contato@empresa.com">
                <div class="helper-text" id="emailHelper"></div>
            </div>
        </div>                
        
        <div class="termos-link" style="text-align: center; font-size: 12px; color: #5d6f88; margin: 5px 0 15px;">
            Os termos de serviço da NEOAPTOS estão sujeitos a alteração.
            <a href="#" style="color: #004A8D;">Leia mais</a>
        </div>
        
        <button type="submit" class="btn-enviar" id="btnEnviar">
            CADASTRAR EMPRESA
        </button>
    </form>
</div>

<script>
    (function() {
        // Elementos
        const elementos = {
            nomeFantasia: document.getElementById('nomeFantasia'),
            razaoSocial: document.getElementById('razaoSocial'),
            ramoAtividade: document.getElementById('ramoAtividade'),
            inscricaoMunicipal: document.getElementById('inscricaoMunicipal'),
            inscricaoEstadual: document.getElementById('inscricaoEstadual'),
            cnpj: document.getElementById('cnpj'),
            endereco: document.getElementById('endereco'),
            numero: document.getElementById('numero'),
            complemento: document.getElementById('complemento'),
            cep: document.getElementById('cep'),
            estado: document.getElementById('estado'),
            cidade: document.getElementById('cidade'),
            bairro: document.getElementById('bairro'),
            telefone: document.getElementById('telefone'),
            telefoneAlt: document.getElementById('telefoneAlt'),
            celular: document.getElementById('celular'),
            contato: document.getElementById('contato'),
            email: document.getElementById('email'),
            formulario: document.getElementById('empresaForm'),
            btnEnviar: document.getElementById('btnEnviar')
        };

        // Helpers
        const helpers = {
            nomeFantasia: document.getElementById('nomeFantasiaHelper'),
            razaoSocial: document.getElementById('razaoSocialHelper'),
            ramoAtividade: document.getElementById('ramoAtividadeHelper'),
            inscricaoMunicipal: document.getElementById('inscricaoMunicipalHelper'),
            inscricaoEstadual: document.getElementById('inscricaoEstadualHelper'),
            cnpj: document.getElementById('cnpjHelper'),
            endereco: document.getElementById('enderecoHelper'),
            numero: document.getElementById('numeroHelper'),
            complemento: document.getElementById('complementoHelper'),
            cep: document.getElementById('cepHelper'),
            estado: document.getElementById('estadoHelper'),
            cidade: document.getElementById('cidadeHelper'),
            bairro: document.getElementById('bairroHelper'),
            telefone: document.getElementById('telefoneHelper'),
            telefoneAlt: document.getElementById('telefoneAltHelper'),
            celular: document.getElementById('celularHelper'),
            contato: document.getElementById('contatoHelper'),
            email: document.getElementById('emailHelper')
        };

        // Mensagens
        const msgSucesso = document.getElementById('msgSucesso');
        const msgErro = document.getElementById('msgErro');

        // Variável para controlar se o CEP já foi preenchido
        let cepPreenchido = false;

        // Função para atualizar aparência dos campos bloqueados
        function atualizarAparenciaCampos() {
            if (cepPreenchido) {
                elementos.estado.classList.add('campo-bloqueado');
                elementos.cidade.classList.add('campo-bloqueado');
            } else {
                elementos.estado.classList.remove('campo-bloqueado');
                elementos.cidade.classList.remove('campo-bloqueado');
            }
        }

        // Máscaras e formatação
        function mascaraCNPJ(e) {
            let valor = e.target.value.replace(/\D/g, '');
            if (valor.length <= 14) {
                if (valor.length > 12) {
                    valor = valor.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
                } else if (valor.length > 8) {
                    valor = valor.replace(/(\d{2})(\d{3})(\d{3})(\d{1,4})/, '$1.$2.$3/$4');
                } else if (valor.length > 5) {
                    valor = valor.replace(/(\d{2})(\d{3})(\d{1,3})/, '$1.$2.$3');
                } else if (valor.length > 2) {
                    valor = valor.replace(/(\d{2})(\d{1,3})/, '$1.$2');
                }
                e.target.value = valor;
            }
        }

        function mascaraTelefone(e) {
            let valor = e.target.value.replace(/\D/g, '');
            if (valor.length <= 11) {
                if (valor.length > 7) {
                    valor = valor.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                } else if (valor.length > 2) {
                    valor = valor.replace(/(\d{2})(\d{1,5})/, '($1) $2');
                } else if (valor.length > 0) {
                    valor = valor.replace(/(\d{0,2})/, '($1');
                }
                e.target.value = valor;
            }
        }

        function mascaraCEP(e) {
            let valor = e.target.value.replace(/\D/g, '');
            if (valor.length <= 8) {
                if (valor.length > 5) {
                    valor = valor.replace(/(\d{5})(\d{3})/, '$1-$2');
                }
                e.target.value = valor;
            }
        }

        function somenteNumeros(e) {
            e.target.value = e.target.value.replace(/\D/g, '');
        }

        // Aplicar máscaras
        elementos.cnpj.addEventListener('input', mascaraCNPJ);
        elementos.telefone.addEventListener('input', mascaraTelefone);
        elementos.telefoneAlt.addEventListener('input', mascaraTelefone);
        elementos.celular.addEventListener('input', mascaraTelefone);
        elementos.cep.addEventListener('input', mascaraCEP);
        
        elementos.inscricaoMunicipal.addEventListener('input', somenteNumeros);
        elementos.inscricaoEstadual.addEventListener('input', somenteNumeros);
        elementos.numero.addEventListener('input', somenteNumeros);

        // ===== CARREGAR ESTADOS =====
        async function carregarEstados() {
            try {
                const response = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados');
                const estados = await response.json();
                estados.sort((a, b) => a.nome.localeCompare(b.nome));
                
                elementos.estado.innerHTML = '<option value="" disabled selected>Selecione o estado</option>';
                estados.forEach(uf => {
                    const option = document.createElement('option');
                    option.value = uf.sigla;
                    option.textContent = `${uf.nome} (${uf.sigla})`;
                    elementos.estado.appendChild(option);
                });
                
                helpers.estado.textContent = `${estados.length} estados carregados`;
                helpers.estado.className = 'helper-text success-msg';
            } catch (error) {
                console.warn('Erro ao carregar estados, usando fallback');
                const fallback = ['AC', 'AL', 'AP', 'AM', 'BA', 'CE', 'DF', 'ES', 'GO', 'MA', 'MT', 'MS', 'MG', 'PA', 'PB', 'PR', 'PE', 'PI', 'RJ', 'RN', 'RS', 'RO', 'RR', 'SC', 'SP', 'SE', 'TO'];
                
                elementos.estado.innerHTML = '<option value="" disabled selected>Selecione o estado</option>';
                fallback.sort().forEach(sigla => {
                    const option = document.createElement('option');
                    option.value = sigla;
                    option.textContent = sigla;
                    elementos.estado.appendChild(option);
                });
            }
        }
        carregarEstados();

        // ===== CARREGAR CIDADES =====
        elementos.estado.addEventListener('change', async function() {
            // Se o CEP já foi preenchido, não permitir alterar o estado
            if (cepPreenchido) {
                alert('Estado não pode ser alterado após preenchimento do CEP.');
                this.value = this.dataset.valorAnterior;
                return;
            }
            
            const uf = this.value;
            elementos.cidade.disabled = true;
            elementos.cidade.innerHTML = '<option value="" disabled selected>Carregando cidades...</option>';
            
            try {
                const response = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                if (!response.ok) throw new Error('Erro na API');
                const cidades = await response.json();
                cidades.sort((a, b) => a.nome.localeCompare(b.nome));
                
                elementos.cidade.innerHTML = '<option value="" disabled selected>Selecione a cidade</option>';
                cidades.forEach(cidade => {
                    const option = document.createElement('option');
                    option.value = cidade.nome;
                    option.textContent = cidade.nome;
                    elementos.cidade.appendChild(option);
                });
                
                elementos.cidade.disabled = false;
                helpers.cidade.textContent = `${cidades.length} cidades carregadas`;
                helpers.cidade.className = 'helper-text success-msg';
                
            } catch (error) {
                elementos.cidade.innerHTML = '<option value="" disabled selected>Erro ao carregar</option>';
                helpers.cidade.innerHTML = '<i class="fas fa-exclamation-circle"></i> Erro ao carregar cidades';
                helpers.cidade.className = 'helper-text error-msg';
            }
            
            // Salvar valor anterior
            this.dataset.valorAnterior = uf;
        });

        // ===== BUSCAR CEP =====
        elementos.cep.addEventListener('blur', async function() {
            const cep = this.value.replace(/\D/g, '');
            if (cep.length !== 8) return;
            
            try {
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const dados = await response.json();
                
                if (!dados.erro) {
                    elementos.endereco.value = dados.logradouro || '';
                    elementos.bairro.value = dados.bairro || '';
                    
                    if (dados.uf) {
                        // Selecionar estado
                        Array.from(elementos.estado.options).forEach(option => {
                            if (option.value === dados.uf) {
                                option.selected = true;
                                // Salvar valor no dataset
                                elementos.estado.dataset.valorAnterior = dados.uf;
                                
                                // Disparar evento para carregar cidades
                                const event = new Event('change', { bubbles: true });
                                elementos.estado.dispatchEvent(event);
                                
                                // Aguardar cidades carregarem e selecionar a cidade
                                const verificarCidades = setInterval(() => {
                                    if (!elementos.cidade.disabled) {
                                        clearInterval(verificarCidades);
                                        
                                        // Tentar selecionar a cidade
                                        let cidadeEncontrada = false;
                                        Array.from(elementos.cidade.options).forEach(opt => {
                                            if (opt.textContent.toLowerCase().includes(dados.localidade.toLowerCase())) {
                                                opt.selected = true;
                                                cidadeEncontrada = true;
                                            }
                                        });
                                        
                                        if (!cidadeEncontrada && dados.localidade) {
                                            // Se não encontrar exatamente, adicionar como opção
                                            const option = document.createElement('option');
                                            option.value = dados.localidade;
                                            option.textContent = dados.localidade;
                                            option.selected = true;
                                            elementos.cidade.appendChild(option);
                                        }
                                        
                                        // Marcar que o CEP foi preenchido
                                        cepPreenchido = true;
                                        atualizarAparenciaCampos();
                                        
                                        // Mensagem de sucesso
                                        helpers.cidade.innerHTML = '<i class="fas fa-check-circle"></i> Cidade preenchida pelo CEP';
                                        helpers.cidade.className = 'helper-text success-msg';
                                    }
                                }, 100);
                            }
                        });
                    }
                    
                    helpers.cep.innerHTML = '<i class="fas fa-check-circle"></i> CEP encontrado';
                    helpers.cep.className = 'helper-text success-msg';
                } else {
                    helpers.cep.innerHTML = '<i class="fas fa-exclamation-circle"></i> CEP não encontrado';
                    helpers.cep.className = 'helper-text error-msg';
                    cepPreenchido = false;
                    atualizarAparenciaCampos();
                }
            } catch (error) {
                helpers.cep.innerHTML = '<i class="fas fa-exclamation-circle"></i> Erro ao buscar CEP';
                helpers.cep.className = 'helper-text error-msg';
                cepPreenchido = false;
                atualizarAparenciaCampos();
            }
        });

        // Bloquear alteração da cidade após CEP preenchido
        elementos.cidade.addEventListener('mousedown', function(e) {
            if (cepPreenchido) {
                e.preventDefault();
                alert('Cidade não pode ser alterada após preenchimento do CEP.');
                return false;
            }
        });

        elementos.cidade.addEventListener('change', function(e) {
            if (cepPreenchido) {
                // Se tentou mudar, voltar ao valor anterior
                this.value = this.dataset.valorAnterior;
                alert('Cidade não pode ser alterada após preenchimento do CEP.');
                e.preventDefault();
                return false;
            }
            // Salvar valor atual para referência
            this.dataset.valorAnterior = this.value;
        });

        // Bloquear alteração do estado após CEP preenchido
        elementos.estado.addEventListener('mousedown', function(e) {
            if (cepPreenchido) {
                e.preventDefault();
                alert('Estado não pode ser alterado após preenchimento do CEP.');
                return false;
            }
        });

        elementos.estado.addEventListener('change', function(e) {
            if (cepPreenchido) {
                // Se tentou mudar, voltar ao valor anterior
                this.value = this.dataset.valorAnterior;
                alert('Estado não pode ser alterado após preenchimento do CEP.');
                e.preventDefault();
                return false;
            }
            // Salvar valor atual para referência
            this.dataset.valorAnterior = this.value;
        });

        // ===== FUNÇÕES DE VALIDAÇÃO =====
        function mostrarErro(helper, elemento, mensagem) {
            helper.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${mensagem}`;
            helper.className = 'helper-text error-msg';
            elemento.classList.add('error');
            elemento.classList.remove('success');
        }

        function mostrarSucesso(helper, elemento, mensagem) {
            helper.innerHTML = `<i class="fas fa-check-circle"></i> ${mensagem}`;
            helper.className = 'helper-text success-msg';
            elemento.classList.add('success');
            elemento.classList.remove('error');
        }

        function limparHelper(helper, elemento) {
            if (helper) {
                helper.innerHTML = '';
                helper.className = 'helper-text';
            }
            if (elemento) {
                elemento.classList.remove('error', 'success');
            }
        }

        // Validações específicas
        function validarNomeFantasia() {
            const val = elementos.nomeFantasia.value.trim();
            if (val === '') {
                mostrarErro(helpers.nomeFantasia, elementos.nomeFantasia, 'Nome fantasia é obrigatório');
                return false;
            }
            if (val.length < 3) {
                mostrarErro(helpers.nomeFantasia, elementos.nomeFantasia, 'Mínimo 3 caracteres');
                return false;
            }
            mostrarSucesso(helpers.nomeFantasia, elementos.nomeFantasia, 'Nome válido');
            return true;
        }

        function validarRazaoSocial() {
            const val = elementos.razaoSocial.value.trim();
            if (val === '') {
                mostrarErro(helpers.razaoSocial, elementos.razaoSocial, 'Razão social é obrigatória');
                return false;
            }
            if (val.length < 5) {
                mostrarErro(helpers.razaoSocial, elementos.razaoSocial, 'Mínimo 5 caracteres');
                return false;
            }
            mostrarSucesso(helpers.razaoSocial, elementos.razaoSocial, 'Razão social válida');
            return true;
        }

        function validarRamoAtividade() {
            if (!elementos.ramoAtividade.value) {
                mostrarErro(helpers.ramoAtividade, elementos.ramoAtividade, 'Selecione o ramo de atividade');
                return false;
            }
            mostrarSucesso(helpers.ramoAtividade, elementos.ramoAtividade, 'Ramo selecionado');
            return true;
        }

        function validarInscricaoMunicipal() {
            const val = elementos.inscricaoMunicipal.value.trim();
            if (val !== '' && !/^\d+$/.test(val)) {
                mostrarErro(helpers.inscricaoMunicipal, elementos.inscricaoMunicipal, 'Apenas números');
                return false;
            }
            if (val !== '') {
                mostrarSucesso(helpers.inscricaoMunicipal, elementos.inscricaoMunicipal, 'Válido');
            } else {
                limparHelper(helpers.inscricaoMunicipal, elementos.inscricaoMunicipal);
            }
            return true;
        }

        function validarInscricaoEstadual() {
            const val = elementos.inscricaoEstadual.value.trim();
            if (val !== '' && !/^\d+$/.test(val)) {
                mostrarErro(helpers.inscricaoEstadual, elementos.inscricaoEstadual, 'Apenas números');
                return false;
            }
            if (val !== '') {
                mostrarSucesso(helpers.inscricaoEstadual, elementos.inscricaoEstadual, 'Válido');
            } else {
                limparHelper(helpers.inscricaoEstadual, elementos.inscricaoEstadual);
            }
            return true;
        }

        function validarCnpj() {
            const val = elementos.cnpj.value.replace(/[^\d]/g, '');
            if (val === '') {
                mostrarErro(helpers.cnpj, elementos.cnpj, 'CNPJ é obrigatório');
                return false;
            }
            if (val.length !== 14) {
                mostrarErro(helpers.cnpj, elementos.cnpj, 'CNPJ deve ter 14 dígitos');
                return false;
            }
            if (/^(\d)\1+$/.test(val)) {
                mostrarErro(helpers.cnpj, elementos.cnpj, 'CNPJ inválido');
                return false;
            }
            mostrarSucesso(helpers.cnpj, elementos.cnpj, 'CNPJ válido');
            return true;
        }

        function validarEndereco() {
            const val = elementos.endereco.value.trim();
            if (val === '') {
                mostrarErro(helpers.endereco, elementos.endereco, 'Endereço é obrigatório');
                return false;
            }
            if (val.length < 5) {
                mostrarErro(helpers.endereco, elementos.endereco, 'Endereço muito curto');
                return false;
            }
            mostrarSucesso(helpers.endereco, elementos.endereco, 'Endereço válido');
            return true;
        }

        function validarNumero() {
            const val = elementos.numero.value.trim();
            if (val === '') {
                mostrarErro(helpers.numero, elementos.numero, 'Número é obrigatório');
                return false;
            }
            if (!/^\d+$/.test(val)) {
                mostrarErro(helpers.numero, elementos.numero, 'Apenas números');
                return false;
            }
            mostrarSucesso(helpers.numero, elementos.numero, 'Número válido');
            return true;
        }

        function validarComplemento() {
            const val = elementos.complemento.value.trim();
            if (val !== '' && !/^[a-zA-Z0-9\s\-.,]+$/.test(val)) {
                mostrarErro(helpers.complemento, elementos.complemento, 'Caracteres inválidos');
                return false;
            }
            if (val !== '') {
                mostrarSucesso(helpers.complemento, elementos.complemento, 'Válido');
            } else {
                limparHelper(helpers.complemento, elementos.complemento);
            }
            return true;
        }

        function validarCep() {
            const val = elementos.cep.value.replace(/\D/g, '');
            if (val === '') {
                mostrarErro(helpers.cep, elementos.cep, 'CEP é obrigatório');
                return false;
            }
            if (val.length !== 8) {
                mostrarErro(helpers.cep, elementos.cep, 'CEP deve ter 8 dígitos');
                return false;
            }
            mostrarSucesso(helpers.cep, elementos.cep, 'CEP válido');
            return true;
        }

        function validarEstado() {
            if (!elementos.estado.value) {
                mostrarErro(helpers.estado, elementos.estado, 'Selecione o estado');
                return false;
            }
            mostrarSucesso(helpers.estado, elementos.estado, 'Estado selecionado');
            return true;
        }

        function validarCidade() {
            if (!elementos.cidade.value) {
                mostrarErro(helpers.cidade, elementos.cidade, 'Selecione a cidade');
                return false;
            }
            mostrarSucesso(helpers.cidade, elementos.cidade, 'Cidade selecionada');
            return true;
        }

        function validarBairro() {
            const val = elementos.bairro.value.trim();
            if (val === '') {
                mostrarErro(helpers.bairro, elementos.bairro, 'Bairro é obrigatório');
                return false;
            }
            if (!/^[a-zA-Z0-9\s\-.,]+$/.test(val)) {
                mostrarErro(helpers.bairro, elementos.bairro, 'Caracteres inválidos');
                return false;
            }
            mostrarSucesso(helpers.bairro, elementos.bairro, 'Bairro válido');
            return true;
        }

        function validarTelefone() {
            const val = elementos.telefone.value.replace(/\D/g, '');
            if (val === '') {
                mostrarErro(helpers.telefone, elementos.telefone, 'Telefone é obrigatório');
                return false;
            }
            if (val.length < 10 || val.length > 11) {
                mostrarErro(helpers.telefone, elementos.telefone, 'Telefone deve ter 10 ou 11 dígitos');
                return false;
            }
            mostrarSucesso(helpers.telefone, elementos.telefone, 'Telefone válido');
            return true;
        }

        function validarTelefoneAlt() {
            const val = elementos.telefoneAlt.value.replace(/\D/g, '');
            if (val !== '' && (val.length < 10 || val.length > 11)) {
                mostrarErro(helpers.telefoneAlt, elementos.telefoneAlt, 'Telefone deve ter 10 ou 11 dígitos');
                return false;
            }
            if (val !== '') {
                mostrarSucesso(helpers.telefoneAlt, elementos.telefoneAlt, 'Válido');
            } else {
                limparHelper(helpers.telefoneAlt, elementos.telefoneAlt);
            }
            return true;
        }

        function validarCelular() {
            const val = elementos.celular.value.replace(/\D/g, '');
            if (val === '') {
                mostrarErro(helpers.celular, elementos.celular, 'Celular é obrigatório');
                return false;
            }
            if (val.length !== 11) {
                mostrarErro(helpers.celular, elementos.celular, 'Celular deve ter 11 dígitos (com DDD)');
                return false;
            }
            mostrarSucesso(helpers.celular, elementos.celular, 'Celular válido');
            return true;
        }

        function validarContato() {
            const val = elementos.contato.value.trim();
            if (val === '') {
                mostrarErro(helpers.contato, elementos.contato, 'Nome do contato é obrigatório');
                return false;
            }
            if (val.length < 3) {
                mostrarErro(helpers.contato, elementos.contato, 'Mínimo 3 caracteres');
                return false;
            }
            if (!/^[a-zA-ZÀ-ÖØ-öø-ÿ\s]+$/.test(val)) {
                mostrarErro(helpers.contato, elementos.contato, 'Apenas letras e espaços');
                return false;
            }
            mostrarSucesso(helpers.contato, elementos.contato, 'Nome válido');
            return true;
        }

        function validarEmail() {
            const val = elementos.email.value.trim();
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (val === '') {
                mostrarErro(helpers.email, elementos.email, 'E-mail é obrigatório');
                return false;
            }
            if (!regex.test(val)) {
                mostrarErro(helpers.email, elementos.email, 'E-mail inválido');
                return false;
            }
            mostrarSucesso(helpers.email, elementos.email, 'E-mail válido');
            return true;
        }

        // Eventos de validação
        elementos.nomeFantasia.addEventListener('input', validarNomeFantasia);
        elementos.nomeFantasia.addEventListener('blur', validarNomeFantasia);
        
        elementos.razaoSocial.addEventListener('input', validarRazaoSocial);
        elementos.razaoSocial.addEventListener('blur', validarRazaoSocial);
        
        elementos.ramoAtividade.addEventListener('change', validarRamoAtividade);
        
        elementos.inscricaoMunicipal.addEventListener('input', validarInscricaoMunicipal);
        elementos.inscricaoMunicipal.addEventListener('blur', validarInscricaoMunicipal);
        
        elementos.inscricaoEstadual.addEventListener('input', validarInscricaoEstadual);
        elementos.inscricaoEstadual.addEventListener('blur', validarInscricaoEstadual);
        
        elementos.cnpj.addEventListener('blur', validarCnpj);
        
        elementos.endereco.addEventListener('input', validarEndereco);
        elementos.endereco.addEventListener('blur', validarEndereco);
        
        elementos.numero.addEventListener('input', validarNumero);
        elementos.numero.addEventListener('blur', validarNumero);
        
        elementos.complemento.addEventListener('input', validarComplemento);
        elementos.complemento.addEventListener('blur', validarComplemento);
        
        elementos.cep.addEventListener('blur', validarCep);
        
        elementos.estado.addEventListener('change', validarEstado);
        elementos.cidade.addEventListener('change', validarCidade);
        
        elementos.bairro.addEventListener('input', validarBairro);
        elementos.bairro.addEventListener('blur', validarBairro);
        
        elementos.telefone.addEventListener('blur', validarTelefone);
        elementos.telefoneAlt.addEventListener('blur', validarTelefoneAlt);
        elementos.celular.addEventListener('blur', validarCelular);
        
        elementos.contato.addEventListener('input', validarContato);
        elementos.contato.addEventListener('blur', validarContato);
        
        elementos.email.addEventListener('input', validarEmail);
        elementos.email.addEventListener('blur', validarEmail);

        function validarFormulario() {
            const validacoes = [
                validarNomeFantasia(),
                validarRazaoSocial(),
                validarRamoAtividade(),
                validarInscricaoMunicipal(),
                validarInscricaoEstadual(),
                validarCnpj(),
                validarEndereco(),
                validarNumero(),
                validarComplemento(),
                validarCep(),
                validarEstado(),
                validarCidade(),
                validarBairro(),
                validarTelefone(),
                validarTelefoneAlt(),
                validarCelular(),
                validarContato(),
                validarEmail()
            ];

            return validacoes.every(v => v === true);
        }

        // Envio do formulário
        elementos.formulario.addEventListener('submit', async function(e) {
            e.preventDefault();

            msgSucesso.classList.add('oculto');
            msgErro.classList.add('oculto');

            if (!validarFormulario()) {
                msgErro.classList.remove('oculto');
                
                const primeiroErro = document.querySelector('.error');
                if (primeiroErro) {
                    primeiroErro.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                return;
            }

            elementos.btnEnviar.disabled = true;
            elementos.btnEnviar.innerHTML = '<span class="loading"></span> ENVIANDO...';

            try {
                // Simulação de envio
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                msgSucesso.classList.remove('oculto');
                elementos.formulario.reset();
                
                // Resetar estado do CEP
                cepPreenchido = false;
                atualizarAparenciaCampos();
                
                // Limpar validações
                Object.keys(helpers).forEach(key => {
                    if (helpers[key] && elementos[key]) {
                        limparHelper(helpers[key], elementos[key]);
                    }
                });
                
                setTimeout(() => {
                    msgSucesso.classList.add('oculto');
                }, 5000);
                
            } catch (error) {
                msgErro.classList.remove('oculto');
            } finally {
                elementos.btnEnviar.disabled = false;
                elementos.btnEnviar.textContent = 'CADASTRAR EMPRESA';
            }
        });

        // Inicializar aparência
        atualizarAparenciaCampos();
    })();
</script>
</body>
</html>
