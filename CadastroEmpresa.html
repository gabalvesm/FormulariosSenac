<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre sua empresa · mesmo design</title>
    <!-- Fonte simples -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #cfd0d1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            padding: 16px;
        }
        .card {
            max-width: 680px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 32px 32px 28px;
            border: 1px solid rgba(0,0,0,0.04);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #004A8D;
            margin-bottom: 4px;
        }
        .gratis {
            font-size: 15px;
            color: #c6c7c9;
            background: #004A8D;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 400;
            margin-bottom: 24px;
            border: 1px solid #d9e1ec;
        }
        .gratis i {
            color: #F7941E;
            margin-right: 6px;
        }
        .linha-divisora {
            height: 1px;
            background: #e2e8f0;
            margin: 22px 0 20px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .dois-campos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .campo label {
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .required-star {
            color: #dc2626;
            font-size: 14px;
        }
        .campo input, 
        .campo select {
            background: #f9fcff;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            outline: none;
            transition: 0.15s;
            font-family: 'Inter', sans-serif;
            width: 100%;
        }
        .campo input:focus, 
        .campo select:focus {
            border-color: #1e4f8a;
            box-shadow: 0 0 0 3px rgba(30,79,138,0.15);
            background: white;
        }
        .campo input.error, 
        .campo select.error {
            border-color: #dc2626;
            background: #fef2f2;
        }
        .campo input.success, 
        .campo select.success {
            border-color: #16a34a;
            background: #f0fdf4;
        }
        .helper-text {
            font-size: 12px;
            margin-left: 6px;
            min-height: 18px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .helper-text.error-msg {
            color: #dc2626;
        }
        .helper-text.error-msg i {
            color: #dc2626;
        }
        .helper-text.success-msg {
            color: #16a34a;
        }
        .helper-text.success-msg i {
            color: #16a34a;
        }
        
        /* botão enviar */
        .btn-enviar {
            background: #005b96;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px auto 0;
            min-width: 200px;
            border: 1px solid #1d3449;
            transition: all 0.6s ease;
            display: block;
        }
        .btn-enviar:hover:not(:disabled) {
            background: #F7941D;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247,148,29,0.3);
        }
        .btn-enviar:disabled {
            background: #cccccc;
            border-color: #999999;
            cursor: not-allowed;
            opacity: 0.7;
        }
       
        .termos-link {
            text-align: right;
            font-size: 11px;
            color: #5d6f88;
            margin-top: 8px;
        }
        .termos-link a {
            color: #0f3f70;
            text-decoration: none;
            font-weight: 500;
        }
        
        .mensagem-envio {
            background: #eaf6e7;
            border: 1px solid #9ec5a0;
            border-radius: 40px;
            padding: 14px 22px;
            font-size: 15px;
            color: #1f4f2b;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 500;
            animation: slideDown 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .mensagem-envio.erro {
            background: #fee9e7;
            border-color: #f1a09c;
            color: #a11f1f;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .oculto {
            display: none;
        }

        /* Indicador de campos obrigatórios */
        .campos-obrigatorios-info {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 16px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }

        .campos-obrigatorios-info .required-star {
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>CADASTRE SUA EMPRESA</h1>
    <div class="gratis"><i class="far fa-check-circle"></i>O cadastro é gratuito ✔️</div>

    <!-- Indicador de campos obrigatórios -->
    <div class="campos-obrigatorios-info">
        <span class="required-star">*</span> Campos obrigatórios
    </div>

    <!-- Mensagens de feedback -->
    <div id="msgSucesso" class="mensagem-envio oculto">
        <i class="fas fa-check-circle"></i> Formulário enviado com sucesso!
    </div>
    <div id="msgErro" class="mensagem-envio erro oculto">
        <i class="fas fa-exclamation-circle"></i> Erro ao enviar formulário. Verifique os campos.
    </div>

    <!-- formulário -->
    <form id="empresaForm" novalidate>
        <!-- linha: nome + endereço -->
        <div class="dois-campos">
            <div class="campo">
                <label>NOME <span class="required-star">*</span></label>
                <input type="text" id="nome" placeholder="Ex: Comercial Dias">
                <div class="helper-text" id="nomeHelper"></div>
            </div>
            <div class="campo">
                <label>ENDEREÇO COMPLETO <span class="required-star">*</span></label>
                <input type="text" id="endereco" placeholder="Av. Paulista, 1000">
                <div class="helper-text" id="enderecoHelper"></div>
            </div>
        </div>

        <!-- bairro + cidade -->
        <div class="dois-campos">
            <div class="campo">
                <label>BAIRRO <span class="required-star">*</span></label>
                <input type="text" id="bairro" placeholder="Centro">
                <div class="helper-text" id="bairroHelper"></div>
            </div>
            <div class="campo">
                <label>CIDADE (BA) <span class="required-star">*</span></label>
                <select id="cidade">
                    <option value="" disabled selected>Carregando cidades...</option>
                </select>
                <div class="helper-text" id="cidadeHelper"></div>
            </div>
        </div>

        <!-- responsável + cnpj -->
        <div class="dois-campos">
            <div class="campo">
                <label>RESPONSÁVEL <span class="required-star">*</span></label>
                <input type="text" id="responsavel" placeholder="Nome completo">
                <div class="helper-text" id="responsavelHelper"></div>
            </div>
            <div class="campo">
                <label>CNPJ <span class="required-star">*</span></label>
                <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18">
                <div class="helper-text" id="cnpjHelper"></div>
            </div>
        </div>

        <!-- email + telefone -->
        <div class="dois-campos">
            <div class="campo">
                <label>E-MAIL <span class="required-star">*</span></label>
                <input type="email" id="email" placeholder="contato@empresa.com">
                <div class="helper-text" id="emailHelper"></div>
            </div>
            <div class="campo">
                <label>TELEFONE <span class="required-star">*</span></label>
                <input type="tel" id="telefone" placeholder="(71) 98888-7777" maxlength="15">
                <div class="helper-text" id="telefoneHelper"></div>
            </div>
        </div>

        <!-- Nº pessoas + área de interesse -->
        <div class="dois-campos">
            <div class="campo">
                <label>Nº DE PESSOAS CAPACITADAS <span class="required-star">*</span></label>
                <select id="numPessoas">
                    <option value="" disabled selected>Selecione</option>
                    <option value="1 pessoa">1 pessoa</option>
                    <option value="2 pessoas">2 pessoas</option>
                    <option value="3 pessoas">3 pessoas</option>
                    <option value="4 pessoas">4 pessoas</option>
                    <option value="4 ou mais">4 pessoas ou mais</option>
                </select>
                <div class="helper-text" id="numPessoasHelper"></div>
            </div>
            <div class="campo">
                <label>ÁREAS DE INTERESSE <span class="required-star">*</span></label>
                <select id="areaInteresse">
                    <option value="" disabled selected>Selecione</option>
                    <option value="Comércio exterior">Comércio exterior</option>
                    <option value="Finanças">Finanças</option>
                    <option value="Logística">Logística</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Vendas">Vendas</option>
                </select>
                <div class="helper-text" id="areaHelper"></div>
            </div>
        </div>

        <!-- BOTÃO ENVIAR -->
        <button type="submit" class="btn-enviar" id="btnEnviar">ENVIAR FORMULÁRIO</button>
    </form>
</div>

<script>
    (function() {
        'use strict';

        // ------------------- ELEMENTOS DO FORMULÁRIO -------------------
        const elementos = {
            nome: document.getElementById('nome'),
            endereco: document.getElementById('endereco'),
            bairro: document.getElementById('bairro'),
            cidade: document.getElementById('cidade'),
            responsavel: document.getElementById('responsavel'),
            cnpj: document.getElementById('cnpj'),
            email: document.getElementById('email'),
            telefone: document.getElementById('telefone'),
            numPessoas: document.getElementById('numPessoas'),
            areaInteresse: document.getElementById('areaInteresse'),
            btnEnviar: document.getElementById('btnEnviar'),
            formulario: document.getElementById('empresaForm')
        };

        // Helpers
        const helpers = {
            nome: document.getElementById('nomeHelper'),
            endereco: document.getElementById('enderecoHelper'),
            bairro: document.getElementById('bairroHelper'),
            cidade: document.getElementById('cidadeHelper'),
            responsavel: document.getElementById('responsavelHelper'),
            cnpj: document.getElementById('cnpjHelper'),
            email: document.getElementById('emailHelper'),
            telefone: document.getElementById('telefoneHelper'),
            numPessoas: document.getElementById('numPessoasHelper'),
            area: document.getElementById('areaHelper')
        };

        // Mensagens
        const msgSucesso = document.getElementById('msgSucesso');
        const msgErro = document.getElementById('msgErro');

        // ------------------- MÁSCARAS -------------------
        function mascaraCNPJ(e) {
            let valor = e.target.value.replace(/\D/g, '');
            if (valor.length <= 14) {
                if (valor.length > 12) {
                    valor = valor.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
                } else if (valor.length > 8) {
                    valor = valor.replace(/(\d{2})(\d{3})(\d{3})(\d{1,4})/, '$1.$2.$3/$4');
                } else if (valor.length > 5) {
                    valor = valor.replace(/(\d{2})(\d{3})(\d{1,3})/, '$1.$2.$3');
                } else if (valor.length > 2) {
                    valor = valor.replace(/(\d{2})(\d{1,3})/, '$1.$2');
                }
                e.target.value = valor;
            }
            validarCnpj();
        }

        function mascaraTelefone(e) {
            let valor = e.target.value.replace(/\D/g, '');
            if (valor.length <= 11) {
                if (valor.length > 7) {
                    valor = valor.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                } else if (valor.length > 2) {
                    valor = valor.replace(/(\d{2})(\d{1,5})/, '($1) $2');
                }
                e.target.value = valor;
            }
            validarTelefone();
        }

        elementos.cnpj.addEventListener('input', mascaraCNPJ);
        elementos.telefone.addEventListener('input', mascaraTelefone);

        // ------------------- CARREGAR CIDADES DA BAHIA -------------------
        async function carregarCidadesBa() {
            try {
                const response = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados/29/municipios');
                if (!response.ok) throw new Error('falha na api');
                const municipios = await response.json();
                municipios.sort((a,b) => a.nome.localeCompare(b.nome));
                
                elementos.cidade.innerHTML = '<option value="" disabled selected>Selecione a cidade</option>';
                municipios.forEach(m => {
                    const option = document.createElement('option');
                    option.value = m.nome;
                    option.textContent = m.nome;
                    elementos.cidade.appendChild(option);
                });
                
                helpers.cidade.textContent = `${municipios.length} cidades carregadas`;
                helpers.cidade.className = 'helper-text success-msg';
            } catch (error) {
                console.warn('Erro ao buscar cidades, usando lista fallback');
                const fallback = ['Salvador', 'Feira de Santana', 'Vitória da Conquista', 'Camaçari', 'Itabuna', 'Juazeiro', 'Ilhéus', 'Lauro de Freitas', 'Jequié', 'Alagoinhas'];
                
                elementos.cidade.innerHTML = '<option value="" disabled selected>Selecione a cidade</option>';
                fallback.sort().forEach(cidade => {
                    const option = document.createElement('option');
                    option.value = cidade;
                    option.textContent = cidade;
                    elementos.cidade.appendChild(option);
                });
                
                helpers.cidade.textContent = 'Modo offline - cidades principais';
            }
        }
        carregarCidadesBa();

        // ------------------- FUNÇÕES DE VALIDAÇÃO -------------------
        function mostrarErro(helper, elemento, mensagem) {
            helper.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${mensagem}`;
            helper.className = 'helper-text error-msg';
            elemento.classList.add('error');
            elemento.classList.remove('success');
        }

        function mostrarSucesso(helper, elemento, mensagem) {
            helper.innerHTML = `<i class="fas fa-check-circle"></i> ${mensagem}`;
            helper.className = 'helper-text success-msg';
            elemento.classList.add('success');
            elemento.classList.remove('error');
        }

        function limparHelper(helper, elemento) {
            helper.innerHTML = '';
            helper.className = 'helper-text';
            elemento.classList.remove('error', 'success');
        }

        // Validações específicas
        function validarNome() {
            const val = elementos.nome.value.trim();
            if (val === '') {
                mostrarErro(helpers.nome, elementos.nome, 'Nome da empresa é obrigatório');
                return false;
            }
            if (val.length < 3) {
                mostrarErro(helpers.nome, elementos.nome, 'Nome deve ter pelo menos 3 caracteres');
                return false;
            }
            if (/[^a-zA-Z0-9\s,.\-\/]/.test(val)) {
                mostrarErro(helpers.nome, elementos.nome, 'Caracteres especiais não permitidos');
                return false;
            }
            mostrarSucesso(helpers.nome, elementos.nome, 'Nome válido');
            return true;
        }

        function validarEndereco() {
            const val = elementos.endereco.value.trim();
            if (val === '') {
                mostrarErro(helpers.endereco, elementos.endereco, 'Endereço é obrigatório');
                return false;
            }
            if (val.length < 5) {
                mostrarErro(helpers.endereco, elementos.endereco, 'Endereço muito curto');
                return false;
            }
            mostrarSucesso(helpers.endereco, elementos.endereco, 'Endereço válido');
            return true;
        }

        function validarBairro() {
            const val = elementos.bairro.value.trim();
            if (val === '') {
                mostrarErro(helpers.bairro, elementos.bairro, 'Bairro é obrigatório');
                return false;
            }
            if (val.length < 3) {
                mostrarErro(helpers.bairro, elementos.bairro, 'Bairro muito curto');
                return false;
            }
            if (/[^a-zA-Z0-9\sáàâãéèêíïóôõöúçñÁÀÂÃÉÈÊÍÏÓÔÕÖÚÇÑ,.\-\/]/.test(val)) {
                mostrarErro(helpers.bairro, elementos.bairro, 'Caracteres especiais não permitidos');
                return false;
            }
            mostrarSucesso(helpers.bairro, elementos.bairro, 'Bairro válido');
            return true;
        }

        function validarResponsavel() {
            const val = elementos.responsavel.value.trim();
            if (val === '') {
                mostrarErro(helpers.responsavel, elementos.responsavel, 'Nome do responsável é obrigatório');
                return false;
            }
            if (val.length < 3) {
                mostrarErro(helpers.responsavel, elementos.responsavel, 'Nome deve ter pelo menos 3 caracteres');
                return false;
            }
            if (/[^a-zA-ZÀ-ÖØ-öø-ÿ\s]/.test(val)) {
                mostrarErro(helpers.responsavel, elementos.responsavel, 'Apenas letras e espaços');
                return false;
            }
            mostrarSucesso(helpers.responsavel, elementos.responsavel, 'Nome válido');
            return true;
        }

        function validarCnpj() {
            const val = elementos.cnpj.value.replace(/[^\d]/g, '');
            if (val === '') {
                mostrarErro(helpers.cnpj, elementos.cnpj, 'CNPJ é obrigatório');
                return false;
            }
            if (val.length !== 14) {
                mostrarErro(helpers.cnpj, elementos.cnpj, 'CNPJ deve ter 14 dígitos');
                return false;
            }
            if (/^(\d)\1+$/.test(val)) {
                mostrarErro(helpers.cnpj, elementos.cnpj, 'CNPJ inválido');
                return false;
            }
            mostrarSucesso(helpers.cnpj, elementos.cnpj, 'CNPJ válido');
            return true;
        }

        function validarEmail() {
            const val = elementos.email.value.trim();
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (val === '') {
                mostrarErro(helpers.email, elementos.email, 'E-mail é obrigatório');
                return false;
            }
            if (!regex.test(val)) {
                mostrarErro(helpers.email, elementos.email, 'E-mail inválido');
                return false;
            }
            mostrarSucesso(helpers.email, elementos.email, 'E-mail válido');
            return true;
        }

        function validarTelefone() {
            const val = elementos.telefone.value.replace(/\D/g, '');
            if (val === '') {
                mostrarErro(helpers.telefone, elementos.telefone, 'Telefone é obrigatório');
                return false;
            }
            if (val.length < 10 || val.length > 11) {
                mostrarErro(helpers.telefone, elementos.telefone, 'Telefone deve ter 10 ou 11 dígitos');
                return false;
            }
            mostrarSucesso(helpers.telefone, elementos.telefone, 'Telefone válido');
            return true;
        }

        function validarCidade() {
            if (!elementos.cidade.value) {
                mostrarErro(helpers.cidade, elementos.cidade, 'Selecione uma cidade');
                return false;
            }
            mostrarSucesso(helpers.cidade, elementos.cidade, 'Cidade selecionada');
            return true;
        }

        function validarNumPessoas() {
            if (!elementos.numPessoas.value) {
                mostrarErro(helpers.numPessoas, elementos.numPessoas, 'Selecione o número de pessoas');
                return false;
            }
            mostrarSucesso(helpers.numPessoas, elementos.numPessoas, 'Opção selecionada');
            return true;
        }

        function validarArea() {
            if (!elementos.areaInteresse.value) {
                mostrarErro(helpers.area, elementos.areaInteresse, 'Selecione uma área de interesse');
                return false;
            }
            mostrarSucesso(helpers.area, elementos.areaInteresse, 'Área selecionada');
            return true;
        }

        // ==================== EVENTOS DE VALIDAÇÃO ====================
        elementos.nome.addEventListener('input', validarNome);
        elementos.nome.addEventListener('blur', validarNome);
        
        elementos.endereco.addEventListener('input', validarEndereco);
        elementos.endereco.addEventListener('blur', validarEndereco);
        
        elementos.bairro.addEventListener('input', validarBairro);
        elementos.bairro.addEventListener('blur', validarBairro);
        
        elementos.responsavel.addEventListener('input', validarResponsavel);
        elementos.responsavel.addEventListener('blur', validarResponsavel);
        
        elementos.cnpj.addEventListener('blur', validarCnpj);
        
        elementos.email.addEventListener('input', validarEmail);
        elementos.email.addEventListener('blur', validarEmail);
        
        elementos.cidade.addEventListener('change', validarCidade);
        elementos.cidade.addEventListener('blur', validarCidade);
        
        elementos.numPessoas.addEventListener('change', validarNumPessoas);
        elementos.numPessoas.addEventListener('blur', validarNumPessoas);
        
        elementos.areaInteresse.addEventListener('change', validarArea);
        elementos.areaInteresse.addEventListener('blur', validarArea);

        // ==================== VALIDAÇÃO GERAL ====================
        function validarFormulario() {
            const validacoes = [
                validarNome(),
                validarEndereco(),
                validarBairro(),
                validarResponsavel(),
                validarCnpj(),
                validarEmail(),
                validarTelefone(),
                validarCidade(),
                validarNumPessoas(),
                validarArea()
            ];

            return validacoes.every(v => v === true);
        }

        // ==================== ENVIO DO FORMULÁRIO ====================
        elementos.formulario.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Esconder mensagens anteriores
            msgSucesso.classList.add('oculto');
            msgErro.classList.add('oculto');

            // Validar todos os campos
            if (!validarFormulario()) {
                msgErro.classList.remove('oculto');
                
                // Rolar para o primeiro erro
                const primeiroErro = document.querySelector('.error');
                if (primeiroErro) {
                    primeiroErro.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                return;
            }

            // Simular envio
            elementos.btnEnviar.disabled = true;
            elementos.btnEnviar.textContent = 'ENVIANDO...';

            try {
                // Simulação de envio
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Sucesso
                msgSucesso.classList.remove('oculto');
                elementos.formulario.reset();
                
                // Limpar todas as validações
                Object.keys(helpers).forEach(key => {
                    if (helpers[key] && elementos[key]) {
                        limparHelper(helpers[key], elementos[key]);
                    }
                });
                
                // Esconder mensagem após 5 segundos
                setTimeout(() => {
                    msgSucesso.classList.add('oculto');
                }, 5000);
                
            } catch (error) {
                msgErro.classList.remove('oculto');
            } finally {
                elementos.btnEnviar.disabled = false;
                elementos.btnEnviar.textContent = 'ENVIAR FORMULÁRIO';
            }
        });
    })();
</script>
</body>
</html>
