<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre sua empresa · mesmo design</title>
    <!-- Fonte simples -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #cfd0d1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            padding: 16px;
        }
        .card {
            max-width: 680px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 32px 32px 28px;
            border: 1px solid rgba(0,0,0,0.04);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #004A8D;
            margin-bottom: 4px;
        }
        .gratis {
            font-size: 15px;
            color: #c6c7c9;
            background: #004A8D;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 400;
            margin-bottom: 24px;
            border: 1px solid #d9e1ec;
        }
        .linha-divisora {
            height: 1px;
            background: #e2e8f0;
            margin: 22px 0 20px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .dois-campos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .campo label {
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .campo input, .campo select {
            background: #f9fcff;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            outline: none;
            transition: 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .campo input:focus, .campo select:focus {
            border-color: #1e4f8a;
            box-shadow: 0 0 0 3px rgba(30,79,138,0.15);
            background: white;
        }
        .campo input.error, .campo select.error {
            border-color: #c2410c;
            background: #fff6f2;
        }
        .helper-text {
            font-size: 12px;
            color: #64748b;
            margin-left: 6px;
            min-height: 18px;
        }
        .helper-text.error-msg {
            color: #b91c1c;
        }
        .helper-text.success-msg {
            color: #15803d;
        }
        /* botão enviar */
        .btn-enviar {
                      background:#004A8D;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin: 12px 0 18px;
            transition: background 0.6s ease, transform 0.2s ease, box-shadow 0.2s ease;
            color: white;

        }
        .btn-enviar:hover {
            transform: translateY(-2px);
            background: #F7941D;
        }
       
        .termos-link {
            text-align: right;
            font-size: 11px;
            color: #5d6f88;
            margin-top: 8px;
        }
        .termos-link a {
            color: #0f3f70;
            text-decoration: none;
            font-weight: 500;
        }
      
        i.fa-robot {
            opacity: 0.7;
            margin-right: 4px;
        }
        .mensagem-envio {
            background: #eaf6e7;
            border: 1px solid #9ec5a0;
            border-radius: 40px;
            padding: 14px 22px;
            font-size: 15px;
            color: #1f4f2b;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 500;
        }
        .oculto {
            display: none;
        }
    </style>
</head>
<body>
<div class="card" color="#F7941E">
    <h1>CADASTRE SUA EMPRESA</h1>
    <div class="gratis"><i class="far fa-check-circle" style="margin-right: 6px; color:#F7941E;"></i>O cadastro é gratuito ✔️</div>

    <!-- formulário -->
    <form id="empresaForm" novalidate>
        <!-- linha: nome + endereço (antigo Rua/Av.N°) -->
        <div class="dois-campos">
            <div class="campo">
                <label>NOME <span style="font-weight: 400; color:#5f6f84;"></span></label>
                <input type="text" id="nome" placeholder="Ex: Comercial Dias" value="">
                <div class="helper-text" id="nomeHelper"></div>
            </div>
            <div class="campo">
                <label>ENDEREÇO COMPLETO</label>
                <input type="text" id="endereco" placeholder="Av. Paulista, 1000" value="">
                <div class="helper-text" id="enderecoHelper"></div>
            </div>
        </div>

        <!-- bairro + cidade (dropdown cidades BA) -->
        <div class="dois-campos">
            <div class="campo">
                <label>BAIRRO</label>
                <input type="text" id="bairro" placeholder="Centro" value="">
                <div class="helper-text" id="bairroHelper"></div>
            </div>
            <div class="campo">
                <label>CIDADE (BA)</label>
                <select id="cidade">
                    <option value="" disabled selected>Carregando cidades...</option>
                </select>
                <div class="helper-text" id="cidadeHelper"></div>
            </div>
        </div>

        <!-- responsável + cnpj -->
        <div class="dois-campos">
            <div class="campo">
                <label>RESPONSÁVEL</label>
                <input type="text" id="responsavel" placeholder="Nome completo">
                <div class="helper-text" id="responsavelHelper"></div>
            </div>
            <div class="campo">
                <label>CNPJ</label>
                <input type="text" id="cnpj" placeholder="00.000.000/0000-00">
                <div class="helper-text" id="cnpjHelper"></div>
            </div>
        </div>

        <!-- email + telefone -->
        <div class="dois-campos">
            <div class="campo">
                <label>E-MAIL</label>
                <input type="email" id="email" placeholder="contato@empresa.com">
                <div class="helper-text" id="emailHelper"></div>
            </div>
            <div class="campo">
                <label>TELEFONE</label>
                <input type="tel" id="telefone" placeholder="71988887777" maxlength="11">
                <div class="helper-text" id="telefoneHelper"></div>
            </div>
        </div>

        <!-- Nº pessoas + área de interesse (dropdowns) -->
        <div class="dois-campos">
            <div class="campo">
                <label>Nº DE PESSOAS CAPACITADAS</label>
                <select id="numPessoas">
                    <option value="" disabled selected>Selecione</option>
                    <option value="1 pessoa">1 pessoa</option>
                    <option value="2 pessoas">2 pessoas</option>
                    <option value="3 pessoas">3 pessoas</option>
                    <option value="4 pessoas">4 pessoas</option>
                    <option value="4 ou mais">4 pessoas ou mais</option>
                </select>
            </div>
            <div class="campo">
                <label>ÁREAS DE INTERESSE</label>
                <select id="areaInteresse">
                    <option value="" disabled selected>Selecione</option>
                    <option value="Comércio exterior">Comércio exterior</option>
                    <option value="Finanças">finanças</option>
                    <option value="Logística">logística</option>
                    <option value="Marketing">marketing</option>
                    <option value="Vendas">vendas</option>
                </select>
                <div class="helper-text" id="areaHelper"></div>
            </div>
        </div>

        <!-- BOTÃO ENVIAR (dentro do form, mas vamos tratar com JS) -->
        <button type="submit" class="btn-enviar">ENVIAR FORMULÁRIO</button>

        

        <!-- rodape com os mesmos links da imagem -->
       

        <!-- Mensagem de sucesso (aparece ao enviar válido) -->
        <div id="msgSucesso" class="mensagem-envio oculto">
            <i class="fas fa-check-circle"></i> Formulário enviado com sucesso.
        </div>
    </form>
</div>

<script>
    (function() {
        // ------------------- 1. CONSUMIR API DE CIDADES DA BAHIA (IBGE) -------------------
        const selectCidade = document.getElementById('cidade');
        const cidadeHelper = document.getElementById('cidadeHelper');

        async function carregarCidadesBa() {
            try {
                const response = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados/29/municipios');
                if (!response.ok) throw new Error('falha na api');
                const municipios = await response.json();
                // ordenar alfabeticamente
                municipios.sort((a,b) => a.nome.localeCompare(b.nome));
                selectCidade.innerHTML = '<option value="" disabled selected>Selecione a cidade</option>';
                municipios.forEach(m => {
                    const option = document.createElement('option');
                    option.value = m.nome;
                    option.textContent = m.nome;
                    selectCidade.appendChild(option);
                });
                cidadeHelper.textContent = `${municipios.length} cidades carregadas`;
            } catch (error) {
                console.warn('Erro ao buscar cidades, usando lista fallback');
                cidadeHelper.textContent = 'lista offline (simulação)';
                // fallback com cidades principais da Bahia
                const fallback = ['Salvador', 'Feira de Santana', 'Vitória da Conquista', 'Camaçari', 'Itabuna', 'Juazeiro', 'Ilhéus', 'Lauro de Freitas', 'Jequié', 'Abaíra'];
                selectCidade.innerHTML = '<option value="" disabled selected>Selecione a cidade</option>';
                fallback.forEach(cidade => {
                    const option = document.createElement('option');
                    option.value = cidade;
                    option.textContent = cidade;
                    selectCidade.appendChild(option);
                });
            }
        }
        carregarCidadesBa();

        // ------------------- VALIDAÇÕES INDIVIDUAIS -------------------
        const nome = document.getElementById('nome');
        const endereco = document.getElementById('endereco');
        const bairro = document.getElementById('bairro');
        const responsavel = document.getElementById('responsavel');
        const cnpj = document.getElementById('cnpj');
        const email = document.getElementById('email');
        const telefone = document.getElementById('telefone');
        const numPessoas = document.getElementById('numPessoas');
        const areaInteresse = document.getElementById('areaInteresse');
        // helpers
        const nomeHelper = document.getElementById('nomeHelper');
        const enderecoHelper = document.getElementById('enderecoHelper');
        const bairroHelper = document.getElementById('bairroHelper');
        const responsavelHelper = document.getElementById('responsavelHelper');
        const cnpjHelper = document.getElementById('cnpjHelper');
        const emailHelper = document.getElementById('emailHelper');
        const telefoneHelper = document.getElementById('telefoneHelper');
        const areaHelper = document.getElementById('areaHelper');

        // Validação de campo: não permitir caracteres especiais (nome)
        function validarNome() {
            const val = nome.value.trim();
            if (val === '') { nomeHelper.textContent = 'Campo obrigatório'; nome.classList.add('error'); return false; }
            if (/[^a-zA-Z0-9\s,.\-\/]/.test(val)) {
                nomeHelper.textContent = 'Caracteres especiais não são permitidos';
                nome.classList.add('error');
                return false;
            }
            nomeHelper.textContent = '✓ Nome da empresa é válido';
            nome.classList.remove('error');
            return true;
        }

        // endereço: não permitir caracteres especiais (exceto espaços, vírgulas, pontos, traços, números e letras)
        function validarEndereco() {
            const val = endereco.value.trim();
            if (val === '') { enderecoHelper.textContent = 'Endereço obrigatório'; endereco.classList.add('error'); return false; }
            // permitir letras, números, espaços, vírgulas, pontos, hífen, barra (para n°)
            if (/[^a-zA-Z0-9\s,.\-\/]/.test(val)) {
                enderecoHelper.textContent = 'Caracteres especiais não são permitidos';
                endereco.classList.add('error');
                return false;
            }
            enderecoHelper.textContent = '✓ endereço válido';
            endereco.classList.remove('error');
            return true;
        }

       // bairro: permitindo acentos e caracteres especiais comuns
function validarBairro() {
    const val = bairro.value.trim();
    if (val === '') { 
        bairroHelper.textContent = 'Bairro obrigatório'; 
        bairro.classList.add('error'); 
        return false; 
    }
    
    // CORREÇÃO: adicionei a barra no início e ajustei os acentos
    if (/[^a-zA-Z0-9\sáàâãéèêíïóôõöúçñÁÀÂÃÉÈÊÍÏÓÔÕÖÚÇÑ]/.test(val)) {
        bairroHelper.textContent = 'Caracteres especiais não são permitidos';
        bairro.classList.add('error');
        return false;
    }
    
    bairroHelper.textContent = '✓ bairro válido';
    bairro.classList.remove('error');
    return true;
}

        // responsável: sem números nem caracteres especiais (apenas letras e espaços)
        function validarResponsavel() {
            const val = responsavel.value.trim();
            if (val === '') { responsavelHelper.textContent = 'Nome de responsável obrigatório'; responsavel.classList.add('error'); return false; }
            if (/[^a-zA-ZÀ-ÿ\s]/.test(val)) {  // permite acentos, letras e espaços
                responsavelHelper.textContent = 'Apenas letras e espaços';
                responsavel.classList.add('error');
                return false;
            }
            responsavelHelper.textContent = '✓ Nome de responsável válido';
            responsavel.classList.remove('error');
            return true;
        }

        // CNPJ (validação simplificada de formato e dígitos)
        function validarCnpj() {
            let val = cnpj.value.trim().replace(/[^\d]/g, '');
            if (val === '') { cnpjHelper.textContent = 'CNPJ obrigatório(somente números)'; cnpj.classList.add('error'); return false; }
            if (val.length !== 14) {
                cnpjHelper.textContent = ' CNPJ deve ter 14 números';
                cnpj.classList.add('error');
                return false;
            }
            // validar dígitos repetidos (simples)
            if (/^(\d)\1+$/.test(val)) {
                cnpjHelper.textContent = 'CNPJ inválido';
                cnpj.classList.add('error');
                return false;
            }
            // Pode-se implementar cálculo dos dígitos, mas por simplicidade aceitamos qualquer 14 dígitos não repetidos
            cnpjHelper.textContent = '✓ CNPJ com formato válido';
            cnpj.classList.remove('error');
            return true;
        }

        // e-mail regex
        function validarEmail() {
            const val = email.value.trim();
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (val === '') { emailHelper.textContent = 'E-mail obrigatório'; email.classList.add('error'); return false; }
            if (!regex.test(val)) {
                emailHelper.textContent = 'E-mail inválido';
                email.classList.add('error');
                return false;
            }
            emailHelper.textContent = '✓ E-mail válido';
            email.classList.remove('error');
            return true;
        }

        // telefone: somente números
        function validarTelefone() {
            let val = telefone.value.trim().replace(/\s/g, '');
            if (val === '') { telefoneHelper.textContent = 'Telefone obrigatório'; telefone.classList.add('error'); return false; }
            if (!/^\d+$/.test(val)) {
                telefoneHelper.textContent = 'Somente números são permitidos neste campo.';
                telefone.classList.add('error');
                return false;
            }
            if (val.length < 10 || val.length > 11) {
                telefoneHelper.textContent = '10 ou 11 dígitos';
                telefone.classList.add('error');
                return false;
            }
            telefoneHelper.textContent = '✓ Telefone válido';
            telefone.classList.remove('error');
            return true;
        }

        // cidade: apenas verifica se selecionou (pode ser vazio)
        function validarCidade() {
            if (!selectCidade.value) {
                cidadeHelper.textContent = 'Selecione uma cidade';
                selectCidade.classList.add('error');
                return false;
            }
            cidadeHelper.textContent = '✓ Cidade selecionada';
            selectCidade.classList.remove('error');
            return true;
        }

        // área de interesse: verificar se selecionou
        function validarArea() {
            if (!areaInteresse.value) {
                areaHelper.textContent = 'Escolha uma área de interesse';
                areaInteresse.classList.add('error');
                return false;
            }
            areaHelper.textContent = '✓ Área de interesse selecionada';
            areaInteresse.classList.remove('error');
            return true;
        }

        // eventos blur / input
        nome.addEventListener('input', validarNome);
        endereco.addEventListener('input', validarEndereco);
        bairro.addEventListener('input', validarBairro);
        responsavel.addEventListener('input', validarResponsavel);
        cnpj.addEventListener('input', validarCnpj);
        email.addEventListener('input', validarEmail);
        telefone.addEventListener('input', validarTelefone);
        selectCidade.addEventListener('change', validarCidade);
        areaInteresse.addEventListener('change', validarArea);

        // Para cidade, validar também no blur
        selectCidade.addEventListener('blur', validarCidade);
        areaInteresse.addEventListener('blur', validarArea);

        // validação final no submit
        const form = document.getElementById('empresaForm');
        const msgSucesso = document.getElementById('msgSucesso');
        const fakeCheckbox = document.getElementById('fakeCheckbox');

        // Simular clique no "Não sou um robô" (apenas visual, não interfere)
        fakeCheckbox.addEventListener('click', function(e) {
            e.preventDefault();
            this.classList.toggle('checked');
            // se tiver checked, mantém; apenas visual
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // rodar todas as validações
            const valNome = validarNome();
            const valEnd = validarEndereco();
            const valBairro = validarBairro();
            const valResp = validarResponsavel();
            const valCnpj = validarCnpj();
            const valEmail = validarEmail();
            const valTel = validarTelefone();
            const valCid = validarCidade();
            const valArea = validarArea();
            // numPessoas dropdown não tem validação especial, mas verificamos se está selecionado
            if (!numPessoas.value) {
                alert('Selecione o número de pessoas');
                numPessoas.classList.add('error');
                return;
            } else {
                numPessoas.classList.remove('error');
            }

            if (valNome && valEnd && valBairro && valResp && valCnpj && valEmail && valTel && valCid && valArea) {
                // Tudo ok – mostrar mensagem e simular envio
                msgSucesso.classList.remove('oculto');
                // Esconder após 5 segundos
                setTimeout(() => msgSucesso.classList.add('oculto'), 5000);
                // Opcional: limpar ou apenas feedback
                console.log('Formulário válido, dados:', {
                    nome: nome.value,
                    endereco: endereco.value,
                    bairro: bairro.value,
                    cidade: selectCidade.value,
                    responsavel: responsavel.value,
                    cnpj: cnpj.value,
                    email: email.value,
                    telefone: telefone.value,
                    numPessoas: numPessoas.value,
                    area: areaInteresse.value
                });
                // Você pode resetar, mas mantemos preenchido
            } else {
                alert('Existem campos inválidos. Por favor, corrija antes de enviar.');
            }
        });

        // Remover erro ao digitar nos demais campos (básico)
        numPessoas.addEventListener('change', function() {
            this.classList.remove('error');
        });
    })();
</script>
</body>
</html>
