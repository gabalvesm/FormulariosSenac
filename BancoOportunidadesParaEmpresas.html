<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre sua Empresa - Senac</title>
    <!-- Fonte Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #cfd0d1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            padding: 16px;
        }

        .container {
            max-width: 780px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 32px 32px 28px;
            border: 1px solid rgba(0,0,0,0.04);
        }

        h1 {
            color: #004A8D;
            font-size: 32px;
            margin-bottom: 4px;
            text-align: center;
            padding-bottom: 10px;
            letter-spacing: -0.02em;
        }

        h2 {
            color: #004A8D;
            font-size: 24px;
            margin: 20px 0 20px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #004A8D;
            padding-bottom: 8px;
        }

        h3 {
            color: #333;
            font-size: 20px;
            margin: 30px 0 20px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #ccc;
            padding-bottom: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 0;
            position: relative;
        }

        .campo.full-width {
            grid-column: span 2;
        }

        .campo.full-width-3 {
            grid-column: span 3;
        }

        .campo label {
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .required-star {
            color: #dc2626;
            font-size: 14px;
        }

        .campo input,
        .campo select {
            background: #f9fcff;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            outline: none;
            transition: all 0.15s;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .campo input:focus,
        .campo select:focus {
            border-color: #1e4f8a;
            box-shadow: 0 0 0 3px rgba(30,79,138,0.15);
            background: white;
        }

        .campo input.error,
        .campo select.error {
            border-color: #dc2626;
            background: #fef2f2;
        }

        .campo input.success,
        .campo select.success {
            border-color: #16a34a;
            background: #f0fdf4;
        }

        .helper-text {
            font-size: 12px;
            margin-left: 6px;
            min-height: 18px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .helper-text.error-msg {
            color: #dc2626;
        }

        .helper-text.success-msg {
            color: #16a34a;
        }

        .helper-text i {
            font-size: 12px;
        }       
       
        .btn-submit {
            background: #005b96;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.6s ease;
            display: block;
            margin: 20px auto 0;
            min-width: 200px;
            border: 1px solid #1d3449;
        }

        .btn-submit:hover:not(:disabled) {
            background: #F7941D;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247,148,29,0.3);
        }

        .btn-submit:disabled {
            background: #cccccc;
            border-color: #999999;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Mensagens de retorno */
        .mensagem-envio {
            background: #eaf6e7;
            border: 1px solid #9ec5a0;
            border-radius: 40px;
            padding: 14px 22px;
            font-size: 15px;
            color: #1f4f2b;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 500;
            animation: slideDown 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mensagem-envio.erro {
            background: #fee9e7;
            border-color: #f1a09c;
            color: #a11f1f;
        }

        .mensagem-envio i {
            font-size: 18px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .oculto {
            display: none;
        }

        @media (max-width: 700px) {
            .container {
                padding: 20px;
            }
            
            .form-grid,
            .form-grid-3 {
                grid-template-columns: 1fr;
            }
            
            .campo.full-width,
            .campo.full-width-3 {
                grid-column: span 1;
            }
        }

        /* Indicador de campos obrigatórios */
        .campos-obrigatorios-info {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 16px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }

        .campos-obrigatorios-info .required-star {
            font-size: 14px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #004A8D;
            margin: 30px 0 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid #004A8D;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-building"></i> CADASTRE SUA EMPRESA</h1>
        <p style="text-align: center; margin-bottom: 20px; color: #555;">Programa de Atendimento Corporativo</p>

        <!-- Mensagens de retorno -->
        <div id="msgSucesso" class="mensagem-envio oculto">
            <i class="fa-regular fa-circle-check"></i> Empresa cadastrada com sucesso!
        </div>

        <div id="msgErro" class="mensagem-envio erro oculto">
            <i class="fas fa-exclamation-circle"></i> Erro ao cadastrar. Tente novamente.
        </div>

        <!-- Indicador de campos obrigatórios -->
        <div class="campos-obrigatorios-info">
            <span class="required-star">*</span> Campos obrigatórios
        </div>

        <form id="formulario" novalidate>
            <!-- SOBRE A EMPRESA -->
            <div class="section-title">SOBRE A EMPRESA</div>
            
            <div class="form-grid">
                <!-- Nome Fantasia (obrigatório) -->
                <div class="campo full-width">
                    <label for="nomeFantasia">
                        NOME FANTASIA
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="nomeFantasia" name="nomeFantasia" placeholder="Digite o nome fantasia">
                    <div class="helper-text" id="helper-nomeFantasia"></div>
                </div>

                <!-- Razão Social (obrigatório) -->
                <div class="campo full-width">
                    <label for="razaoSocial">
                        RAZÃO SOCIAL
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="razaoSocial" name="razaoSocial" placeholder="Digite a razão social">
                    <div class="helper-text" id="helper-razaoSocial"></div>
                </div>

                <!-- Ramo de Atividade (obrigatório) -->
                <div class="campo full-width">
                    <label for="ramoAtividade">
                        RAMO DE ATIVIDADE
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="ramoAtividade" name="ramoAtividade" placeholder="Ex.: Comércio, Serviços, Indústria">
                    <div class="helper-text" id="helper-ramoAtividade"></div>
                </div>

                <!-- Inscrição Municipal (opcional) -->
                <div class="campo">
                    <label for="inscricaoMunicipal">INSCRIÇÃO MUNICIPAL</label>
                    <input type="text" id="inscricaoMunicipal" name="inscricaoMunicipal" placeholder="Número da inscrição">
                    <div class="helper-text" id="helper-inscricaoMunicipal"></div>
                </div>

                <!-- Inscrição Estadual (opcional) -->
                <div class="campo">
                    <label for="inscricaoEstadual">INSCRIÇÃO ESTADUAL</label>
                    <input type="text" id="inscricaoEstadual" name="inscricaoEstadual" placeholder="Número da inscrição">
                    <div class="helper-text" id="helper-inscricaoEstadual"></div>
                </div>

                <!-- CNPJ (obrigatório) -->
                <div class="campo full-width">
                    <label for="cnpj">
                        CNPJ
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00" maxlength="18">
                    <div class="helper-text" id="helper-cnpj"></div>
                </div>

                <!-- Endereço (obrigatório) -->
                <div class="campo full-width">
                    <label for="endereco">
                        ENDEREÇO
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="endereco" name="endereco" placeholder="Logradouro">
                    <div class="helper-text" id="helper-endereco"></div>
                </div>
            </div>

            <!-- Número, Complemento, CEP -->
            <div class="form-grid-3">
                <div class="campo">
                    <label for="numero">
                        NÚMERO
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="numero" name="numero" placeholder="Nº">
                    <div class="helper-text" id="helper-numero"></div>
                </div>

                <div class="campo">
                    <label for="complemento">COMPLEMENTO</label>
                    <input type="text" id="complemento" name="complemento" placeholder="Sala, andar, etc.">
                    <div class="helper-text" id="helper-complemento"></div>
                </div>

                <div class="campo">
                    <label for="cep">
                        CEP
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9">
                    <div class="helper-text" id="helper-cep"></div>
                </div>
            </div>

            <!-- Estado, Cidade, Bairro -->
            <div class="form-grid-3">
                <div class="campo">
                    <label for="estado">
                        ESTADO
                        <span class="required-star">*</span>
                    </label>
                    <select id="estado" name="estado">
                        <option value="" disabled selected>Selecionar</option>
                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM">Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="SC">Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                        <option value="SE">Sergipe</option>
                        <option value="TO">Tocantins</option>
                    </select>
                    <div class="helper-text" id="helper-estado"></div>
                </div>

                <div class="campo">
                    <label for="cidade">
                        CIDADE
                        <span class="required-star">*</span>
                    </label>
                    <select id="cidade" name="cidade">
                        <option value="" disabled selected>Selecionar</option>
                    </select>
                    <div class="helper-text" id="helper-cidade"></div>
                </div>

                <div class="campo">
                    <label for="bairro">
                        BAIRRO
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="bairro" name="bairro" placeholder="Bairro">
                    <div class="helper-text" id="helper-bairro"></div>
                </div>
            </div>

            <!-- Telefone, Outro Telefone, Celular -->
            <div class="form-grid-3">
                <div class="campo">
                    <label for="telefone">TELEFONE</label>
                    <input type="text" id="telefone" name="telefone" placeholder="(71) 3333-4444" maxlength="14">
                    <div class="helper-text" id="helper-telefone"></div>
                </div>

                <div class="campo">
                    <label for="outroTelefone">OUTRO TELEFONE</label>
                    <input type="text" id="outroTelefone" name="outroTelefone" placeholder="(71) 3333-4444" maxlength="14">
                    <div class="helper-text" id="helper-outroTelefone"></div>
                </div>

                <div class="campo">
                    <label for="celular">
                        CELULAR
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="celular" name="celular" placeholder="(71) 98888-7777" maxlength="15">
                    <div class="helper-text" id="helper-celular"></div>
                </div>
            </div>

            <!-- SOBRE O CONTATO -->
            <div class="section-title">SOBRE O CONTATO</div>

            <div class="form-grid">
                <div class="campo">
                    <label for="telefoneContato">TELEFONE</label>
                    <input type="text" id="telefoneContato" name="telefoneContato" placeholder="(71) 3333-4444" maxlength="14">
                    <div class="helper-text" id="helper-telefoneContato"></div>
                </div>

                <div class="campo">
                    <label for="nomeContato">
                        NOME DA PESSOA DE CONTATO
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="nomeContato" name="nomeContato" placeholder="Nome completo">
                    <div class="helper-text" id="helper-nomeContato"></div>
                </div>

                <div class="campo full-width">
                    <label for="emailContato">
                        EMAIL
                        <span class="required-star">*</span>
                    </label>
                    <input type="email" id="emailContato" name="emailContato" placeholder="contato@empresa.com">
                    <div class="helper-text" id="helper-emailContato"></div>
                </div>
            </div>

            
            
                        
            <!-- Botão Enviar -->
            <button type="submit" class="btn-submit" id="btnEnviar">ENVIAR</button>
        </form>
    </div>

    <script>
        (function() {
            'use strict';

            // ==================== ELEMENTOS DO FORMULÁRIO ====================
            const elementos = {
                nomeFantasia: document.getElementById('nomeFantasia'),
                razaoSocial: document.getElementById('razaoSocial'),
                ramoAtividade: document.getElementById('ramoAtividade'),
                inscricaoMunicipal: document.getElementById('inscricaoMunicipal'),
                inscricaoEstadual: document.getElementById('inscricaoEstadual'),
                cnpj: document.getElementById('cnpj'),
                endereco: document.getElementById('endereco'),
                numero: document.getElementById('numero'),
                complemento: document.getElementById('complemento'),
                cep: document.getElementById('cep'),
                estado: document.getElementById('estado'),
                cidade: document.getElementById('cidade'),
                bairro: document.getElementById('bairro'),
                telefone: document.getElementById('telefone'),
                outroTelefone: document.getElementById('outroTelefone'),
                celular: document.getElementById('celular'),
                telefoneContato: document.getElementById('telefoneContato'),
                nomeContato: document.getElementById('nomeContato'),
                emailContato: document.getElementById('emailContato'),
                recaptchaCheckbox: document.getElementById('recaptchaCheckbox'),
                recaptchaIcon: document.getElementById('recaptchaIcon'),
                recaptchaInput: document.getElementById('recaptcha'),
                btnEnviar: document.getElementById('btnEnviar'),
                formulario: document.getElementById('formulario')
            };

            // Helpers
            const helpers = {
                nomeFantasia: document.getElementById('helper-nomeFantasia'),
                razaoSocial: document.getElementById('helper-razaoSocial'),
                ramoAtividade: document.getElementById('helper-ramoAtividade'),
                inscricaoMunicipal: document.getElementById('helper-inscricaoMunicipal'),
                inscricaoEstadual: document.getElementById('helper-inscricaoEstadual'),
                cnpj: document.getElementById('helper-cnpj'),
                endereco: document.getElementById('helper-endereco'),
                numero: document.getElementById('helper-numero'),
                complemento: document.getElementById('helper-complemento'),
                cep: document.getElementById('helper-cep'),
                estado: document.getElementById('helper-estado'),
                cidade: document.getElementById('helper-cidade'),
                bairro: document.getElementById('helper-bairro'),
                telefone: document.getElementById('helper-telefone'),
                outroTelefone: document.getElementById('helper-outroTelefone'),
                celular: document.getElementById('helper-celular'),
                telefoneContato: document.getElementById('helper-telefoneContato'),
                nomeContato: document.getElementById('helper-nomeContato'),
                emailContato: document.getElementById('helper-emailContato')
            };

            // Mensagens
            const msgSucesso = document.getElementById('msgSucesso');
            const msgErro = document.getElementById('msgErro');

            // ==================== MÁSCARAS ====================
            function mascaraCNPJ(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 14) {
                    if (valor.length > 12) {
                        valor = valor.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
                    } else if (valor.length > 8) {
                        valor = valor.replace(/^(\d{2})(\d{3})(\d{3})(\d{1,4})/, '$1.$2.$3/$4');
                    } else if (valor.length > 5) {
                        valor = valor.replace(/^(\d{2})(\d{3})(\d{1,3})/, '$1.$2.$3');
                    } else if (valor.length > 2) {
                        valor = valor.replace(/^(\d{2})(\d{1,3})/, '$1.$2');
                    }
                    e.target.value = valor;
                }
                validarCNPJ();
            }

            function mascaraCEP(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 8) {
                    if (valor.length > 5) {
                        valor = valor.replace(/(\d{5})(\d{1,3})/, '$1-$2');
                    }
                    e.target.value = valor;
                }
                validarCEP();
            }

            function mascaraTelefone(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 10) {
                    if (valor.length > 6) {
                        valor = valor.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
                    } else if (valor.length > 2) {
                        valor = valor.replace(/(\d{2})(\d{1,4})/, '($1) $2');
                    }
                    e.target.value = valor;
                }
            }

            function mascaraCelular(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 11) {
                    if (valor.length > 7) {
                        valor = valor.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                    } else if (valor.length > 2) {
                        valor = valor.replace(/(\d{2})(\d{1,5})/, '($1) $2');
                    }
                    e.target.value = valor;
                }
                validarCelular();
            }

            elementos.cnpj.addEventListener('input', mascaraCNPJ);
            elementos.cep.addEventListener('input', mascaraCEP);
            elementos.telefone.addEventListener('input', mascaraTelefone);
            elementos.outroTelefone.addEventListener('input', mascaraTelefone);
            elementos.celular.addEventListener('input', mascaraCelular);
            elementos.telefoneContato.addEventListener('input', mascaraTelefone);

            // ==================== RECAPTCHA ====================
            elementos.recaptchaCheckbox.addEventListener('click', function() {
                const isChecked = elementos.recaptchaInput.value === 'true';
                if (isChecked) {
                    elementos.recaptchaInput.value = 'false';
                    elementos.recaptchaIcon.style.display = 'none';
                    this.classList.remove('checked');
                } else {
                    elementos.recaptchaInput.value = 'true';
                    elementos.recaptchaIcon.style.display = 'block';
                    this.classList.add('checked');
                }
                validarRecaptcha();
            });

            // ==================== BUSCA DE ENDEREÇO ====================
            async function buscarEnderecoPorCEP() {
                const cepNumerico = elementos.cep.value.replace(/\D/g, '');
                
                if (cepNumerico.length !== 8) return;

                helpers.cep.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Buscando endereço...';
                
                try {
                    const response = await fetch(`https://viacep.com.br/ws/${cepNumerico}/json/`);
                    if (!response.ok) throw new Error('Erro na busca');
                    
                    const dados = await response.json();
                    
                    if (dados.erro) {
                        mostrarErro(helpers.cep, elementos.cep, 'CEP não encontrado');
                        return;
                    }
                    
                    elementos.endereco.value = dados.logradouro || '';
                    elementos.bairro.value = dados.bairro || '';
                    
                    if (dados.uf) {
                        const estadoOption = Array.from(elementos.estado.options).find(opt => opt.value === dados.uf);
                        if (estadoOption) {
                            elementos.estado.value = dados.uf;
                        }
                    }
                    
                    if (dados.localidade) {
                        await carregarCidadesPorEstado(dados.uf);
                        setTimeout(() => {
                            const cidadeExistente = Array.from(elementos.cidade.options).find(opt => opt.value === dados.localidade);
                            if (cidadeExistente) {
                                elementos.cidade.value = dados.localidade;
                            } else if (dados.localidade) {
                                const option = document.createElement('option');
                                option.value = dados.localidade;
                                option.textContent = dados.localidade;
                                elementos.cidade.appendChild(option);
                                elementos.cidade.value = dados.localidade;
                            }
                        }, 100);
                    }
                    
                    mostrarSucesso(helpers.cep, elementos.cep, 'CEP encontrado');
                    
                    validarEndereco();
                    validarBairro();
                    validarEstado();
                    validarCidade();
                    
                } catch (error) {
                    mostrarErro(helpers.cep, elementos.cep, 'Erro ao buscar CEP');
                }
            }

            elementos.cep.addEventListener('blur', buscarEnderecoPorCEP);

            // ==================== CARREGAR CIDADES ====================
            async function carregarCidadesPorEstado(uf) {
                if (!uf) return;
                
                try {
                    const response = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                    if (!response.ok) throw new Error('Erro na API');
                    
                    const municipios = await response.json();
                    municipios.sort((a, b) => a.nome.localeCompare(b.nome));
                    
                    elementos.cidade.innerHTML = '<option value="" disabled selected>Selecionar</option>';
                    municipios.forEach(m => {
                        const option = document.createElement('option');
                        option.value = m.nome;
                        option.textContent = m.nome;
                        elementos.cidade.appendChild(option);
                    });
                    
                    helpers.cidade.textContent = `${municipios.length} cidades carregadas`;
                    helpers.cidade.className = 'helper-text success-msg';
                } catch (error) {
                    console.error('Erro ao carregar cidades:', error);
                    elementos.cidade.innerHTML = '<option value="" disabled selected>Selecionar</option>';
                    helpers.cidade.textContent = 'Erro ao carregar cidades';
                    helpers.cidade.className = 'helper-text error-msg';
                }
            }

            elementos.estado.addEventListener('change', function() {
                if (this.value) {
                    carregarCidadesPorEstado(this.value);
                }
                validarEstado();
            });

            // ==================== FUNÇÕES DE VALIDAÇÃO ====================
            function mostrarErro(helper, elemento, mensagem) {
                helper.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${mensagem}`;
                helper.className = 'helper-text error-msg';
                elemento.classList.add('error');
                elemento.classList.remove('success');
            }

            function mostrarSucesso(helper, elemento, mensagem) {
                helper.innerHTML = `<i class="fas fa-check-circle"></i> ${mensagem}`;
                helper.className = 'helper-text success-msg';
                elemento.classList.add('success');
                elemento.classList.remove('error');
            }

            function limparHelper(helper, elemento) {
                helper.innerHTML = '';
                helper.className = 'helper-text';
                elemento.classList.remove('error', 'success');
            }

            // Validações específicas
            function validarNomeFantasia() {
                const val = elementos.nomeFantasia.value.trim();
                if (val === "") {
                    mostrarErro(helpers.nomeFantasia, elementos.nomeFantasia, 'Nome fantasia é obrigatório');
                    return false;
                }
                if (val.length < 3) {
                    mostrarErro(helpers.nomeFantasia, elementos.nomeFantasia, 'Mínimo 3 caracteres');
                    return false;
                }
                mostrarSucesso(helpers.nomeFantasia, elementos.nomeFantasia, 'Válido');
                return true;
            }

            function validarRazaoSocial() {
                const val = elementos.razaoSocial.value.trim();
                if (val === "") {
                    mostrarErro(helpers.razaoSocial, elementos.razaoSocial, 'Razão social é obrigatória');
                    return false;
                }
                if (val.length < 5) {
                    mostrarErro(helpers.razaoSocial, elementos.razaoSocial, 'Mínimo 5 caracteres');
                    return false;
                }
                mostrarSucesso(helpers.razaoSocial, elementos.razaoSocial, 'Válido');
                return true;
            }

            function validarRamoAtividade() {
                const val = elementos.ramoAtividade.value.trim();
                if (val === "") {
                    mostrarErro(helpers.ramoAtividade, elementos.ramoAtividade, 'Ramo de atividade é obrigatório');
                    return false;
                }
                if (val.length < 3) {
                    mostrarErro(helpers.ramoAtividade, elementos.ramoAtividade, 'Mínimo 3 caracteres');
                    return false;
                }
                mostrarSucesso(helpers.ramoAtividade, elementos.ramoAtividade, 'Válido');
                return true;
            }

            function validarCNPJ() {
                const val = elementos.cnpj.value.replace(/[^\d]/g, '');
                if (!val) {
                    mostrarErro(helpers.cnpj, elementos.cnpj, 'CNPJ é obrigatório');
                    return false;
                }
                if (val.length !== 14) {
                    mostrarErro(helpers.cnpj, elementos.cnpj, 'CNPJ deve ter 14 dígitos');
                    return false;
                }
                
                if (/^(\d)\1{13}$/.test(val)) {
                    mostrarErro(helpers.cnpj, elementos.cnpj, 'CNPJ inválido');
                    return false;
                }
                
                mostrarSucesso(helpers.cnpj, elementos.cnpj, 'CNPJ válido');
                return true;
            }

            function validarCEP() {
                const val = elementos.cep.value.replace(/[^\d-]/g, '');
                if (!val) {
                    mostrarErro(helpers.cep, elementos.cep, 'CEP é obrigatório');
                    return false;
                }
                if (!/^\d{5}-?\d{3}$/.test(val)) {
                    mostrarErro(helpers.cep, elementos.cep, 'Formato: 00000-000');
                    return false;
                }
                mostrarSucesso(helpers.cep, elementos.cep, 'CEP válido');
                return true;
            }

            function validarEndereco() {
                const val = elementos.endereco.value.trim();
                if (!val) {
                    mostrarErro(helpers.endereco, elementos.endereco, 'Endereço é obrigatório');
                    return false;
                }
                if (val.length < 5) {
                    mostrarErro(helpers.endereco, elementos.endereco, 'Endereço muito curto');
                    return false;
                }
                mostrarSucesso(helpers.endereco, elementos.endereco, 'Válido');
                return true;
            }

            function validarNumero() {
                const val = elementos.numero.value.trim();
                if (!val) {
                    mostrarErro(helpers.numero, elementos.numero, 'Número é obrigatório');
                    return false;
                }
                mostrarSucesso(helpers.numero, elementos.numero, 'Válido');
                return true;
            }

            function validarBairro() {
                const val = elementos.bairro.value.trim();
                if (!val) {
                    mostrarErro(helpers.bairro, elementos.bairro, 'Bairro é obrigatório');
                    return false;
                }
                if (val.length < 3) {
                    mostrarErro(helpers.bairro, elementos.bairro, 'Bairro muito curto');
                    return false;
                }
                mostrarSucesso(helpers.bairro, elementos.bairro, 'Válido');
                return true;
            }

            function validarEstado() {
                if (!elementos.estado.value) {
                    mostrarErro(helpers.estado, elementos.estado, 'Selecione o estado');
                    return false;
                }
                mostrarSucesso(helpers.estado, elementos.estado, 'Estado selecionado');
                return true;
            }

            function validarCidade() {
                if (!elementos.cidade.value) {
                    mostrarErro(helpers.cidade, elementos.cidade, 'Selecione a cidade');
                    return false;
                }
                mostrarSucesso(helpers.cidade, elementos.cidade, 'Cidade selecionada');
                return true;
            }

            function validarCelular() {
                const val = elementos.celular.value.replace(/\D/g, '');
                if (val === '') {
                    mostrarErro(helpers.celular, elementos.celular, 'Celular é obrigatório');
                    return false;
                }
                if (val.length !== 11) {
                    mostrarErro(helpers.celular, elementos.celular, 'Celular deve ter 11 dígitos');
                    return false;
                }
                mostrarSucesso(helpers.celular, elementos.celular, 'Celular válido');
                return true;
            }

            function validarNomeContato() {
                const val = elementos.nomeContato.value.trim();
                if (val === "") {
                    mostrarErro(helpers.nomeContato, elementos.nomeContato, 'Nome do contato é obrigatório');
                    return false;
                }
                if (val.length < 3) {
                    mostrarErro(helpers.nomeContato, elementos.nomeContato, 'Mínimo 3 caracteres');
                    return false;
                }
                mostrarSucesso(helpers.nomeContato, elementos.nomeContato, 'Válido');
                return true;
            }

            function validarEmailContato() {
                const val = elementos.emailContato.value.trim();
                if (!val) {
                    mostrarErro(helpers.emailContato, elementos.emailContato, 'E-mail é obrigatório');
                    return false;
                }
                const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!regex.test(val)) {
                    mostrarErro(helpers.emailContato, elementos.emailContato, 'E-mail inválido');
                    return false;
                }
                mostrarSucesso(helpers.emailContato, elementos.emailContato, 'E-mail válido');
                return true;
            }

            function validarRecaptcha() {
                if (elementos.recaptchaInput.value !== 'true') {
                    return false;
                }
                return true;
            }

            // ==================== VALIDAÇÃO GERAL ====================
            function validarFormulario() {
                const validacoes = [
                    validarNomeFantasia(),
                    validarRazaoSocial(),
                    validarRamoAtividade(),
                    validarCNPJ(),
                    validarEndereco(),
                    validarNumero(),
                    validarCEP(),
                    validarEstado(),
                    validarCidade(),
                    validarBairro(),
                    validarCelular(),
                    validarNomeContato(),
                    validarEmailContato()
                ];

                // Recaptcha não é obrigatório no formulário, mas podemos validar se quiser
                // const recaptchaOk = validarRecaptcha();

                return validacoes.every(v => v === true);
            }

            // ==================== EVENTOS DE VALIDAÇÃO EM TEMPO REAL ====================
            elementos.nomeFantasia.addEventListener('blur', validarNomeFantasia);
            elementos.nomeFantasia.addEventListener('input', validarNomeFantasia);
            
            elementos.razaoSocial.addEventListener('blur', validarRazaoSocial);
            elementos.razaoSocial.addEventListener('input', validarRazaoSocial);
            
            elementos.ramoAtividade.addEventListener('blur', validarRamoAtividade);
            elementos.ramoAtividade.addEventListener('input', validarRamoAtividade);
            
            elementos.cnpj.addEventListener('blur', validarCNPJ);
            
            elementos.endereco.addEventListener('blur', validarEndereco);
            elementos.endereco.addEventListener('input', validarEndereco);
            
            elementos.numero.addEventListener('blur', validarNumero);
            elementos.numero.addEventListener('input', validarNumero);
            
            elementos.bairro.addEventListener('blur', validarBairro);
            elementos.bairro.addEventListener('input', validarBairro);
            
            elementos.cidade.addEventListener('change', validarCidade);
            
            elementos.celular.addEventListener('blur', validarCelular);
            elementos.celular.addEventListener('input', validarCelular);
            
            elementos.nomeContato.addEventListener('blur', validarNomeContato);
            elementos.nomeContato.addEventListener('input', validarNomeContato);
            
            elementos.emailContato.addEventListener('blur', validarEmailContato);
            elementos.emailContato.addEventListener('input', validarEmailContato);

            // ==================== ENVIO DO FORMULÁRIO ====================
            elementos.formulario.addEventListener('submit', async function(e) {
                e.preventDefault();

                // Esconder mensagens anteriores
                msgSucesso.classList.add('oculto');
                msgErro.classList.add('oculto');

                // Validar todos os campos
                if (!validarFormulario()) {
                    msgErro.classList.remove('oculto');
                    
                    const primeiroErro = document.querySelector('.error');
                    if (primeiroErro) {
                        primeiroErro.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    return;
                }

                // Simular envio
                elementos.btnEnviar.disabled = true;
                elementos.btnEnviar.textContent = 'ENVIANDO...';

                try {
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    msgSucesso.classList.remove('oculto');
                    elementos.formulario.reset();
                    
                    Object.keys(helpers).forEach(key => {
                        if (helpers[key] && elementos[key]) {
                            limparHelper(helpers[key], elementos[key]);
                        }
                    });
                    
                    elementos.cidade.innerHTML = '<option value="" disabled selected>Selecionar</option>';
                    
                    // Reset recaptcha
                    elementos.recaptchaInput.value = 'false';
                    elementos.recaptchaIcon.style.display = 'none';
                    elementos.recaptchaCheckbox.classList.remove('checked');
                    
                } catch (error) {
                    msgErro.classList.remove('oculto');
                } finally {
                    elementos.btnEnviar.disabled = false;
                    elementos.btnEnviar.textContent = 'ENVIAR';
                }
            });
        })();
    </script>
</body>
</html>
