<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre sua Empresa - Senac</title>
    <!-- Fonte Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #cfd0d1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            padding: 16px;
        }

        .container {
            max-width: 780px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 32px 32px 28px;
            border: 1px solid rgba(0,0,0,0.04);
        }

        h1 {
            color: #004A8D;
            font-size: 32px;
            margin-bottom: 4px;
            text-align: center;
            padding-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #004A8D;
            margin: 30px 0 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid #004A8D;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 0;
            position: relative;
        }

        .campo.full-width {
            grid-column: span 2;
        }

        .campo.full-width-3 {
            grid-column: span 3;
        }

        .campo label {
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .required-star {
            color: #dc2626;
            font-size: 14px;
        }

        .campo input,
        .campo select {
            background: #f9fcff;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            outline: none;
            transition: all 0.15s;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .campo input:focus,
        .campo select:focus {
            border-color: #1e4f8a;
            box-shadow: 0 0 0 3px rgba(30,79,138,0.15);
            background: white;
        }

        .campo input.error,
        .campo select.error {
            border-color: #dc2626;
            background: #fef2f2;
        }

        .campo input.success,
        .campo select.success {
            border-color: #16a34a;
            background: #f0fdf4;
        }

        .helper-text {
            font-size: 12px;
            margin-left: 6px;
            min-height: 18px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .helper-text.error-msg {
            color: #dc2626;
        }

        .helper-text.success-msg {
            color: #16a34a;
        }

        .helper-text i {
            font-size: 12px;
        }

        .btn-submit {
            background: #005b96;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.6s ease;
            display: block;
            margin: 20px auto 0;
            min-width: 200px;
            border: 1px solid #1d3449;
        }

        .btn-submit:hover:not(:disabled) {
            background: #F7941D;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247,148,29,0.3);
        }

        .btn-submit:disabled {
            background: #cccccc;
            border-color: #999999;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .mensagem-envio {
            background: #eaf6e7;
            border: 1px solid #9ec5a0;
            border-radius: 40px;
            padding: 14px 22px;
            font-size: 15px;
            color: #1f4f2b;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 500;
            animation: slideDown 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mensagem-envio.erro {
            background: #fee9e7;
            border-color: #f1a09c;
            color: #a11f1f;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .oculto {
            display: none;
        }

        .campos-obrigatorios-info {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 16px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }

        @media (max-width: 700px) {
            .container {
                padding: 20px;
            }
            .form-grid,
            .form-grid-3 {
                grid-template-columns: 1fr;
            }
            .campo.full-width,
            .campo.full-width-3 {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-building"></i> CADASTRE SUA EMPRESA</h1>
    <p style="text-align: center; margin-bottom: 20px; color: #555;">Programa de Atendimento Corporativo</p>

    <div id="msgSucesso" class="mensagem-envio oculto">
        <i class="fa-regular fa-circle-check"></i> Empresa cadastrada com sucesso!
    </div>
    <div id="msgErro" class="mensagem-envio erro oculto">
        <i class="fas fa-exclamation-circle"></i> Existem campos inválidos. Corrija e tente novamente.
    </div>

    <div class="campos-obrigatorios-info">
        <span class="required-star">*</span> Campos obrigatórios
    </div>

    <form id="formulario" novalidate>
        <!-- SOBRE A EMPRESA -->
        <div class="section-title">SOBRE A EMPRESA</div>
        <div class="form-grid">
            <div class="campo full-width">
                <label>NOME FANTASIA <span class="required-star">*</span></label>
                <input type="text" id="nomeFantasia" placeholder="Digite o nome fantasia">
                <div class="helper-text" id="helper-nomeFantasia"></div>
            </div>
            <div class="campo full-width">
                <label>RAZÃO SOCIAL <span class="required-star">*</span></label>
                <input type="text" id="razaoSocial" placeholder="Digite a razão social">
                <div class="helper-text" id="helper-razaoSocial"></div>
            </div>
            <div class="campo full-width">
                <label>RAMO DE ATIVIDADE <span class="required-star">*</span></label>
                <input type="text" id="ramoAtividade" placeholder="Ex.: Comércio, Serviços, Indústria">
                <div class="helper-text" id="helper-ramoAtividade"></div>
            </div>
            <div class="campo">
                <label>INSCRIÇÃO MUNICIPAL</label>
                <input type="text" id="inscricaoMunicipal" placeholder="Número da inscrição">
                <div class="helper-text" id="helper-inscricaoMunicipal"></div>
            </div>
            <div class="campo">
                <label>INSCRIÇÃO ESTADUAL</label>
                <input type="text" id="inscricaoEstadual" placeholder="Número da inscrição">
                <div class="helper-text" id="helper-inscricaoEstadual"></div>
            </div>
            <div class="campo full-width">
                <label>CNPJ <span class="required-star">*</span></label>
                <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18">
                <div class="helper-text" id="helper-cnpj"></div>
            </div>
        </div>

        <!-- ENDEREÇO -->
        <div class="section-title">ENDEREÇO</div>
        <div class="form-grid-3">
            <div class="campo full-width-3">
                <label>ENDEREÇO <span class="required-star">*</span></label>
                <input type="text" id="endereco" placeholder="Logradouro">
                <div class="helper-text" id="helper-endereco"></div>
            </div>
        </div>
        <div class="form-grid-3">
            <div class="campo">
                <label>NÚMERO <span class="required-star">*</span></label>
                <input type="text" id="numero" placeholder="Nº">
                <div class="helper-text" id="helper-numero"></div>
            </div>
            <div class="campo">
                <label>COMPLEMENTO</label>
                <input type="text" id="complemento" placeholder="Sala, andar, etc.">
                <div class="helper-text" id="helper-complemento"></div>
            </div>
            <div class="campo">
                <label>CEP <span class="required-star">*</span></label>
                <input type="text" id="cep" placeholder="00000-000" maxlength="9">
                <div class="helper-text" id="helper-cep"></div>
            </div>
        </div>
        <div class="form-grid-3">
            <div class="campo">
                <label>ESTADO <span class="required-star">*</span></label>
                <select id="estado">
                    <option value="" disabled selected>Selecionar</option>
                    <option value="AC">Acre</option><option value="AL">Alagoas</option><option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option><option value="BA">Bahia</option><option value="CE">Ceará</option>
                    <option value="DF">Distrito Federal</option><option value="ES">Espírito Santo</option><option value="GO">Goiás</option>
                    <option value="MA">Maranhão</option><option value="MT">Mato Grosso</option><option value="MS">Mato Grosso do Sul</option>
                    <option value="MG">Minas Gerais</option><option value="PA">Pará</option><option value="PB">Paraíba</option>
                    <option value="PR">Paraná</option><option value="PE">Pernambuco</option><option value="PI">Piauí</option>
                    <option value="RJ">Rio de Janeiro</option><option value="RN">Rio Grande do Norte</option><option value="RS">Rio Grande do Sul</option>
                    <option value="RO">Rondônia</option><option value="RR">Roraima</option><option value="SC">Santa Catarina</option>
                    <option value="SP">São Paulo</option><option value="SE">Sergipe</option><option value="TO">Tocantins</option>
                </select>
                <div class="helper-text" id="helper-estado"></div>
            </div>
            <div class="campo">
                <label>CIDADE <span class="required-star">*</span></label>
                <select id="cidade">
                    <option value="" disabled selected>Selecionar</option>
                </select>
                <div class="helper-text" id="helper-cidade"></div>
            </div>
            <div class="campo">
                <label>BAIRRO <span class="required-star">*</span></label>
                <input type="text" id="bairro" placeholder="Bairro">
                <div class="helper-text" id="helper-bairro"></div>
            </div>
        </div>

        <!-- CONTATOS DA EMPRESA -->
        <div class="section-title">CONTATOS DA EMPRESA</div>
        <div class="form-grid-3">
            <div class="campo">
                <label>TELEFONE</label>
                <input type="text" id="telefone" placeholder="(71) 3333-4444" maxlength="14">
                <div class="helper-text" id="helper-telefone"></div>
            </div>
            <div class="campo">
                <label>OUTRO TELEFONE</label>
                <input type="text" id="outroTelefone" placeholder="(71) 3333-4444" maxlength="14">
                <div class="helper-text" id="helper-outroTelefone"></div>
            </div>
            <div class="campo">
                <label>CELULAR <span class="required-star">*</span></label>
                <input type="text" id="celular" placeholder="(71) 98888-7777" maxlength="15">
                <div class="helper-text" id="helper-celular"></div>
            </div>
        </div>

        <!-- SOBRE O CONTATO (PESSOA) -->
        <div class="section-title">PESSOA DE CONTATO</div>
        <div class="form-grid">
            <div class="campo">
                <label>TELEFONE</label>
                <input type="text" id="telefoneContato" placeholder="(71) 3333-4444" maxlength="14">
                <div class="helper-text" id="helper-telefoneContato"></div>
            </div>
            <div class="campo">
                <label>NOME <span class="required-star">*</span></label>
                <input type="text" id="nomeContato" placeholder="Nome completo">
                <div class="helper-text" id="helper-nomeContato"></div>
            </div>
            <div class="campo full-width">
                <label>EMAIL <span class="required-star">*</span></label>
                <input type="email" id="emailContato" placeholder="contato@empresa.com">
                <div class="helper-text" id="helper-emailContato"></div>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="btnEnviar">ENVIAR</button>
    </form>
</div>

<script>
    (function() {
        // ==================== ELEMENTOS ====================
        const elements = {
            nomeFantasia: document.getElementById('nomeFantasia'),
            razaoSocial: document.getElementById('razaoSocial'),
            ramoAtividade: document.getElementById('ramoAtividade'),
            inscricaoMunicipal: document.getElementById('inscricaoMunicipal'),
            inscricaoEstadual: document.getElementById('inscricaoEstadual'),
            cnpj: document.getElementById('cnpj'),
            endereco: document.getElementById('endereco'),
            numero: document.getElementById('numero'),
            complemento: document.getElementById('complemento'),
            cep: document.getElementById('cep'),
            estado: document.getElementById('estado'),
            cidade: document.getElementById('cidade'),
            bairro: document.getElementById('bairro'),
            telefone: document.getElementById('telefone'),
            outroTelefone: document.getElementById('outroTelefone'),
            celular: document.getElementById('celular'),
            telefoneContato: document.getElementById('telefoneContato'),
            nomeContato: document.getElementById('nomeContato'),
            emailContato: document.getElementById('emailContato'),
            formulario: document.getElementById('formulario'),
            btnEnviar: document.getElementById('btnEnviar')
        };

        const helpers = {
            nomeFantasia: document.getElementById('helper-nomeFantasia'),
            razaoSocial: document.getElementById('helper-razaoSocial'),
            ramoAtividade: document.getElementById('helper-ramoAtividade'),
            inscricaoMunicipal: document.getElementById('helper-inscricaoMunicipal'),
            inscricaoEstadual: document.getElementById('helper-inscricaoEstadual'),
            cnpj: document.getElementById('helper-cnpj'),
            endereco: document.getElementById('helper-endereco'),
            numero: document.getElementById('helper-numero'),
            complemento: document.getElementById('helper-complemento'),
            cep: document.getElementById('helper-cep'),
            estado: document.getElementById('helper-estado'),
            cidade: document.getElementById('helper-cidade'),
            bairro: document.getElementById('helper-bairro'),
            telefone: document.getElementById('helper-telefone'),
            outroTelefone: document.getElementById('helper-outroTelefone'),
            celular: document.getElementById('helper-celular'),
            telefoneContato: document.getElementById('helper-telefoneContato'),
            nomeContato: document.getElementById('helper-nomeContato'),
            emailContato: document.getElementById('helper-emailContato')
        };

        const msgSucesso = document.getElementById('msgSucesso');
        const msgErro = document.getElementById('msgErro');

        // ==================== MÁSCARAS ====================
        function mascaraCNPJ(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 14) v = v.slice(0, 14);
            if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
            else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{1,4})/, '$1.$2.$3/$4');
            else if (v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d{1,3})/, '$1.$2.$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d{1,3})/, '$1.$2');
            e.target.value = v;
            if (v.replace(/\D/g, '').length === 14) consultarCNPJ();
        }

        function mascaraCEP(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 8) v = v.slice(0, 8);
            if (v.length > 5) v = v.replace(/^(\d{5})(\d{1,3})/, '$1-$2');
            e.target.value = v;
        }

        function mascaraTelefone(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 10) v = v.slice(0, 10);
            if (v.length > 6) v = v.replace(/^(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d{1,4})/, '($1) $2');
            e.target.value = v;
        }

        function mascaraCelular(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 7) v = v.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d{1,5})/, '($1) $2');
            e.target.value = v;
        }

        elements.cnpj.addEventListener('input', mascaraCNPJ);
        elements.cep.addEventListener('input', mascaraCEP);
        elements.telefone.addEventListener('input', mascaraTelefone);
        elements.outroTelefone.addEventListener('input, mascaraTelefone');
        elements.celular.addEventListener('input', mascaraCelular);
        elements.telefoneContato.addEventListener('input', mascaraTelefone);

        // ==================== CONSULTA CNPJ (API BrasilAPI) ====================
        let consultandoCNPJ = false;
        async function consultarCNPJ() {
            const cnpjNumerico = elements.cnpj.value.replace(/\D/g, '');
            if (cnpjNumerico.length !== 14) return;
            
            consultandoCNPJ = true;
            helpers.cnpj.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Consultando CNPJ...';
            helpers.cnpj.className = 'helper-text';
            
            try {
                const response = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpjNumerico}`);
                if (!response.ok) throw new Error('CNPJ não encontrado');
                const data = await response.json();
                
                // Preencher campos
                if (data.razao_social) elements.razaoSocial.value = data.razao_social;
                if (data.nome_fantasia) elements.nomeFantasia.value = data.nome_fantasia;
                if (data.descricao_situacao_cadastral && data.cnae_fiscal_descricao) {
                    elements.ramoAtividade.value = `${data.cnae_fiscal_descricao}`;
                } else if (data.descricao_situacao_cadastral) {
                    elements.ramoAtividade.value = data.descricao_situacao_cadastral;
                }
                // Endereço
                if (data.logradouro) elements.endereco.value = data.logradouro;
                if (data.numero) elements.numero.value = data.numero;
                if (data.complemento) elements.complemento.value = data.complemento;
                if (data.bairro) elements.bairro.value = data.bairro;
                if (data.cep) {
                    let cep = data.cep.replace(/\D/g, '');
                    if (cep.length === 8) cep = cep.replace(/^(\d{5})(\d{3})/, '$1-$2');
                    elements.cep.value = cep;
                }
                if (data.uf) {
                    const estadoOption = Array.from(elements.estado.options).find(opt => opt.value === data.uf);
                    if (estadoOption) elements.estado.value = data.uf;
                    await carregarCidadesPorEstado(data.uf);
                    if (data.municipio) {
                        setTimeout(() => {
                            const cidadeOption = Array.from(elements.cidade.options).find(opt => opt.value === data.municipio);
                            if (cidadeOption) elements.cidade.value = data.municipio;
                            else {
                                const opt = document.createElement('option');
                                opt.value = data.municipio;
                                opt.textContent = data.municipio;
                                elements.cidade.appendChild(opt);
                                elements.cidade.value = data.municipio;
                            }
                            validarCidade();
                        }, 100);
                    }
                }
                // Telefones
                if (data.ddd_telefone_1) {
                    let tel = data.ddd_telefone_1.replace(/\D/g, '');
                    if (tel.length === 10) tel = tel.replace(/^(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
                    elements.telefone.value = tel;
                }
                if (data.ddd_telefone_2) {
                    let tel = data.ddd_telefone_2.replace(/\D/g, '');
                    if (tel.length === 10) tel = tel.replace(/^(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
                    elements.outroTelefone.value = tel;
                }
                if (data.ddd_fax) {
                    let fax = data.ddd_fax.replace(/\D/g, '');
                    if (fax.length === 10) fax = fax.replace(/^(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
                    if (!elements.outroTelefone.value) elements.outroTelefone.value = fax;
                }
                
                helpers.cnpj.innerHTML = '<i class="fas fa-check-circle"></i> CNPJ encontrado! Dados preenchidos.';
                helpers.cnpj.className = 'helper-text success-msg';
                elements.cnpj.classList.add('success');
                elements.cnpj.classList.remove('error');
                
                // Disparar validações dos campos preenchidos
                validarRazaoSocial();
                validarNomeFantasia();
                validarRamoAtividade();
                validarEndereco();
                validarNumero();
                validarBairro();
                validarCEP();
                validarEstado();
                // cidade será validada no setTimeout acima
            } catch (error) {
                helpers.cnpj.innerHTML = '<i class="fas fa-exclamation-circle"></i> CNPJ inválido ou não encontrado';
                helpers.cnpj.className = 'helper-text error-msg';
                elements.cnpj.classList.add('error');
                elements.cnpj.classList.remove('success');
                validarCNPJ(); // executa a validação padrão (formato)
            } finally {
                consultandoCNPJ = false;
            }
        }

        // ==================== BUSCA POR CEP (ViaCEP) ====================
        async function buscarEnderecoPorCEP() {
            const cepNumerico = elements.cep.value.replace(/\D/g, '');
            if (cepNumerico.length !== 8) return;
            
            helpers.cep.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Buscando endereço...';
            try {
                const response = await fetch(`https://viacep.com.br/ws/${cepNumerico}/json/`);
                if (!response.ok) throw new Error();
                const dados = await response.json();
                if (dados.erro) throw new Error();
                
                elements.endereco.value = dados.logradouro || '';
                elements.bairro.value = dados.bairro || '';
                if (dados.uf) {
                    const estadoOption = Array.from(elements.estado.options).find(opt => opt.value === dados.uf);
                    if (estadoOption) elements.estado.value = dados.uf;
                    await carregarCidadesPorEstado(dados.uf);
                    if (dados.localidade) {
                        setTimeout(() => {
                            const cidadeOption = Array.from(elements.cidade.options).find(opt => opt.value === dados.localidade);
                            if (cidadeOption) elements.cidade.value = dados.localidade;
                            else {
                                const opt = document.createElement('option');
                                opt.value = dados.localidade;
                                opt.textContent = dados.localidade;
                                elements.cidade.appendChild(opt);
                                elements.cidade.value = dados.localidade;
                            }
                            validarCidade();
                        }, 100);
                    }
                }
                helpers.cep.innerHTML = '<i class="fas fa-check-circle"></i> CEP encontrado';
                helpers.cep.className = 'helper-text success-msg';
                elements.cep.classList.add('success');
                elements.cep.classList.remove('error');
                validarEndereco();
                validarBairro();
                validarEstado();
            } catch (error) {
                helpers.cep.innerHTML = '<i class="fas fa-exclamation-circle"></i> CEP não encontrado';
                helpers.cep.className = 'helper-text error-msg';
                elements.cep.classList.add('error');
                elements.cep.classList.remove('success');
            }
        }

        elements.cep.addEventListener('blur', buscarEnderecoPorCEP);

        // ==================== CARREGAR CIDADES POR ESTADO ====================
        async function carregarCidadesPorEstado(uf) {
            if (!uf) return;
            try {
                const response = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                if (!response.ok) throw new Error();
                const municipios = await response.json();
                municipios.sort((a,b) => a.nome.localeCompare(b.nome));
                elements.cidade.innerHTML = '<option value="" disabled selected>Selecionar</option>';
                municipios.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.nome;
                    opt.textContent = m.nome;
                    elements.cidade.appendChild(opt);
                });
                helpers.cidade.innerHTML = `${municipios.length} cidades carregadas`;
                helpers.cidade.className = 'helper-text success-msg';
            } catch (error) {
                elements.cidade.innerHTML = '<option value="" disabled selected>Selecionar</option>';
                helpers.cidade.innerHTML = 'Erro ao carregar cidades';
                helpers.cidade.className = 'helper-text error-msg';
            }
        }

        elements.estado.addEventListener('change', function() {
            if (this.value) carregarCidadesPorEstado(this.value);
            validarEstado();
        });

        // ==================== VALIDAÇÕES ====================
        function mostrarErro(helper, element, msg) {
            helper.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
            helper.className = 'helper-text error-msg';
            element.classList.add('error');
            element.classList.remove('success');
        }
        function mostrarSucesso(helper, element, msg) {
            helper.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
            helper.className = 'helper-text success-msg';
            element.classList.add('success');
            element.classList.remove('error');
        }
        function limparHelper(helper, element) {
            helper.innerHTML = '';
            helper.className = 'helper-text';
            element.classList.remove('error', 'success');
        }

        function validarNomeFantasia() {
            const val = elements.nomeFantasia.value.trim();
            if (!val) { mostrarErro(helpers.nomeFantasia, elements.nomeFantasia, 'Nome fantasia obrigatório'); return false; }
            if (val.length < 3) { mostrarErro(helpers.nomeFantasia, elements.nomeFantasia, 'Mínimo 3 caracteres'); return false; }
            mostrarSucesso(helpers.nomeFantasia, elements.nomeFantasia, 'Válido');
            return true;
        }
        function validarRazaoSocial() {
            const val = elements.razaoSocial.value.trim();
            if (!val) { mostrarErro(helpers.razaoSocial, elements.razaoSocial, 'Razão social obrigatória'); return false; }
            if (val.length < 5) { mostrarErro(helpers.razaoSocial, elements.razaoSocial, 'Mínimo 5 caracteres'); return false; }
            mostrarSucesso(helpers.razaoSocial, elements.razaoSocial, 'Válido');
            return true;
        }
        function validarRamoAtividade() {
            const val = elements.ramoAtividade.value.trim();
            if (!val) { mostrarErro(helpers.ramoAtividade, elements.ramoAtividade, 'Ramo de atividade obrigatório'); return false; }
            if (val.length < 3) { mostrarErro(helpers.ramoAtividade, elements.ramoAtividade, 'Mínimo 3 caracteres'); return false; }
            mostrarSucesso(helpers.ramoAtividade, elements.ramoAtividade, 'Válido');
            return true;
        }
        function validarCNPJ() {
            const val = elements.cnpj.value.replace(/\D/g, '');
            if (!val) { mostrarErro(helpers.cnpj, elements.cnpj, 'CNPJ obrigatório'); return false; }
            if (val.length !== 14) { mostrarErro(helpers.cnpj, elements.cnpj, 'CNPJ deve ter 14 dígitos'); return false; }
            if (/^(\d)\1{13}$/.test(val)) { mostrarErro(helpers.cnpj, elements.cnpj, 'CNPJ inválido'); return false; }
            mostrarSucesso(helpers.cnpj, elements.cnpj, 'CNPJ válido');
            return true;
        }
        function validarEndereco() {
            const val = elements.endereco.value.trim();
            if (!val) { mostrarErro(helpers.endereco, elements.endereco, 'Endereço obrigatório'); return false; }
            if (val.length < 5) { mostrarErro(helpers.endereco, elements.endereco, 'Endereço muito curto'); return false; }
            mostrarSucesso(helpers.endereco, elements.endereco, 'Válido');
            return true;
        }
        function validarNumero() {
            const val = elements.numero.value.trim();
            if (!val) { mostrarErro(helpers.numero, elements.numero, 'Número obrigatório'); return false; }
            mostrarSucesso(helpers.numero, elements.numero, 'Válido');
            return true;
        }
        function validarCEP() {
            const val = elements.cep.value.replace(/\D/g, '');
            if (!val) { mostrarErro(helpers.cep, elements.cep, 'CEP obrigatório'); return false; }
            if (!/^\d{8}$/.test(val)) { mostrarErro(helpers.cep, elements.cep, 'Formato: 00000-000'); return false; }
            mostrarSucesso(helpers.cep, elements.cep, 'CEP válido');
            return true;
        }
        function validarBairro() {
            const val = elements.bairro.value.trim();
            if (!val) { mostrarErro(helpers.bairro, elements.bairro, 'Bairro obrigatório'); return false; }
            if (val.length < 3) { mostrarErro(helpers.bairro, elements.bairro, 'Bairro muito curto'); return false; }
            mostrarSucesso(helpers.bairro, elements.bairro, 'Válido');
            return true;
        }
        function validarEstado() {
            if (!elements.estado.value) { mostrarErro(helpers.estado, elements.estado, 'Selecione o estado'); return false; }
            mostrarSucesso(helpers.estado, elements.estado, 'Estado selecionado');
            return true;
        }
        function validarCidade() {
            if (!elements.cidade.value) { mostrarErro(helpers.cidade, elements.cidade, 'Selecione a cidade'); return false; }
            mostrarSucesso(helpers.cidade, elements.cidade, 'Cidade selecionada');
            return true;
        }
        function validarCelular() {
            const val = elements.celular.value.replace(/\D/g, '');
            if (!val) { mostrarErro(helpers.celular, elements.celular, 'Celular obrigatório'); return false; }
            if (val.length !== 11) { mostrarErro(helpers.celular, elements.celular, 'Celular deve ter 11 dígitos'); return false; }
            mostrarSucesso(helpers.celular, elements.celular, 'Celular válido');
            return true;
        }
        function validarNomeContato() {
            const val = elements.nomeContato.value.trim();
            if (!val) { mostrarErro(helpers.nomeContato, elements.nomeContato, 'Nome obrigatório'); return false; }
            if (val.length < 3) { mostrarErro(helpers.nomeContato, elements.nomeContato, 'Mínimo 3 caracteres'); return false; }
            mostrarSucesso(helpers.nomeContato, elements.nomeContato, 'Válido');
            return true;
        }
        function validarEmailContato() {
            const val = elements.emailContato.value.trim();
            if (!val) { mostrarErro(helpers.emailContato, elements.emailContato, 'E-mail obrigatório'); return false; }
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!regex.test(val)) { mostrarErro(helpers.emailContato, elements.emailContato, 'E-mail inválido'); return false; }
            mostrarSucesso(helpers.emailContato, elements.emailContato, 'E-mail válido');
            return true;
        }
        // Campos opcionais: não aplicamos validação obrigatória, mas podemos validar formato se preenchidos
        function validarTelefoneOpcional(campo, helper) {
            const val = campo.value.replace(/\D/g, '');
            if (val && val.length !== 10) {
                mostrarErro(helper, campo, 'Telefone deve ter 10 dígitos');
                return false;
            } else if (val && val.length === 10) {
                mostrarSucesso(helper, campo, 'Válido');
            } else {
                limparHelper(helper, campo);
            }
            return true;
        }
        function validarTodosTelefonesOpcionais() {
            validarTelefoneOpcional(elements.telefone, helpers.telefone);
            validarTelefoneOpcional(elements.outroTelefone, helpers.outroTelefone);
            validarTelefoneOpcional(elements.telefoneContato, helpers.telefoneContato);
            return true;
        }

        // Eventos de validação em tempo real
        elements.nomeFantasia.addEventListener('blur', validarNomeFantasia);
        elements.razaoSocial.addEventListener('blur', validarRazaoSocial);
        elements.ramoAtividade.addEventListener('blur', validarRamoAtividade);
        elements.cnpj.addEventListener('blur', validarCNPJ);
        elements.endereco.addEventListener('blur', validarEndereco);
        elements.numero.addEventListener('blur', validarNumero);
        elements.bairro.addEventListener('blur', validarBairro);
        elements.estado.addEventListener('change', validarEstado);
        elements.cidade.addEventListener('change', validarCidade);
        elements.celular.addEventListener('blur', validarCelular);
        elements.nomeContato.addEventListener('blur', validarNomeContato);
        elements.emailContato.addEventListener('blur', validarEmailContato);
        elements.telefone.addEventListener('blur', () => validarTelefoneOpcional(elements.telefone, helpers.telefone));
        elements.outroTelefone.addEventListener('blur', () => validarTelefoneOpcional(elements.outroTelefone, helpers.outroTelefone));
        elements.telefoneContato.addEventListener('blur', () => validarTelefoneOpcional(elements.telefoneContato, helpers.telefoneContato));

        // ==================== VALIDAÇÃO GERAL E SUBMIT ====================
        function validarFormulario() {
            const obrigatorios = [
                validarNomeFantasia(),
                validarRazaoSocial(),
                validarRamoAtividade(),
                validarCNPJ(),
                validarEndereco(),
                validarNumero(),
                validarCEP(),
                validarEstado(),
                validarCidade(),
                validarBairro(),
                validarCelular(),
                validarNomeContato(),
                validarEmailContato()
            ];
            validarTodosTelefonesOpcionais();
            return obrigatorios.every(v => v === true);
        }

        elements.formulario.addEventListener('submit', async function(e) {
            e.preventDefault();
            msgSucesso.classList.add('oculto');
            msgErro.classList.add('oculto');

            if (!validarFormulario()) {
                msgErro.classList.remove('oculto');
                const primeiroErro = document.querySelector('.error');
                if (primeiroErro) primeiroErro.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            elements.btnEnviar.disabled = true;
            elements.btnEnviar.textContent = 'ENVIANDO...';

            try {
                await new Promise(resolve => setTimeout(resolve, 1500));
                msgSucesso.classList.remove('oculto');
                elements.formulario.reset();
                // Limpar helpers e classes
                Object.keys(helpers).forEach(key => {
                    if (helpers[key] && elements[key]) limparHelper(helpers[key], elements[key]);
                });
                elements.cidade.innerHTML = '<option value="" disabled selected>Selecionar</option>';
                // Resetar estado do select de estado
                elements.estado.value = '';
            } catch (error) {
                msgErro.classList.remove('oculto');
            } finally {
                elements.btnEnviar.disabled = false;
                elements.btnEnviar.textContent = 'ENVIAR';
            }
        });
    })();
</script>
</body>
</html>
