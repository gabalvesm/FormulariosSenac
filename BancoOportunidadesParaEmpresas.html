<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre sua Empresa - Senac</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #cfd0d1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            padding: 16px;
        }
        .container {
            max-width: 780px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 32px;
        }
        h1 {
            color: #004A8D;
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #004A8D;
            margin: 24px 0 16px;
            padding-bottom: 6px;
            border-bottom: 2px solid #004A8D;
        }
        .form-grid, .form-grid-3 {
            display: grid;
            gap: 16px;
        }
        .form-grid {
            grid-template-columns: 1fr 1fr;
        }
        .form-grid-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .campo.full-width {
            grid-column: span 2;
        }
        .campo.full-width-3 {
            grid-column: span 3;
        }
        label {
            font-size: 12px;
            font-weight: 600;
            color: #334155;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .required-star {
            color: #dc2626;
        }
        input, select {
            background: #f9fcff;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        input:focus, select:focus {
            border-color: #1e4f8a;
            box-shadow: 0 0 0 3px rgba(30,79,138,0.15);
            background: white;
        }
        input.error, select.error {
            border-color: #dc2626;
            background: #fef2f2;
        }
        input.success, select.success {
            border-color: #16a34a;
            background: #f0fdf4;
        }
        .helper-text {
            font-size: 11px;
            margin-left: 4px;
            min-height: 18px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .helper-text.error-msg {
            color: #dc2626;
        }
        .helper-text.success-msg {
            color: #16a34a;
        }
        .btn-submit {
            background: #005b96;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            display: block;
            margin: 24px auto 0;
            min-width: 200px;
        }
        .btn-submit:hover:not(:disabled) {
            background: #F7941D;
            transform: translateY(-2px);
        }
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .mensagem-envio {
            background: #eaf6e7;
            border: 1px solid #9ec5a0;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 14px;
            color: #1f4f2b;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .mensagem-envio.erro {
            background: #fee9e7;
            border-color: #f1a09c;
            color: #a11f1f;
        }
        .oculto {
            display: none;
        }
        @media (max-width: 700px) {
            .form-grid, .form-grid-3 {
                grid-template-columns: 1fr;
            }
            .campo.full-width, .campo.full-width-3 {
                grid-column: span 1;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-building"></i> CADASTRE SUA EMPRESA</h1>
    <p style="text-align: center; margin-bottom: 20px; color: #555;">Programa de Atendimento Corporativo</p>

    <div id="msgSucesso" class="mensagem-envio oculto">
        <i class="fa-regular fa-circle-check"></i> Empresa cadastrada com sucesso!
    </div>
    <div id="msgErro" class="mensagem-envio erro oculto">
        <i class="fas fa-exclamation-circle"></i> Corrija os campos em vermelho antes de enviar.
    </div>

    <div style="text-align: right; font-size: 12px; margin-bottom: 16px;">
        <span class="required-star">*</span> Campos obrigatórios
    </div>

    <form id="formulario" novalidate>
        <!-- SOBRE A EMPRESA -->
        <div class="section-title">SOBRE A EMPRESA</div>
        <div class="form-grid">
            <div class="campo full-width">
                <label>NOME FANTASIA <span class="required-star">*</span></label>
                <input type="text" id="nomeFantasia" placeholder="Digite o nome fantasia">
                <div class="helper-text" id="helper-nomeFantasia"></div>
            </div>
            <div class="campo full-width">
                <label>RAZÃO SOCIAL <span class="required-star">*</span></label>
                <input type="text" id="razaoSocial" placeholder="Digite a razão social">
                <div class="helper-text" id="helper-razaoSocial"></div>
            </div>
            <div class="campo full-width">
                <label>RAMO DE ATIVIDADE <span class="required-star">*</span></label>
                <input type="text" id="ramoAtividade" placeholder="Ex.: Comércio, Serviços, Indústria">
                <div class="helper-text" id="helper-ramoAtividade"></div>
            </div>
            <div class="campo">
                <label>INSCRIÇÃO MUNICIPAL</label>
                <input type="text" id="inscricaoMunicipal" placeholder="Número da inscrição">
                <div class="helper-text" id="helper-inscricaoMunicipal"></div>
            </div>
            <div class="campo">
                <label>INSCRIÇÃO ESTADUAL</label>
                <input type="text" id="inscricaoEstadual" placeholder="Número da inscrição">
                <div class="helper-text" id="helper-inscricaoEstadual"></div>
            </div>
            <div class="campo full-width">
                <label>CNPJ <span class="required-star">*</span></label>
                <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18">
                <div class="helper-text" id="helper-cnpj"></div>
            </div>
        </div>

        <!-- ENDEREÇO -->
        <div class="section-title">ENDEREÇO</div>
        <div class="form-grid-3">
            <div class="campo full-width-3">
                <label>ENDEREÇO <span class="required-star">*</span></label>
                <input type="text" id="endereco" placeholder="Logradouro">
                <div class="helper-text" id="helper-endereco"></div>
            </div>
        </div>
        <div class="form-grid-3">
            <div class="campo">
                <label>NÚMERO <span class="required-star">*</span></label>
                <input type="text" id="numero" placeholder="Nº">
                <div class="helper-text" id="helper-numero"></div>
            </div>
            <div class="campo">
                <label>COMPLEMENTO</label>
                <input type="text" id="complemento" placeholder="Sala, andar...">
                <div class="helper-text" id="helper-complemento"></div>
            </div>
            <div class="campo">
                <label>CEP <span class="required-star">*</span></label>
                <input type="text" id="cep" placeholder="00000-000" maxlength="9">
                <div class="helper-text" id="helper-cep"></div>
            </div>
        </div>
        <div class="form-grid-3">
            <div class="campo">
                <label>ESTADO <span class="required-star">*</span></label>
                <select id="estado">
                    <option value="" disabled selected>Selecionar</option>
                    <option value="AC">Acre</option><option value="AL">Alagoas</option><option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option><option value="BA">Bahia</option><option value="CE">Ceará</option>
                    <option value="DF">Distrito Federal</option><option value="ES">Espírito Santo</option><option value="GO">Goiás</option>
                    <option value="MA">Maranhão</option><option value="MT">Mato Grosso</option><option value="MS">Mato Grosso do Sul</option>
                    <option value="MG">Minas Gerais</option><option value="PA">Pará</option><option value="PB">Paraíba</option>
                    <option value="PR">Paraná</option><option value="PE">Pernambuco</option><option value="PI">Piauí</option>
                    <option value="RJ">Rio de Janeiro</option><option value="RN">Rio Grande do Norte</option><option value="RS">Rio Grande do Sul</option>
                    <option value="RO">Rondônia</option><option value="RR">Roraima</option><option value="SC">Santa Catarina</option>
                    <option value="SP">São Paulo</option><option value="SE">Sergipe</option><option value="TO">Tocantins</option>
                </select>
                <div class="helper-text" id="helper-estado"></div>
            </div>
            <div class="campo">
                <label>CIDADE <span class="required-star">*</span></label>
                <select id="cidade">
                    <option value="" disabled selected>Selecionar</option>
                </select>
                <div class="helper-text" id="helper-cidade"></div>
            </div>
            <div class="campo">
                <label>BAIRRO <span class="required-star">*</span></label>
                <input type="text" id="bairro" placeholder="Bairro">
                <div class="helper-text" id="helper-bairro"></div>
            </div>
        </div>

        <!-- CONTATOS DA EMPRESA -->
        <div class="section-title">CONTATOS DA EMPRESA</div>
        <div class="form-grid-3">
            <div class="campo">
                <label>TELEFONE</label>
                <input type="text" id="telefone" placeholder="(71) 3333-4444" maxlength="14">
                <div class="helper-text" id="helper-telefone"></div>
            </div>
            <div class="campo">
                <label>OUTRO TELEFONE</label>
                <input type="text" id="outroTelefone" placeholder="(71) 3333-4444" maxlength="14">
                <div class="helper-text" id="helper-outroTelefone"></div>
            </div>
            <div class="campo">
                <label>CELULAR <span class="required-star">*</span></label>
                <input type="text" id="celular" placeholder="(71) 98888-7777" maxlength="15">
                <div class="helper-text" id="helper-celular"></div>
            </div>
        </div>

        <!-- PESSOA DE CONTATO -->
        <div class="section-title">PESSOA DE CONTATO</div>
        <div class="form-grid">
            <div class="campo">
                <label>TELEFONE</label>
                <input type="text" id="telefoneContato" placeholder="(71) 3333-4444" maxlength="14">
                <div class="helper-text" id="helper-telefoneContato"></div>
            </div>
            <div class="campo">
                <label>NOME <span class="required-star">*</span></label>
                <input type="text" id="nomeContato" placeholder="Nome completo">
                <div class="helper-text" id="helper-nomeContato"></div>
            </div>
            <div class="campo full-width">
                <label>EMAIL <span class="required-star">*</span></label>
                <input type="email" id="emailContato" placeholder="contato@empresa.com">
                <div class="helper-text" id="helper-emailContato"></div>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="btnEnviar">ENVIAR</button>
    </form>
</div>

<script>
    (function() {
        // --- Elementos DOM ---
        const dom = {
            nomeFantasia: document.getElementById('nomeFantasia'),
            razaoSocial: document.getElementById('razaoSocial'),
            ramoAtividade: document.getElementById('ramoAtividade'),
            inscricaoMunicipal: document.getElementById('inscricaoMunicipal'),
            inscricaoEstadual: document.getElementById('inscricaoEstadual'),
            cnpj: document.getElementById('cnpj'),
            endereco: document.getElementById('endereco'),
            numero: document.getElementById('numero'),
            complemento: document.getElementById('complemento'),
            cep: document.getElementById('cep'),
            estado: document.getElementById('estado'),
            cidade: document.getElementById('cidade'),
            bairro: document.getElementById('bairro'),
            telefone: document.getElementById('telefone'),
            outroTelefone: document.getElementById('outroTelefone'),
            celular: document.getElementById('celular'),
            telefoneContato: document.getElementById('telefoneContato'),
            nomeContato: document.getElementById('nomeContato'),
            emailContato: document.getElementById('emailContato'),
            form: document.getElementById('formulario'),
            btn: document.getElementById('btnEnviar')
        };

        // Helpers (mensagens)
        const helpers = {};
        for (let key in dom) {
            if (dom[key] && dom[key].id) {
                helpers[key] = document.getElementById(`helper-${key}`);
            }
        }
        helpers.inscricaoMunicipal = document.getElementById('helper-inscricaoMunicipal');
        helpers.inscricaoEstadual = document.getElementById('helper-inscricaoEstadual');
        helpers.telefoneContato = document.getElementById('helper-telefoneContato');
        helpers.outroTelefone = document.getElementById('helper-outroTelefone');

        const msgSucesso = document.getElementById('msgSucesso');
        const msgErro = document.getElementById('msgErro');

        // --- Funções auxiliares de UI ---
        function mostrarErro(helper, elemento, mensagem) {
            if (helper && elemento) {
                helper.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${mensagem}`;
                helper.className = 'helper-text error-msg';
                elemento.classList.add('error');
                elemento.classList.remove('success');
            }
        }

        function mostrarSucesso(helper, elemento, mensagem) {
            if (helper && elemento) {
                helper.innerHTML = `<i class="fas fa-check-circle"></i> ${mensagem}`;
                helper.className = 'helper-text success-msg';
                elemento.classList.add('success');
                elemento.classList.remove('error');
            }
        }

        function limparHelper(helper, elemento) {
            if (helper && elemento) {
                helper.innerHTML = '';
                helper.className = 'helper-text';
                elemento.classList.remove('error', 'success');
            }
        }

        // --- Máscaras ---
        function mascaraCNPJ(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 14) v = v.slice(0, 14);
            if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
            else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{1,4})/, '$1.$2.$3/$4');
            else if (v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d{1,3})/, '$1.$2.$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d{1,3})/, '$1.$2');
            e.target.value = v;
        }

        function mascaraCEP(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 8) v = v.slice(0, 8);
            if (v.length > 5) v = v.replace(/^(\d{5})(\d{1,3})/, '$1-$2');
            e.target.value = v;
        }

        function mascaraTelefone(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 10) v = v.slice(0, 10);
            if (v.length > 6) v = v.replace(/^(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d{1,4})/, '($1) $2');
            e.target.value = v;
        }

        function mascaraCelular(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 7) v = v.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d{1,5})/, '($1) $2');
            e.target.value = v;
        }

        dom.cnpj.addEventListener('input', mascaraCNPJ);
        dom.cep.addEventListener('input', mascaraCEP);
        dom.telefone.addEventListener('input', mascaraTelefone);
        dom.outroTelefone.addEventListener('input', mascaraTelefone);
        dom.celular.addEventListener('input', mascaraCelular);
        dom.telefoneContato.addEventListener('input', mascaraTelefone);

        // --- Validações individuais (obrigatórias) ---
        function validarNomeFantasia() {
            const val = dom.nomeFantasia.value.trim();
            if (!val) { mostrarErro(helpers.nomeFantasia, dom.nomeFantasia, 'Nome fantasia obrigatório'); return false; }
            if (val.length < 3) { mostrarErro(helpers.nomeFantasia, dom.nomeFantasia, 'Mínimo 3 caracteres'); return false; }
            mostrarSucesso(helpers.nomeFantasia, dom.nomeFantasia, 'Válido');
            return true;
        }

        function validarRazaoSocial() {
            const val = dom.razaoSocial.value.trim();
            if (!val) { mostrarErro(helpers.razaoSocial, dom.razaoSocial, 'Razão social obrigatória'); return false; }
            if (val.length < 5) { mostrarErro(helpers.razaoSocial, dom.razaoSocial, 'Mínimo 5 caracteres'); return false; }
            mostrarSucesso(helpers.razaoSocial, dom.razaoSocial, 'Válido');
            return true;
        }

        function validarRamoAtividade() {
            const val = dom.ramoAtividade.value.trim();
            if (!val) { mostrarErro(helpers.ramoAtividade, dom.ramoAtividade, 'Ramo de atividade obrigatório'); return false; }
            if (val.length < 3) { mostrarErro(helpers.ramoAtividade, dom.ramoAtividade, 'Mínimo 3 caracteres'); return false; }
            mostrarSucesso(helpers.ramoAtividade, dom.ramoAtividade, 'Válido');
            return true;
        }

        function validarCNPJ() {
            const val = dom.cnpj.value.replace(/\D/g, '');
            if (!val) { mostrarErro(helpers.cnpj, dom.cnpj, 'CNPJ obrigatório'); return false; }
            if (val.length !== 14) { mostrarErro(helpers.cnpj, dom.cnpj, 'CNPJ deve ter 14 dígitos'); return false; }
            if (/^(\d)\1{13}$/.test(val)) { mostrarErro(helpers.cnpj, dom.cnpj, 'CNPJ inválido'); return false; }
            mostrarSucesso(helpers.cnpj, dom.cnpj, 'CNPJ válido');
            return true;
        }

        function validarEndereco() {
            const val = dom.endereco.value.trim();
            if (!val) { mostrarErro(helpers.endereco, dom.endereco, 'Endereço obrigatório'); return false; }
            if (val.length < 5) { mostrarErro(helpers.endereco, dom.endereco, 'Endereço muito curto'); return false; }
            mostrarSucesso(helpers.endereco, dom.endereco, 'Válido');
            return true;
        }

        function validarNumero() {
            const val = dom.numero.value.trim();
            if (!val) { mostrarErro(helpers.numero, dom.numero, 'Número obrigatório'); return false; }
            mostrarSucesso(helpers.numero, dom.numero, 'Válido');
            return true;
        }

        function validarCEP() {
            const val = dom.cep.value.replace(/\D/g, '');
            if (!val) { mostrarErro(helpers.cep, dom.cep, 'CEP obrigatório'); return false; }
            if (!/^\d{8}$/.test(val)) { mostrarErro(helpers.cep, dom.cep, 'Formato: 00000-000'); return false; }
            mostrarSucesso(helpers.cep, dom.cep, 'CEP válido');
            return true;
        }

        function validarBairro() {
            const val = dom.bairro.value.trim();
            if (!val) { mostrarErro(helpers.bairro, dom.bairro, 'Bairro obrigatório'); return false; }
            if (val.length < 3) { mostrarErro(helpers.bairro, dom.bairro, 'Bairro muito curto'); return false; }
            mostrarSucesso(helpers.bairro, dom.bairro, 'Válido');
            return true;
        }

        function validarEstado() {
            if (!dom.estado.value) { mostrarErro(helpers.estado, dom.estado, 'Selecione o estado'); return false; }
            mostrarSucesso(helpers.estado, dom.estado, 'Estado selecionado');
            return true;
        }

        function validarCidade() {
            if (!dom.cidade.value) { mostrarErro(helpers.cidade, dom.cidade, 'Selecione a cidade'); return false; }
            mostrarSucesso(helpers.cidade, dom.cidade, 'Cidade selecionada');
            return true;
        }

        function validarCelular() {
            const val = dom.celular.value.replace(/\D/g, '');
            if (!val) { mostrarErro(helpers.celular, dom.celular, 'Celular obrigatório'); return false; }
            if (val.length !== 11) { mostrarErro(helpers.celular, dom.celular, 'Celular deve ter 11 dígitos'); return false; }
            mostrarSucesso(helpers.celular, dom.celular, 'Celular válido');
            return true;
        }

        function validarNomeContato() {
            const val = dom.nomeContato.value.trim();
            if (!val) { mostrarErro(helpers.nomeContato, dom.nomeContato, 'Nome obrigatório'); return false; }
            if (val.length < 3) { mostrarErro(helpers.nomeContato, dom.nomeContato, 'Mínimo 3 caracteres'); return false; }
            mostrarSucesso(helpers.nomeContato, dom.nomeContato, 'Válido');
            return true;
        }

        function validarEmailContato() {
            const val = dom.emailContato.value.trim();
            if (!val) { mostrarErro(helpers.emailContato, dom.emailContato, 'E-mail obrigatório'); return false; }
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!regex.test(val)) { mostrarErro(helpers.emailContato, dom.emailContato, 'E-mail inválido'); return false; }
            mostrarSucesso(helpers.emailContato, dom.emailContato, 'E-mail válido');
            return true;
        }

        // Campos opcionais
        function validarTelefoneOpcional(campo, helper) {
            const val = campo.value.replace(/\D/g, '');
            if (val && val.length !== 10) {
                mostrarErro(helper, campo, 'Telefone deve ter 10 dígitos');
                return false;
            } else if (val && val.length === 10) {
                mostrarSucesso(helper, campo, 'Válido');
            } else {
                limparHelper(helper, campo);
            }
            return true;
        }

        // --- Busca CEP (ViaCEP) ---
        let buscandoCEP = false;
        async function buscarEnderecoPorCEP() {
            const cepNumerico = dom.cep.value.replace(/\D/g, '');
            if (cepNumerico.length !== 8) return;
            if (buscandoCEP) return;
            buscandoCEP = true;
            helpers.cep.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Buscando...';
            helpers.cep.className = 'helper-text';
            try {
                const resp = await fetch(`https://viacep.com.br/ws/${cepNumerico}/json/`);
                const data = await resp.json();
                if (data.erro) throw new Error('CEP não encontrado');
                // Preencher campos
                dom.endereco.value = data.logradouro || '';
                dom.bairro.value = data.bairro || '';
                if (data.uf) {
                    const opt = Array.from(dom.estado.options).find(o => o.value === data.uf);
                    if (opt) dom.estado.value = data.uf;
                    await carregarCidadesPorEstado(data.uf);
                    if (data.localidade) {
                        setTimeout(() => {
                            const cidadeOpt = Array.from(dom.cidade.options).find(o => o.value === data.localidade);
                            if (cidadeOpt) dom.cidade.value = data.localidade;
                            else {
                                const newOpt = document.createElement('option');
                                newOpt.value = data.localidade;
                                newOpt.textContent = data.localidade;
                                dom.cidade.appendChild(newOpt);
                                dom.cidade.value = data.localidade;
                            }
                            validarCidade();
                        }, 100);
                    }
                }
                mostrarSucesso(helpers.cep, dom.cep, 'CEP encontrado');
                validarEndereco();
                validarBairro();
                validarEstado();
            } catch (err) {
                mostrarErro(helpers.cep, dom.cep, 'CEP não encontrado');
            } finally {
                buscandoCEP = false;
            }
        }

        // --- Carregar cidades por UF (IBGE) ---
        async function carregarCidadesPorEstado(uf) {
            if (!uf) return;
            try {
                const resp = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                const cidades = await resp.json();
                cidades.sort((a,b) => a.nome.localeCompare(b.nome));
                dom.cidade.innerHTML = '<option value="" disabled selected>Selecionar</option>';
                cidades.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.nome;
                    opt.textContent = c.nome;
                    dom.cidade.appendChild(opt);
                });
                helpers.cidade.innerHTML = `${cidades.length} cidades carregadas`;
                helpers.cidade.className = 'helper-text success-msg';
            } catch (err) {
                dom.cidade.innerHTML = '<option value="" disabled selected>Selecionar</option>';
                helpers.cidade.innerHTML = 'Erro ao carregar cidades';
                helpers.cidade.className = 'helper-text error-msg';
            }
        }

        dom.cep.addEventListener('blur', buscarEnderecoPorCEP);
        dom.estado.addEventListener('change', () => {
            if (dom.estado.value) carregarCidadesPorEstado(dom.estado.value);
            validarEstado();
        });

        // ========== CONSULTA CNPJ COM MÚLTIPLAS APIs ==========
        // Lista de APIs em ordem de tentativa
        const apisCNPJ = [
            {
                nome: 'cnpj.ws',
                url: (cnpj) => `https://publica.cnpj.ws/cnpj/${cnpj}`,
                processar: (data) => {
                    return {
                        razao_social: data.razao_social,
                        nome_fantasia: data.nome_fantasia,
                        cnae: data.estabelecimento?.cnae_fiscal_descricao,
                        logradouro: data.estabelecimento?.logradouro,
                        numero: data.estabelecimento?.numero,
                        complemento: data.estabelecimento?.complemento,
                        bairro: data.estabelecimento?.bairro,
                        cep: data.estabelecimento?.cep,
                        uf: data.estabelecimento?.estado?.sigla,
                        municipio: data.estabelecimento?.cidade?.nome,
                        telefone1: data.estabelecimento?.telefone1,
                        telefone2: data.estabelecimento?.telefone2
                    };
                }
            },
            {
                nome: 'OpenCNPJ',
                url: (cnpj) => `https://opencnpj.org/api/v1/cnpj/${cnpj}`,
                processar: (data) => {
                    return {
                        razao_social: data.razao_social,
                        nome_fantasia: data.nome_fantasia,
                        cnae: data.cnae_fiscal_principal?.descricao,
                        logradouro: data.logradouro,
                        numero: data.numero,
                        complemento: data.complemento,
                        bairro: data.bairro,
                        cep: data.cep,
                        uf: data.uf,
                        municipio: data.municipio,
                        telefone1: data.ddd_telefone_1,
                        telefone2: data.ddd_telefone_2
                    };
                }
            },
            {
                nome: 'BrasilAPI',
                url: (cnpj) => `https://brasilapi.com.br/api/cnpj/v1/${cnpj}`,
                processar: (data) => {
                    return {
                        razao_social: data.razao_social,
                        nome_fantasia: data.nome_fantasia,
                        cnae: data.cnae_fiscal_descricao,
                        logradouro: data.logradouro,
                        numero: data.numero,
                        complemento: data.complemento,
                        bairro: data.bairro,
                        cep: data.cep,
                        uf: data.uf,
                        municipio: data.municipio,
                        telefone1: data.ddd_telefone_1,
                        telefone2: data.ddd_telefone_2
                    };
                }
            },
            {
                nome: 'MinhaReceita',
                url: (cnpj) => `https://minhareceita.org/api/v1/cnpj/${cnpj}`,
                processar: (data) => {
                    return {
                        razao_social: data.razao_social,
                        nome_fantasia: data.nome_fantasia,
                        cnae: data.cnae_fiscal_descricao,
                        logradouro: data.logradouro,
                        numero: data.numero,
                        complemento: data.complemento,
                        bairro: data.bairro,
                        cep: data.cep,
                        uf: data.uf,
                        municipio: data.municipio,
                        telefone1: data.ddd_telefone_1,
                        telefone2: data.ddd_telefone_2
                    };
                }
            },
            {
                nome: 'ReceitaWS (com proxy)',
                url: (cnpj) => `https://cors-anywhere.herokuapp.com/https://receitaws.com.br/v1/cnpj/${cnpj}`,
                processar: (data) => {
                    return {
                        razao_social: data.nome,
                        nome_fantasia: data.fantasia,
                        cnae: data.atividade_principal?.text,
                        logradouro: data.logradouro,
                        numero: data.numero,
                        complemento: data.complemento,
                        bairro: data.bairro,
                        cep: data.cep,
                        uf: data.uf,
                        municipio: data.municipio,
                        telefone1: data.telefone,
                        telefone2: null
                    };
                }
            }
        ];

        let consultandoCNPJ = false;
        let debounceTimer;

        async function consultarCNPJ() {
            const cnpjNum = dom.cnpj.value.replace(/\D/g, '');
            if (cnpjNum.length !== 14) return;
            if (consultandoCNPJ) return;
            consultandoCNPJ = true;

            helpers.cnpj.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Consultando CNPJ...';
            helpers.cnpj.className = 'helper-text';

            let sucesso = false;
            let ultimoErro = null;

            for (const api of apisCNPJ) {
                try {
                    if (api.nome === 'ReceitaWS (com proxy)') {
                        helpers.cnpj.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Tentando ${api.nome}...`;
                    }
                    const url = api.url(cnpjNum);
                    const resp = await fetch(url, {
                        headers: api.nome === 'ReceitaWS (com proxy)' ? { 'Origin': 'https://example.com' } : {}
                    });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();
                    
                    // Verifica se a API retornou erro
                    if (data.status === 'ERROR' || data.error) throw new Error('API retornou erro');
                    
                    const dados = api.processar(data);
                    
                    // Preencher campos
                    if (dados.razao_social) dom.razaoSocial.value = dados.razao_social;
                    if (dados.nome_fantasia) dom.nomeFantasia.value = dados.nome_fantasia;
                    if (dados.cnae) dom.ramoAtividade.value = dados.cnae;
                    if (dados.logradouro) dom.endereco.value = dados.logradouro;
                    if (dados.numero) dom.numero.value = dados.numero;
                    if (dados.complemento) dom.complemento.value = dados.complemento;
                    if (dados.bairro) dom.bairro.value = dados.bairro;
                    if (dados.cep) {
                        let cep = dados.cep.replace(/\D/g, '');
                        if (cep.length === 8) cep = cep.replace(/^(\d{5})(\d{3})/, '$1-$2');
                        dom.cep.value = cep;
                        setTimeout(buscarEnderecoPorCEP, 100);
                    }
                    if (dados.uf) {
                        const opt = Array.from(dom.estado.options).find(o => o.value === dados.uf);
                        if (opt) dom.estado.value = dados.uf;
                        await carregarCidadesPorEstado(dados.uf);
                        if (dados.municipio) {
                            setTimeout(() => {
                                const cidadeOpt = Array.from(dom.cidade.options).find(o => o.value === dados.municipio);
                                if (cidadeOpt) dom.cidade.value = dados.municipio;
                                else {
                                    const newOpt = document.createElement('option');
                                    newOpt.value = dados.municipio;
                                    newOpt.textContent = dados.municipio;
                                    dom.cidade.appendChild(newOpt);
                                    dom.cidade.value = dados.municipio;
                                }
                                validarCidade();
                            }, 100);
                        }
                    }
                    if (dados.telefone1) {
                        let tel = dados.telefone1.replace(/\D/g, '');
                        if (tel.length === 10) tel = tel.replace(/^(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
                        dom.telefone.value = tel;
                    }
                    if (dados.telefone2) {
                        let tel = dados.telefone2.replace(/\D/g, '');
                        if (tel.length === 10) tel = tel.replace(/^(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
                        dom.outroTelefone.value = tel;
                    }

                    mostrarSucesso(helpers.cnpj, dom.cnpj, `CNPJ encontrado via ${api.nome}! Dados preenchidos.`);
                    sucesso = true;
                    break;
                } catch (error) {
                    ultimoErro = error;
                    console.warn(`Erro na API ${api.nome}:`, error);
                    continue; // Tenta próxima API
                }
            }

            if (!sucesso) {
                mostrarErro(helpers.cnpj, dom.cnpj, 'CNPJ inválido ou API indisponível. Tente novamente.');
                validarCNPJ(); // Valida o formato
            }

            // Disparar validações dos campos preenchidos
            validarRazaoSocial();
            validarNomeFantasia();
            validarRamoAtividade();
            validarEndereco();
            validarNumero();
            validarBairro();
            validarCEP();
            validarEstado();

            consultandoCNPJ = false;
        }

        // Gatilhos para consulta CNPJ
        dom.cnpj.addEventListener('blur', () => {
            const len = dom.cnpj.value.replace(/\D/g, '').length;
            if (len === 14) consultarCNPJ();
            else validarCNPJ();
        });
        
        dom.cnpj.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const len = dom.cnpj.value.replace(/\D/g, '').length;
            if (len === 14) {
                debounceTimer = setTimeout(() => consultarCNPJ(), 1200);
            }
        });

        // --- Eventos de validação em tempo real ---
        dom.nomeFantasia.addEventListener('blur', validarNomeFantasia);
        dom.nomeFantasia.addEventListener('input', validarNomeFantasia);
        dom.razaoSocial.addEventListener('blur', validarRazaoSocial);
        dom.razaoSocial.addEventListener('input', validarRazaoSocial);
        dom.ramoAtividade.addEventListener('blur', validarRamoAtividade);
        dom.ramoAtividade.addEventListener('input', validarRamoAtividade);
        dom.endereco.addEventListener('blur', validarEndereco);
        dom.endereco.addEventListener('input', validarEndereco);
        dom.numero.addEventListener('blur', validarNumero);
        dom.numero.addEventListener('input', validarNumero);
        dom.bairro.addEventListener('blur', validarBairro);
        dom.bairro.addEventListener('input', validarBairro);
        dom.estado.addEventListener('change', validarEstado);
        dom.cidade.addEventListener('change', validarCidade);
        dom.celular.addEventListener('blur', validarCelular);
        dom.celular.addEventListener('input', validarCelular);
        dom.nomeContato.addEventListener('blur', validarNomeContato);
        dom.nomeContato.addEventListener('input', validarNomeContato);
        dom.emailContato.addEventListener('blur', validarEmailContato);
        dom.emailContato.addEventListener('input', validarEmailContato);
        dom.telefone.addEventListener('blur', () => validarTelefoneOpcional(dom.telefone, helpers.telefone));
        dom.outroTelefone.addEventListener('blur', () => validarTelefoneOpcional(dom.outroTelefone, helpers.outroTelefone));
        dom.telefoneContato.addEventListener('blur', () => validarTelefoneOpcional(dom.telefoneContato, helpers.telefoneContato));

        // --- Validação geral e submit ---
        function validarFormulario() {
            const obrigatorios = [
                validarNomeFantasia(),
                validarRazaoSocial(),
                validarRamoAtividade(),
                validarCNPJ(),
                validarEndereco(),
                validarNumero(),
                validarCEP(),
                validarBairro(),
                validarEstado(),
                validarCidade(),
                validarCelular(),
                validarNomeContato(),
                validarEmailContato()
            ];
            validarTelefoneOpcional(dom.telefone, helpers.telefone);
            validarTelefoneOpcional(dom.outroTelefone, helpers.outroTelefone);
            validarTelefoneOpcional(dom.telefoneContato, helpers.telefoneContato);
            return obrigatorios.every(v => v === true);
        }

        dom.form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msgSucesso.classList.add('oculto');s
            msgErro.classList.add('oculto');
            if (!validarFormulario()) {
                msgErro.classList.remove('oculto');
                const primeiroErro = document.querySelector('.error');
                if (primeiroErro) primeiroErro.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }
            dom.btn.disabled = true;
            dom.btn.textContent = 'ENVIANDO...';
            try {
                await new Promise(resolve => setTimeout(resolve, 1500));
                msgSucesso.classList.remove('oculto');
                dom.form.reset();
                for (let key in dom) {
                    if (dom[key] && helpers[key]) limparHelper(helpers[key], dom[key]);
                }
                dom.cidade.innerHTML = '<option value="" disabled selected>Selecionar</option>';
                dom.estado.value = '';
            } catch (err) {
                msgErro.classList.remove('oculto');
            } finally {
                dom.btn.disabled = false;
                dom.btn.textContent = 'ENVIAR';
            }
        });
    })();
</script>
</body>
</html>
