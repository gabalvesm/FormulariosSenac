<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Oportunidades - Senac</title>
    <!-- Fonte Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #cfd0d1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            padding: 16px;
        }

        .container {
            max-width: 680px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 32px 32px 28px;
            border: 1px solid rgba(0,0,0,0.04);
        }

        h1 {
            color: #F7941E;
            font-size: 32px;
            margin-bottom: 4px;
            text-align: center;
            padding-bottom: 10px;
            letter-spacing: -0.02em;
        }

        h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 500;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 0;
            position: relative;
        }

        .campo.full-width {
            grid-column: span 2;
        }

        .campo label {
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .required-star {
            color: #dc2626;
            font-size: 14px;
        }

        .campo input,
        .campo select {
            background: #f9fcff;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            outline: none;
            transition: all 0.15s;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .campo input:focus,
        .campo select:focus {
            border-color: #1e4f8a;
            box-shadow: 0 0 0 3px rgba(30,79,138,0.15);
            background: white;
        }

        .campo input.error,
        .campo select.error {
            border-color: #dc2626;
            background: #fef2f2;
        }

        .campo input.success,
        .campo select.success {
            border-color: #16a34a;
            background: #f0fdf4;
        }

        .helper-text {
            font-size: 12px;
            margin-left: 6px;
            min-height: 18px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .helper-text.error-msg {
            color: #dc2626;
        }

        .helper-text.success-msg {
            color: #16a34a;
        }

        .helper-text i {
            font-size: 12px;
        }

        .checkbox-group {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: normal;
            text-transform: none;
            font-size: 14px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .btn-submit {
            background: #005b96;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.6s ease;
            display: block;
            margin: 20px auto 0;
            min-width: 200px;
            border: 1px solid #1d3449;
        }

        .btn-submit:hover:not(:disabled) {
            background: #F7941D;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247,148,29,0.3);
        }

        .btn-submit:disabled {
            background: #cccccc;
            border-color: #999999;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Mensagens de retorno */
        .mensagem-envio {
            background: #eaf6e7;
            border: 1px solid #9ec5a0;
            border-radius: 40px;
            padding: 14px 22px;
            font-size: 15px;
            color: #1f4f2b;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 500;
            animation: slideDown 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mensagem-envio.erro {
            background: #fee9e7;
            border-color: #f1a09c;
            color: #a11f1f;
        }

        .mensagem-envio i {
            font-size: 18px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .oculto {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .campo.full-width {
                grid-column: span 1;
            }
        }

        /* Indicador de campos obrigatórios */
        .campos-obrigatorios-info {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 16px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }

        .campos-obrigatorios-info .required-star {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Banco de Oportunidades</h1>
        <h2>Preencha seus dados</h2>

        <!-- Mensagens de retorno -->
        <div id="msgSucesso" class="mensagem-envio oculto">
            <i class="fas fa-check-circle"></i> Formulário enviado com sucesso!
        </div>

        <div id="msgErro" class="mensagem-envio erro oculto">
            <i class="fas fa-exclamation-circle"></i> Erro ao enviar formulário. Tente novamente.
        </div>

        <!-- Indicador de campos obrigatórios -->
        <div class="campos-obrigatorios-info">
            <span class="required-star">*</span> Campos obrigatórios
        </div>

        <form id="formulario" novalidate>
            <div class="form-grid">
                <!-- Nome Completo (obrigatório) -->
                <div class="campo">
                    <label for="nome">
                        NOME COMPLETO
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo">
                    <div class="helper-text" id="helper-nome"></div>
                </div>

                <!-- Sexo (obrigatório) -->
                <div class="campo">
                    <label for="sexo">
                        SEXO
                        <span class="required-star">*</span>
                    </label>
                    <select id="sexo" name="sexo">
                        <option value="" disabled selected>Selecione...</option>
                        <option value="masculino">Masculino</option>
                        <option value="feminino">Feminino</option>
                        <option value="outro">Outro</option>
                    </select>
                    <div class="helper-text" id="helper-sexo"></div>
                </div>

                <!-- CPF (obrigatório) -->
                <div class="campo">
                    <label for="cpf">
                        CPF
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14">
                    <div class="helper-text" id="helper-cpf"></div>
                </div>

                <!-- RG (obrigatório) -->
                <div class="campo">
                    <label for="rg">
                        RG
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="rg" name="rg" placeholder="Digite seu RG">
                    <div class="helper-text" id="helper-rg"></div>
                </div>

                <!-- Naturalidade (obrigatório) -->
                <div class="campo">
                    <label for="naturalidade">
                        NATURALIDADE
                        <span class="required-star">*</span>
                    </label>
                    <select id="naturalidade" name="naturalidade">
                        <option value="" disabled selected>Selecione...</option>
                        <option value="brasileiro">Brasileiro</option>
                        <option value="outro">Outro</option>
                    </select>
                    <div class="helper-text" id="helper-naturalidade"></div>
                </div>

                <!-- Nome da Mãe (obrigatório) -->
                <div class="campo">
                    <label for="nomeMae">
                        NOME DA MÃE
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="nomeMae" name="nomeMae" placeholder="Nome completo da sua mãe">
                    <div class="helper-text" id="helper-nomeMae"></div>
                </div>

                <!-- CEP (obrigatório) -->
                <div class="campo full-width">
                    <label for="cep">
                        CEP
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9">
                    <div class="helper-text" id="helper-cep"></div>
                </div>

                <!-- Endereço (obrigatório) -->
                <div class="campo full-width">
                    <label for="endereco">
                        ENDEREÇO COMPLETO
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="endereco" name="endereco" placeholder="Av. Paulista, 1000">
                    <div class="helper-text" id="helper-endereco"></div>
                </div>

                <!-- Bairro (obrigatório) -->
                <div class="campo full-width">
                    <label for="bairro">
                        BAIRRO
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="bairro" name="bairro" placeholder="Centro">
                    <div class="helper-text" id="helper-bairro"></div>
                </div>
                
                <!-- Cidade (obrigatório) -->
                <div class="campo full-width">
                    <label for="cidade">
                        CIDADE (BA)
                        <span class="required-star">*</span>
                    </label>
                    <select id="cidade" name="cidade">
                        <option value="" disabled selected>Carregando cidades...</option>
                    </select>
                    <div class="helper-text" id="helper-cidade"></div>
                </div>

                <!-- Celular (obrigatório) -->
                <div class="campo">
                    <label for="celular">
                        CELULAR
                        <span class="required-star">*</span>
                    </label>
                    <input type="text" id="celular" name="celular" placeholder="(71) 98888-7777" maxlength="15">
                    <div class="helper-text" id="helper-celular"></div>
                </div>

                <!-- Telefone (opcional) -->
                <div class="campo">
                    <label for="telefone">TELEFONE</label>
                    <input type="text" id="telefone" name="telefone" placeholder="(71) 3333-4444" maxlength="14">
                    <div class="helper-text" id="helper-telefone"></div>
                </div>

                <!-- Email (obrigatório) -->
                <div class="campo full-width">
                    <label for="email">
                        E-MAIL
                        <span class="required-star">*</span>
                    </label>
                    <input type="email" id="email" name="email" placeholder="contato@email.com">
                    <div class="helper-text" id="helper-email"></div>
                </div>

                <!-- Escolaridade (obrigatório) -->
                <div class="campo full-width">
                    <label for="escolaridade">
                        ESCOLARIDADE
                        <span class="required-star">*</span>
                    </label>
                    <select id="escolaridade" name="escolaridade">
                        <option value="" disabled selected>Selecione...</option>
                        <option value="fundamental_incompleto">Ensino Fundamental Completo</option>
                        <option value="fundamental_completo">Ensino Fundamental Incompleto</option>
                        <option value="medio_completo">Ensino Médio Completo</option>
                        <option value="medio_incompleto">Ensino Médio Incompleto</option>
                        <option value="superior_completo">Ensino Superior Completo</option>
                        <option value="superior_incompleto">Ensino Superior Incompleto</option>
                        <option value="pos_graduacao">Pós-Graduação Completa</option>
                        <option value="pos_graduacao_completa">Pós-Graduação Incompleta</option>

                    </select>
                    <div class="helper-text" id="helper-escolaridade"></div>
                </div>

                <!-- Curso Senac (opcional) -->
                <div class="campo full-width">
                    <label for="cursoSenac">CURSO/PALESTRA NO SENAC <span style="font-weight:400; color:#64748b;">(opcional)</span></label>
                    <input type="text" id="cursoSenac" name="cursoSenac" placeholder="Digite o nome do curso ou palestra">
                    <div class="helper-text" id="helper-cursoSenac"></div>
                </div>
            </div>

            <!-- Aceite LGPD (obrigatório) -->
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="aceiteLGPD" name="aceiteLGPD">
                    Aceita receber programação de curso com soluções corporativas Senac (baseado na LGPD)
                    <span class="required-star">*</span>
                </label>
                <div class="helper-text" id="helper-aceite"></div>
            </div>

            <!-- Botão Enviar -->
            <button type="submit" class="btn-submit" id="btnEnviar">ENVIAR FORMULÁRIO</button>
        </form>
    </div>

    <script>
        (function() {
            'use strict';

            // ==================== ELEMENTOS DO FORMULÁRIO ====================
            const elementos = {
                nome: document.getElementById('nome'),
                sexo: document.getElementById('sexo'),
                cpf: document.getElementById('cpf'),
                rg: document.getElementById('rg'),
                naturalidade: document.getElementById('naturalidade'),
                nomeMae: document.getElementById('nomeMae'),
                endereco: document.getElementById('endereco'),
                bairro: document.getElementById('bairro'),
                cep: document.getElementById('cep'),
                cidade: document.getElementById('cidade'),
                celular: document.getElementById('celular'),
                telefone: document.getElementById('telefone'),
                email: document.getElementById('email'),
                escolaridade: document.getElementById('escolaridade'),
                cursoSenac: document.getElementById('cursoSenac'),
                aceiteLGPD: document.getElementById('aceiteLGPD'),
                btnEnviar: document.getElementById('btnEnviar'),
                formulario: document.getElementById('formulario')
            };

            // Helpers
            const helpers = {
                nome: document.getElementById('helper-nome'),
                sexo: document.getElementById('helper-sexo'),
                cpf: document.getElementById('helper-cpf'),
                rg: document.getElementById('helper-rg'),
                naturalidade: document.getElementById('helper-naturalidade'),
                nomeMae: document.getElementById('helper-nomeMae'),
                endereco: document.getElementById('helper-endereco'),
                bairro: document.getElementById('helper-bairro'),
                cep: document.getElementById('helper-cep'),
                cidade: document.getElementById('helper-cidade'),
                celular: document.getElementById('helper-celular'),
                telefone: document.getElementById('helper-telefone'),
                email: document.getElementById('helper-email'),
                escolaridade: document.getElementById('helper-escolaridade'),
                cursoSenac: document.getElementById('helper-cursoSenac'),
                aceite: document.getElementById('helper-aceite')
            };

            // Mensagens
            const msgSucesso = document.getElementById('msgSucesso');
            const msgErro = document.getElementById('msgErro');

            // ==================== CARREGAR CIDADES ====================
            async function carregarCidadesBahia() {
                try {
                    const response = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados/29/municipios');
                    if (!response.ok) throw new Error('Erro na API');
                    
                    const municipios = await response.json();
                    municipios.sort((a, b) => a.nome.localeCompare(b.nome));
                    
                    elementos.cidade.innerHTML = '<option value="" disabled selected>Selecione a cidade</option>';
                    municipios.forEach(m => {
                        const option = document.createElement('option');
                        option.value = m.nome;
                        option.textContent = m.nome;
                        elementos.cidade.appendChild(option);
                    });
                    
                    helpers.cidade.textContent = `${municipios.length} cidades carregadas`;
                    helpers.cidade.className = 'helper-text success-msg';
                } catch (error) {
                    console.error('Erro ao carregar cidades:', error);
                    
                    const fallback = ['Salvador', 'Feira de Santana', 'Vitória da Conquista', 'Camaçari', 'Itabuna', 'Juazeiro', 'Ilhéus', 'Lauro de Freitas', 'Jequié', 'Alagoinhas'];
                    elementos.cidade.innerHTML = '<option value="" disabled selected>Selecione a cidade</option>';
                    fallback.sort().forEach(cidadeNome => {
                        const option = document.createElement('option');
                        option.value = cidadeNome;
                        option.textContent = cidadeNome;
                        elementos.cidade.appendChild(option);
                    });
                    helpers.cidade.textContent = 'Modo offline - cidades principais';
                }
            }
            carregarCidadesBahia();

            // ==================== MÁSCARAS ====================
            function mascaraCPF(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 11) {
                    if (valor.length > 9) {
                        valor = valor.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
                    } else if (valor.length > 6) {
                        valor = valor.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
                    } else if (valor.length > 3) {
                        valor = valor.replace(/(\d{3})(\d{1,3})/, '$1.$2');
                    }
                    e.target.value = valor;
                }
                validarCPF();
            }

            function mascaraCEP(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 8) {
                    if (valor.length > 5) {
                        valor = valor.replace(/(\d{5})(\d{1,3})/, '$1-$2');
                    }
                    e.target.value = valor;
                }
                validarCEP();
            }

            function mascaraCelular(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 11) {
                    if (valor.length > 7) {
                        valor = valor.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                    } else if (valor.length > 2) {
                        valor = valor.replace(/(\d{2})(\d{1,5})/, '($1) $2');
                    }
                    e.target.value = valor;
                }
                validarCelular();
            }

            function mascaraTelefone(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 10) {
                    if (valor.length > 6) {
                        valor = valor.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
                    } else if (valor.length > 2) {
                        valor = valor.replace(/(\d{2})(\d{1,4})/, '($1) $2');
                    }
                    e.target.value = valor;
                }
            }

            elementos.cpf.addEventListener('input', mascaraCPF);
            elementos.cep.addEventListener('input', mascaraCEP);
            elementos.celular.addEventListener('input', mascaraCelular);
            elementos.telefone.addEventListener('input', mascaraTelefone);

            // ==================== BUSCA DE ENDEREÇO ====================
            async function buscarEnderecoPorCEP() {
                const cepNumerico = elementos.cep.value.replace(/\D/g, '');
                
                if (cepNumerico.length !== 8) return;

                helpers.cep.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Buscando endereço...';
                
                try {
                    const response = await fetch(`https://viacep.com.br/ws/${cepNumerico}/json/`);
                    if (!response.ok) throw new Error('Erro na busca');
                    
                    const dados = await response.json();
                    
                    if (dados.erro) {
                        mostrarErro(helpers.cep, elementos.cep, 'CEP não encontrado');
                        return;
                    }
                    
                    elementos.endereco.value = dados.logradouro || '';
                    elementos.bairro.value = dados.bairro || '';
                    
                    if (dados.localidade) {
                        const cidadeExistente = Array.from(elementos.cidade.options).find(opt => opt.value === dados.localidade);
                        if (cidadeExistente) {
                            elementos.cidade.value = dados.localidade;
                        } else {
                            const option = document.createElement('option');
                            option.value = dados.localidade;
                            option.textContent = dados.localidade;
                            elementos.cidade.appendChild(option);
                            elementos.cidade.value = dados.localidade;
                        }
                    }
                    
                    mostrarSucesso(helpers.cep, elementos.cep, 'CEP encontrado');
                    
                    // Validar campos preenchidos
                    validarEndereco();
                    validarBairro();
                    validarCidade();
                    
                } catch (error) {
                    mostrarErro(helpers.cep, elementos.cep, 'Erro ao buscar CEP');
                }
            }

            elementos.cep.addEventListener('blur', buscarEnderecoPorCEP);

            // ==================== FUNÇÕES DE VALIDAÇÃO ====================
            function mostrarErro(helper, elemento, mensagem) {
                helper.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${mensagem}`;
                helper.className = 'helper-text error-msg';
                elemento.classList.add('error');
                elemento.classList.remove('success');
            }

            function mostrarSucesso(helper, elemento, mensagem) {
                helper.innerHTML = `<i class="fas fa-check-circle"></i> ${mensagem}`;
                helper.className = 'helper-text success-msg';
                elemento.classList.add('success');
                elemento.classList.remove('error');
            }

            function limparHelper(helper, elemento) {
                helper.innerHTML = '';
                helper.className = 'helper-text';
                elemento.classList.remove('error', 'success');
            }

            // Validações específicas
            function validarNome() {
                const val = elementos.nome.value.trim();
                if (val === "") {
                    mostrarErro(helpers.nome, elementos.nome, 'Nome é obrigatório');
                    return false;
                }
                if (val.length < 3) {
                    mostrarErro(helpers.nome, elementos.nome, 'Nome deve ter pelo menos 3 caracteres');
                    return false;
                }
                if (/[^a-zA-ZÀ-ÿ\s]/.test(val)) {
                    mostrarErro(helpers.nome, elementos.nome, 'Nome não pode conter números ou caracteres especiais');
                    return false;
                }
                mostrarSucesso(helpers.nome, elementos.nome, 'Nome válido');
                return true;
            }

            function validarSexo() {
                if (!elementos.sexo.value) {
                    mostrarErro(helpers.sexo, elementos.sexo, 'Selecione o sexo');
                    return false;
                }
                mostrarSucesso(helpers.sexo, elementos.sexo, 'Sexo selecionado');
                return true;
            }

            function validarCPF() {
                const val = elementos.cpf.value.replace(/[^\d]/g, '');
                if (!val) {
                    mostrarErro(helpers.cpf, elementos.cpf, 'CPF é obrigatório');
                    return false;
                }
                if (val.length !== 11 || /^(\d)\1{10}$/.test(val)) {
                    mostrarErro(helpers.cpf, elementos.cpf, 'CPF inválido');
                    return false;
                }
                
                // Validação dos dígitos verificadores
                let soma = 0;
                for (let i = 0; i < 9; i++) soma += parseInt(val.charAt(i)) * (10 - i);
                let resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                if (resto !== parseInt(val.charAt(9))) {
                    mostrarErro(helpers.cpf, elementos.cpf, 'CPF inválido');
                    return false;
                }
                
                soma = 0;
                for (let i = 0; i < 10; i++) soma += parseInt(val.charAt(i)) * (11 - i);
                resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                if (resto !== parseInt(val.charAt(10))) {
                    mostrarErro(helpers.cpf, elementos.cpf, 'CPF inválido');
                    return false;
                }
                
                mostrarSucesso(helpers.cpf, elementos.cpf, 'CPF válido');
                return true;
            }

            function validarRG() {
                const val = elementos.rg.value.replace(/[^\d]/g, '');
                if (!val) {
                    mostrarErro(helpers.rg, elementos.rg, 'RG é obrigatório');
                    return false;
                }
                if (val.length < 5 || val.length > 12) {
                    mostrarErro(helpers.rg, elementos.rg, 'RG deve ter entre 5 e 12 dígitos');
                    return false;
                }
                mostrarSucesso(helpers.rg, elementos.rg, 'RG válido');
                return true;
            }

            function validarNaturalidade() {
                if (!elementos.naturalidade.value) {
                    mostrarErro(helpers.naturalidade, elementos.naturalidade, 'Selecione a naturalidade');
                    return false;
                }
                mostrarSucesso(helpers.naturalidade, elementos.naturalidade, 'Naturalidade selecionada');
                return true;
            }

            function validarNomeMae() {
                const val = elementos.nomeMae.value.trim();
                if (!val) {
                    mostrarErro(helpers.nomeMae, elementos.nomeMae, 'Nome da mãe é obrigatório');
                    return false;
                }
                if (val.length < 3) {
                    mostrarErro(helpers.nomeMae, elementos.nomeMae, 'Nome deve ter pelo menos 3 caracteres');
                    return false;
                }
                if (/[^a-zA-ZÀ-ÿ\s]/.test(val)) {
                    mostrarErro(helpers.nomeMae, elementos.nomeMae, ' não pode conter números ou caracteres especiais');
                    return false;
                }
                mostrarSucesso(helpers.nomeMae, elementos.nomeMae, 'Nome da mãe válido');
                return true;
            }

            function validarEndereco() {
                const val = elementos.endereco.value.trim();
                if (!val) {
                    mostrarErro(helpers.endereco, elementos.endereco, 'Endereço é obrigatório');
                    return false;
                }
                if (val.length < 5) {
                    mostrarErro(helpers.endereco, elementos.endereco, 'Endereço muito curto');
                    return false;
                }
                mostrarSucesso(helpers.endereco, elementos.endereco, 'Endereço válido');
                return true;
            }

            function validarBairro() {
                const val = elementos.bairro.value.trim();
                if (!val) {
                    mostrarErro(helpers.bairro, elementos.bairro, 'Bairro é obrigatório');
                    return false;
                }
                if (val.length < 3) {
                    mostrarErro(helpers.bairro, elementos.bairro, 'Bairro muito curto');
                    return false;
                }
                mostrarSucesso(helpers.bairro, elementos.bairro, 'Bairro válido');
                return true;
            }

            function validarCEP() {
                const val = elementos.cep.value.replace(/[^\d-]/g, '');
                if (!val) {
                    mostrarErro(helpers.cep, elementos.cep, 'CEP é obrigatório');
                    return false;
                }
                if (!/^\d{5}-?\d{3}$/.test(val)) {
                    mostrarErro(helpers.cep, elementos.cep, 'Formato: 00000-000');
                    return false;
                }
                mostrarSucesso(helpers.cep, elementos.cep, 'CEP válido');
                return true;
            }

            function validarCidade() {
                if (!elementos.cidade.value) {
                    mostrarErro(helpers.cidade, elementos.cidade, 'Selecione uma cidade');
                    return false;
                }
                mostrarSucesso(helpers.cidade, elementos.cidade, 'Cidade selecionada');
                return true;
            }

            function validarCelular() {
                const val = elementos.celular.value.replace(/\D/g, '');
                if (val === '') {
                    mostrarErro(helpers.celular, elementos.celular, 'Celular é obrigatório');
                    return false;
                }
                if (val.length !== 11) {
                    mostrarErro(helpers.celular, elementos.celular, 'Celular deve ter 11 dígitos');
                    return false;
                }
                mostrarSucesso(helpers.celular, elementos.celular, 'Celular válido');
                return true;
            }

            function validarEmail() {
                const val = elementos.email.value.trim();
                if (!val) {
                    mostrarErro(helpers.email, elementos.email, 'E-mail é obrigatório');
                    return false;
                }
                const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!regex.test(val)) {
                    mostrarErro(helpers.email, elementos.email, 'E-mail inválido');
                    return false;
                }
                mostrarSucesso(helpers.email, elementos.email, 'E-mail válido');
                return true;
            }

            function validarEscolaridade() {
                if (!elementos.escolaridade.value) {
                    mostrarErro(helpers.escolaridade, elementos.escolaridade, 'Selecione a escolaridade');
                    return false;
                }
                mostrarSucesso(helpers.escolaridade, elementos.escolaridade, 'Escolaridade selecionada');
                return true;
            }

            function validarAceite() {
                if (!elementos.aceiteLGPD.checked) {
                    mostrarErro(helpers.aceite, elementos.aceiteLGPD, 'Você deve aceitar os termos');
                    return false;
                }
                mostrarSucesso(helpers.aceite, elementos.aceiteLGPD, 'Termos aceitos');
                return true;
            }

            // ==================== VALIDAÇÃO GERAL ====================
            function validarFormulario() {
                const validacoes = [
                    validarNome(),
                    validarSexo(),
                    validarCPF(),
                    validarRG(),
                    validarNaturalidade(),
                    validarNomeMae(),
                    validarEndereco(),
                    validarBairro(),
                    validarCEP(),
                    validarCidade(),
                    validarCelular(),
                    validarEmail(),
                    validarEscolaridade(),
                    validarAceite()
                ];

                return validacoes.every(v => v === true);
            }

            // ==================== EVENTOS DE VALIDAÇÃO EM TEMPO REAL ====================
            elementos.nome.addEventListener('blur', validarNome);
            elementos.nome.addEventListener('input', validarNome);
            
            elementos.sexo.addEventListener('change', validarSexo);
            
            elementos.rg.addEventListener('blur', validarRG);
            elementos.rg.addEventListener('input', validarRG);
            
            elementos.naturalidade.addEventListener('change', validarNaturalidade);
            
            elementos.nomeMae.addEventListener('blur', validarNomeMae);
            elementos.nomeMae.addEventListener('input', validarNomeMae);
            
            elementos.endereco.addEventListener('blur', validarEndereco);
            elementos.endereco.addEventListener('input', validarEndereco);
            
            elementos.bairro.addEventListener('blur', validarBairro);
            elementos.bairro.addEventListener('input', validarBairro);
            
            elementos.cidade.addEventListener('change', validarCidade);
            
            elementos.email.addEventListener('blur', validarEmail);
            elementos.email.addEventListener('input', validarEmail);
            
            elementos.escolaridade.addEventListener('change', validarEscolaridade);
            
            elementos.aceiteLGPD.addEventListener('change', validarAceite);

            // ==================== ENVIO DO FORMULÁRIO ====================
            elementos.formulario.addEventListener('submit', async function(e) {
                e.preventDefault();

                // Esconder mensagens anteriores
                msgSucesso.classList.add('oculto');
                msgErro.classList.add('oculto');

                // Validar todos os campos
                if (!validarFormulario()) {
                    msgErro.classList.remove('oculto');
                    
                    // Rolar para o primeiro erro
                    const primeiroErro = document.querySelector('.error');
                    if (primeiroErro) {
                        primeiroErro.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    return;
                }

                // Simular envio
                elementos.btnEnviar.disabled = true;
                elementos.btnEnviar.textContent = 'ENVIANDO...';

                try {
                    // Simulação de envio (substituir por fetch real)
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    // Sucesso
                    msgSucesso.classList.remove('oculto');
                    elementos.formulario.reset();
                    
                    // Limpar todas as validações
                    Object.keys(helpers).forEach(key => {
                        if (helpers[key] && elementos[key]) {
                            limparHelper(helpers[key], elementos[key]);
                        }
                    });
                    
                } catch (error) {
                    msgErro.classList.remove('oculto');
                } finally {
                    elementos.btnEnviar.disabled = false;
                    elementos.btnEnviar.textContent = 'ENVIAR FORMULÁRIO';
                }
            });
        })();
    </script>
</body>
</html>
