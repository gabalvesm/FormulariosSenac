<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Oportunidades - Senac</title>
    <!-- Fonte Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #cfd0d1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            padding: 16px;
        }

        .container {
            max-width: 680px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 32px 32px 28px;
            border: 1px solid rgba(0,0,0,0.04);
        }

        h1 {
            color: #F7941E;
            font-size: 32px;
            margin-bottom: 4px;
            text-align: center;
            padding-bottom: 10px;
            letter-spacing: -0.02em;
        }

        h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 500;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 0;
        }

        .campo.full-width {
            grid-column: span 2;
        }

        .campo label {
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .campo input,
        .campo select {
            background: #f9fcff;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            outline: none;
            transition: all 0.15s;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .campo input:focus,
        .campo select:focus {
            border-color: #1e4f8a;
            box-shadow: 0 0 0 3px rgba(30,79,138,0.15);
            background: white;
        }

        .campo input.error,
        .campo select.error {
            border-color: #c2410c;
            background: #fff6f2;
        }

        .helper-text {
            font-size: 12px;
            color: #64748b;
            margin-left: 6px;
            min-height: 18px;
        }

        .helper-text.error-msg {
            color: #b91c1c;
        }

        .helper-text.success-msg {
            color: #0f7b3a;
        }

        .checkbox-group {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: normal;
            text-transform: none;
            font-size: 14px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .recaptcha-box {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #ccdae8;
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .recaptcha-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .fake-checkbox {
            width: 26px;
            height: 26px;
            background: white;
            border: 2px solid #5f6b7a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .fake-checkbox.checked {
            background: #1a5d9c;
            border-color: #1a5d9c;
        }

        .fake-checkbox i {
            color: white;
        }

        .recaptcha-text {
            font-size: 15px;
            color: #1e293b;
        }

        .recaptcha-text small {
            display: block;
            font-size: 11px;
            color: #556579;
            margin-top: 2px;
        }

        .recaptcha-logo {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 12px;
            color: #2c3f5c;
        }

        .recaptcha-logo strong {
            font-size: 18px;
            letter-spacing: 1px;
        }

        .recaptcha-logo span {
            font-size: 10px;
            color: #4f658d;
        }

        .rodape-recaptcha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #556579;
            border-top: 1px dashed #b9c7da;
            margin-top: 16px;
            padding-top: 14px;
        }

        .rodape-recaptcha a {
            color: #0a2c4e;
            text-decoration: none;
            margin: 0 6px;
        }

        .btn-submit {
            background: #005b96;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.3s ease;
            display: block;
            margin: 20px auto 0;
            min-width: 200px;
            border: 1px solid #1d3449;
        }

        .btn-submit:hover {
            background: #F7941D;
        }

        .btn-submit:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        /* ===== ESTILOS DAS MENSAGENS DE ENVIO ===== */
        .mensagem-envio {
            background: #eaf6e7;
            border: 1px solid #9ec5a0;
            border-radius: 40px;
            padding: 14px 22px;
            font-size: 15px;
            color: #1f4f2b;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 500;
            animation: slideDown 0.5s ease;
        }

        .mensagem-envio.erro {
            background: #fee9e7;
            border-color: #f1a09c;
            color: #a11f1f;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .oculto {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .campo.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Banco de Oportunidades</h1>
        <h2>Preencha seus dados</h2>

        <!-- ===== MENSAGENS DE RETORNO ===== -->
        <div id="msgSucesso" class="mensagem-envio oculto">
            <i class="fas fa-check-circle"></i> Formulário enviado com sucesso!
        </div>

        <div id="msgErro" class="mensagem-envio erro oculto">
            <i class="fas fa-exclamation-circle"></i> Erro ao enviar formulário. Tente novamente.
        </div>

        <form id="formulario" novalidate>
            <div class="form-grid">
                <!-- Nome Completo -->
                <div class="campo">
                    <label for="nome">NOME COMPLETO</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo">
                    <div class="helper-text" id="helper-nome"></div>
                </div>

                <!-- Sexo -->
                <div class="campo">
                    <label for="sexo">SEXO</label>
                    <select id="sexo" name="sexo">
                        <option value="" disabled selected>Selecione...</option>
                        <option value="masculino">Masculino</option>
                        <option value="feminino">Feminino</option>
                        <option value="outro">Outro</option>
                    </select>
                    <div class="helper-text" id="helper-sexo"></div>
                </div>

                <!-- CPF -->
                <div class="campo">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14">
                    <div class="helper-text" id="helper-cpf"></div>
                </div>

                <!-- RG -->
                <div class="campo">
                    <label for="rg">RG</label>
                    <input type="text" id="rg" name="rg" placeholder="Digite seu RG">
                    <div class="helper-text" id="helper-rg"></div>
                </div>

                <!-- Naturalidade -->
                <div class="campo">
                    <label for="naturalidade">NATURALIDADE</label>
                    <select id="naturalidade" name="naturalidade">
                        <option value="" disabled selected>Selecione...</option>
                        <option value="brasileiro">Brasileiro</option>
                        <option value="outro">Outro</option>
                    </select>
                    <div class="helper-text" id="helper-naturalidade"></div>
                </div>

                <!-- Nome da Mãe -->
                <div class="campo">
                    <label for="nomeMae">NOME DA MÃE</label>
                    <input type="text" id="nomeMae" name="nomeMae" placeholder="Nome completo da sua mãe">
                    <div class="helper-text" id="helper-nomeMae"></div>
                </div>

                <!-- Endereço (full width) -->
                <div class="campo full-width">
                    <label for="endereco">ENDEREÇO COMPLETO</label>
                    <input type="text" id="endereco" name="endereco" placeholder="Av. Paulista, 1000">
                    <div class="helper-text" id="helper-endereco"></div>
                </div>

                <!-- Bairro -->
                <div class="campo">
                    <label for="bairro">BAIRRO</label>
                    <input type="text" id="bairro" name="bairro" placeholder="Centro">
                    <div class="helper-text" id="helper-bairro"></div>
                </div>

                <!-- CEP -->
                <div class="campo">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9">
                    <div class="helper-text" id="helper-cep"></div>
                </div>

                <!-- Cidade -->
                <div class="campo full-width">
                    <label for="cidade">CIDADE (BA)</label>
                    <select id="cidade" name="cidade">
                        <option value="" disabled selected>Carregando cidades...</option>
                    </select>
                    <div class="helper-text" id="helper-cidade">Carregando cidades...</div>
                </div>

                <!-- Celular -->
                <div class="campo">
                    <label for="celular">CELULAR</label>
                    <input type="text" id="celular" name="celular" placeholder="(71) 98888-7777" maxlength="15">
                    <div class="helper-text" id="helper-celular"></div>
                </div>

                <!-- Telefone -->
                <div class="campo">
                    <label for="telefone">TELEFONE</label>
                    <input type="text" id="telefone" name="telefone" placeholder="(71) 3333-4444" maxlength="14">
                    <div class="helper-text" id="helper-telefone"></div>
                </div>

                <!-- Email (full width) -->
                <div class="campo full-width">
                    <label for="email">E-MAIL</label>
                    <input type="email" id="email" name="email" placeholder="contato@email.com">
                    <div class="helper-text" id="helper-email"></div>
                </div>

                <!-- Escolaridade -->
                <div class="campo full-width">
                    <label for="escolaridade">ESCOLARIDADE</label>
                    <select id="escolaridade" name="escolaridade">
                        <option value="" disabled selected>Selecione...</option>
                        <option value="medio_completo">Ensino Médio Completo</option>
                        <option value="medio_incompleto">Ensino Médio Incompleto</option>
                        <option value="superior_completo">Ensino Superior Completo</option>
                        <option value="superior_incompleto">Ensino Superior Incompleto</option>
                    </select>
                    <div class="helper-text" id="helper-escolaridade"></div>
                </div>

                <!-- Curso Senac (opcional) -->
                <div class="campo full-width">
                    <label for="cursoSenac">CURSO/PALESTRA NO SENAC <span style="font-weight:400; color:#64748b;">(opcional)</span></label>
                    <input type="text" id="cursoSenac" name="cursoSenac" placeholder="Digite o nome do curso ou palestra">
                    <div class="helper-text" id="helper-cursoSenac"></div>
                </div>
            </div>

            <!-- Aceite LGPD -->
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="aceiteLGPD" name="aceiteLGPD">
                    Aceita receber programação de curso com soluções corporativas Senac (baseado na LGPD)
                </label>
            </div>

            <!-- reCAPTCHA -->
            <div class="recaptcha-box" id="recaptchaMock">
                <div class="recaptcha-left">
                    <div class="fake-checkbox" id="fakeCheckbox"><i class="fas fa-check"></i></div>
                    <div class="recaptcha-text">
                        Não sou um robô
                        <small>Verificação de segurança</small>
                    </div>
                </div>
                <div class="recaptcha-logo">
                    <strong>reCAPTCHA</strong>
                    <span>Privacidade - Termos</span>
                </div>
            </div>

            <!-- Rodapé reCAPTCHA -->
            <div class="rodape-recaptcha">
                <span><i class="fas fa-robot"></i> reCAPTCHA</span>
                <span>
                    <a href="#">Privacidade</a> - 
                    <a href="#">Termos</a>
                </span>
            </div>

            <!-- Botão Enviar -->
            <button type="submit" class="btn-submit" id="btnEnviar">ENVIAR FORMULÁRIO</button>
        </form>
    </div>

    <script>
        (function() {
            'use strict';

            // ==================== ELEMENTOS DO FORMULÁRIO ====================
            // Inputs e selects
            const nome = document.getElementById('nome');
            const sexo = document.getElementById('sexo');
            const cpf = document.getElementById('cpf');
            const rg = document.getElementById('rg');
            const naturalidade = document.getElementById('naturalidade');
            const nomeMae = document.getElementById('nomeMae');
            const endereco = document.getElementById('endereco');
            const bairro = document.getElementById('bairro');
            const cep = document.getElementById('cep');
            const cidade = document.getElementById('cidade');
            const celular = document.getElementById('celular');
            const telefone = document.getElementById('telefone');
            const email = document.getElementById('email');
            const escolaridade = document.getElementById('escolaridade');
            const aceiteLGPD = document.getElementById('aceiteLGPD');
            const fakeCheckbox = document.getElementById('fakeCheckbox');
            const btnEnviar = document.getElementById('btnEnviar');
            const formulario = document.getElementById('formulario');
            
            // Helpers (mensagens de validação)
            const helperNome = document.getElementById('helper-nome');
            const helperSexo = document.getElementById('helper-sexo');
            const helperCpf = document.getElementById('helper-cpf');
            const helperRg = document.getElementById('helper-rg');
            const helperNaturalidade = document.getElementById('helper-naturalidade');
            const helperNomeMae = document.getElementById('helper-nomeMae');
            const helperEndereco = document.getElementById('helper-endereco');
            const helperBairro = document.getElementById('helper-bairro');
            const helperCep = document.getElementById('helper-cep');
            const helperCidade = document.getElementById('helper-cidade');
            const helperCelular = document.getElementById('helper-celular');
            const helperTelefone = document.getElementById('helper-telefone');
            const helperEmail = document.getElementById('helper-email');
            const helperEscolaridade = document.getElementById('helper-escolaridade');
            const helperCursoSenac = document.getElementById('helper-cursoSenac');

            // Mensagens de retorno
            const msgSucesso = document.getElementById('msgSucesso');
            const msgErro = document.getElementById('msgErro');

            // ==================== CARREGAR CIDADES DA BAHIA ====================
            async function carregarCidadesBahia() {
                try {
                    const response = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados/29/municipios');
                    if (!response.ok) throw new Error('Erro na API');
                    
                    const municipios = await response.json();
                    municipios.sort((a, b) => a.nome.localeCompare(b.nome));
                    
                    cidade.innerHTML = '<option value="" disabled selected>Selecione a cidade</option>';
                    municipios.forEach(m => {
                        const option = document.createElement('option');
                        option.value = m.nome;
                        option.textContent = m.nome;
                        cidade.appendChild(option);
                    });
                    
                    helperCidade.textContent = `${municipios.length} cidades carregadas`;
                    helperCidade.classList.remove('error-msg');
                } catch (error) {
                    console.error('Erro ao carregar cidades:', error);
                    
                    // Fallback com cidades principais
                    const fallback = ['Salvador', 'Feira de Santana', 'Vitória da Conquista', 'Camaçari', 'Itabuna', 'Juazeiro', 'Ilhéus', 'Lauro de Freitas', 'Jequié', 'Alagoinhas'];
                    cidade.innerHTML = '<option value="" disabled selected>Selecione a cidade</option>';
                    fallback.sort().forEach(cidadeNome => {
                        const option = document.createElement('option');
                        option.value = cidadeNome;
                        option.textContent = cidadeNome;
                        cidade.appendChild(option);
                    });
                    helperCidade.textContent = `${fallback.length} cidades (modo offline)`;
                }
            }
            carregarCidadesBahia();

            // ==================== MÁSCARAS DE INPUT ====================
            
            // Máscara do CPF: 000.000.000-00
            cpf.addEventListener('input', function(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 11) {
                    if (valor.length > 9) {
                        valor = valor.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
                    } else if (valor.length > 6) {
                        valor = valor.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
                    } else if (valor.length > 3) {
                        valor = valor.replace(/(\d{3})(\d{1,3})/, '$1.$2');
                    }
                    e.target.value = valor;
                }
            });

            // Máscara do CEP: 00000-000
            cep.addEventListener('input', function(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 8) {
                    if (valor.length > 5) {
                        valor = valor.replace(/(\d{5})(\d{1,3})/, '$1-$2');
                    }
                    e.target.value = valor;
                }
            });

            // Máscara do Celular: (00) 00000-0000
            celular.addEventListener('input', function(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 11) {
                    if (valor.length > 7) {
                        valor = valor.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                    } else if (valor.length > 2) {
                        valor = valor.replace(/(\d{2})(\d{1,5})/, '($1) $2');
                    }
                    e.target.value = valor;
                }
            });

            // Máscara do Telefone: (00) 0000-0000
            telefone.addEventListener('input', function(e) {
                let valor = e.target.value.replace(/\D/g, '');
                if (valor.length <= 10) {
                    if (valor.length > 6) {
                        valor = valor.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
                    } else if (valor.length > 2) {
                        valor = valor.replace(/(\d{2})(\d{1,4})/, '($1) $2');
                    }
                    e.target.value = valor;
                }
            });

            // ==================== BUSCA DE ENDEREÇO POR CEP ====================
            
            /**
             * Busca endereço na API ViaCEP e preenche os campos
             */
            async function buscarEnderecoPorCEP() {
                let cepNumerico = cep.value.replace(/\D/g, '');
                
                if (cepNumerico.length !== 8) {
                    return;
                }

                helperCep.textContent = 'Buscando endereço...';
                helperCep.classList.remove('error-msg', 'success-msg');
                
                try {
                    const response = await fetch(`https://viacep.com.br/ws/${cepNumerico}/json/`);
                    
                    if (!response.ok) {
                        throw new Error('Erro na busca do CEP');
                    }
                    
                    const dados = await response.json();
                    
                    if (dados.erro) {
                        helperCep.textContent = 'CEP não encontrado';
                        helperCep.classList.add('error-msg');
                        helperCep.classList.remove('success-msg');
                        cep.classList.add('error');
                        return;
                    }
                    
                    // Preenche os campos com os dados retornados
                    endereco.value = dados.logradouro || '';
                    bairro.value = dados.bairro || '';
                    
                    if (dados.localidade) {
                        const cidadeExistente = Array.from(cidade.options).find(option => option.value === dados.localidade);
                        if (cidadeExistente) {
                            cidade.value = dados.localidade;
                        } else {
                            const option = document.createElement('option');
                            option.value = dados.localidade;
                            option.textContent = dados.localidade;
                            cidade.appendChild(option);
                            cidade.value = dados.localidade;
                        }
                    }
                    
                    // Valida os campos preenchidos
                    validarEndereco();
                    validarBairro();
                    validarCidade();
                    
                    helperCep.textContent = '✓ CEP encontrado';
                    helperCep.classList.remove('error-msg');
                    helperCep.classList.add('success-msg');
                    cep.classList.remove('error');
                    
                } catch (error) {
                    console.error('Erro ao buscar CEP:', error);
                    helperCep.textContent = 'Erro ao buscar CEP';
                    helperCep.classList.add('error-msg');
                    helperCep.classList.remove('success-msg');
                }
            }

            // Evento para buscar CEP quando sair do campo
            cep.addEventListener('blur', buscarEnderecoPorCEP);

            // ==================== FUNÇÕES DE VALIDAÇÃO ====================
            
            function validarNome() {
                const val = nome.value.trim();
                if (val === '') {
                    helperNome.textContent = 'Nome completo é obrigatório';
                    helperNome.classList.add('error-msg');
                    helperNome.classList.remove('success-msg');
                    nome.classList.add('error');
                    return false;
                }
                if (/[^a-zA-ZÀ-ÖØ-öø-ÿ\s]/.test(val)) {
                    helperNome.textContent = 'Apenas letras e espaços';
                    helperNome.classList.add('error-msg');
                    helperNome.classList.remove('success-msg');
                    nome.classList.add('error');
                    return false;
                }
                helperNome.textContent = '✓ Nome válido';
                helperNome.classList.remove('error-msg');
                helperNome.classList.add('success-msg');
                nome.classList.remove('error');
                return true;
            }

            function validarSexo() {
                if (!sexo.value) {
                    helperSexo.textContent = 'Selecione o sexo';
                    helperSexo.classList.add('error-msg');
                    helperSexo.classList.remove('success-msg');
                    sexo.classList.add('error');
                    return false;
                }
                helperSexo.textContent = '✓ Sexo selecionado';
                helperSexo.classList.remove('error-msg');
                helperSexo.classList.add('success-msg');
                sexo.classList.remove('error');
                return true;
            }

            function validarCPF() {
                let val = cpf.value.replace(/[^\d]/g, '');
                if (val === '') {
                    helperCpf.textContent = 'CPF é obrigatório';
                    helperCpf.classList.add('error-msg');
                    helperCpf.classList.remove('success-msg');
                    cpf.classList.add('error');
                    return false;
                }
                if (val.length !== 11 || /^(\d)\1{10}$/.test(val)) {
                    helperCpf.textContent = 'CPF inválido';
                    helperCpf.classList.add('error-msg');
                    helperCpf.classList.remove('success-msg');
                    cpf.classList.add('error');
                    return false;
                }
                
                // Validação dos dígitos verificadores
                let soma = 0;
                for (let i = 0; i < 9; i++) soma += parseInt(val.charAt(i)) * (10 - i);
                let resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                if (resto !== parseInt(val.charAt(9))) {
                    helperCpf.textContent = 'CPF inválido';
                    helperCpf.classList.add('error-msg');
                    helperCpf.classList.remove('success-msg');
                    cpf.classList.add('error');
                    return false;
                }
                
                soma = 0;
                for (let i = 0; i < 10; i++) soma += parseInt(val.charAt(i)) * (11 - i);
                resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                if (resto !== parseInt(val.charAt(10))) {
                    helperCpf.textContent = 'CPF inválido';
                    helperCpf.classList.add('error-msg');
                    helperCpf.classList.remove('success-msg');
                    cpf.classList.add('error');
                    return false;
                }

                helperCpf.classList.remove('error-msg');
                helperCpf.classList.add('success-msg');
                cpf.classList.remove('error');
